        // --- HELPER: Safe number guard ---
        function safeNum(v, fallback) {
            if (typeof v !== 'number' || !isFinite(v)) return fallback !== undefined ? fallback : 0;
            return v;
        }

        // --- COLLISION HELPERS ---
        function overlaps(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        // Check if a position overlaps any solid platform
        function overlapsAnySolid(x, y, w, h) {
            const rect = { x: x, y: y, w: w, h: h };
            for (let p of platforms) {
                if (overlaps(rect, p)) return true;
            }
            return false;
        }

        // Push player out of walls (prevent stuck)
        function pushOutOfWalls() {
            for (let p of platforms) {
                if (!overlaps(player, p)) continue;
                // Calculate overlap on each axis
                const overlapLeft = (player.x + player.w) - p.x;
                const overlapRight = (p.x + p.w) - player.x;
                const overlapTop = (player.y + player.h) - p.y;
                const overlapBottom = (p.y + p.h) - player.y;
                // Find minimum overlap axis
                const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                if (minOverlap === overlapLeft) { player.x = p.x - player.w; player.vx = 0; }
                else if (minOverlap === overlapRight) { player.x = p.x + p.w; player.vx = 0; }
                else if (minOverlap === overlapTop) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; player.jumps = 0; }
                else if (minOverlap === overlapBottom) { player.y = p.y + p.h; player.vy = 0; }
            }
        }

            const startY = -(mapHeight * TILE_SIZE) + GAME_H;

            for (let p of brickPlats) ctx.drawImage(brickTex, p.x, p.y - cameraY, TILE_SIZE, TILE_SIZE);
            for (let p of stonePlats) ctx.drawImage(stoneTex, p.x, p.y - cameraY, TILE_SIZE, TILE_SIZE);
            for (let p of chestPlats) ctx.drawImage(chestTex, p.x, p.y - cameraY, TILE_SIZE, TILE_SIZE);

            // Particles - batch
            for (let p of particles) { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y - cameraY, 4, 4); }
            // Gems
            for (let g of gems) { ctx.drawImage(gemTex, g.x, g.y - cameraY, g.w, g.h); }

            // Bullets
            for (let b of bullets) { ctx.save(); ctx.translate(b.x + b.w / 2, b.y - cameraY + b.h / 2); ctx.rotate(Math.atan2(b.vy, b.vx)); ctx.drawImage(bulletTex, -b.w / 2, -b.h / 2, b.w, b.h); ctx.restore(); }
            for (let b of enemyBullets) { ctx.save(); ctx.translate(b.x + b.w / 2, b.y - cameraY + b.h / 2); ctx.rotate(Math.atan2(b.vy, b.vx)); ctx.drawImage(enemyBulletTex, -b.w / 2, -b.h / 2, b.w, b.h); ctx.restore(); }

            // Enemies
            for (let e of enemies) {
                ctx.save(); ctx.translate(e.x + e.w / 2, e.y - cameraY + e.h / 2);
                let tex = patrolTex; if (e.type === 'bat') tex = batTex; if (e.type === 'turret') tex = turretTex;
                if (e.vx > 0 || (e.type === 'bat' && player.x > e.x)) ctx.scale(-1, 1);
                ctx.drawImage(tex, -e.w / 2, -e.h / 2, e.w, e.h); ctx.restore();
            }

            // Anchor rope + head
            if (anchor.active || anchor.isAttached) {
                ctx.beginPath();
                ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2 - cameraY);
                ctx.lineTo(anchor.x + anchor.w / 2, anchor.y + anchor.h / 2 - cameraY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 2; ctx.stroke();
                ctx.drawImage(anchorTex, anchor.x, anchor.y - cameraY, anchor.w, anchor.h);
            }

            // Player
            if (gameState === 'PLAYING' || gameState === 'WIN') {
                ctx.save();
                ctx.translate(player.x + player.w / 2, player.y - cameraY + player.h / 2);
                if (!player.facingRight) ctx.scale(-1, 1);
                ctx.drawImage(mageTex, -player.w / 2, -player.h / 2, player.w, player.h);
                ctx.restore();
            }

            // Goal Portal
            if (gameState === 'PLAYING') {
                const mapHeight2 = levels[currentLevel].map.length;
                const startY2 = -(mapHeight2 * TILE_SIZE) + GAME_H;
                ctx.drawImage(goalTex, 280, startY2 + (2 * TILE_SIZE) - cameraY, 30, 30);
            }

            // Animated lava
            const lavaScreenY = lavaY - cameraY;
            const lavaGrad = ctx.createLinearGradient(0, lavaScreenY, 0, lavaScreenY + GAME_H);
            lavaGrad.addColorStop(0, 'rgba(255, 160, 0, 0.95)');
            lavaGrad.addColorStop(0.15, 'rgba(255, 80, 0, 0.9)');
            lavaGrad.addColorStop(0.5, 'rgba(180, 20, 0, 0.85)');
            lavaGrad.addColorStop(1, 'rgba(80, 0, 0, 0.85)');
            const now = Date.now() * 0.003;
            ctx.beginPath();
            ctx.moveTo(0, lavaScreenY + GAME_H);
            for (let wx = 0; wx <= GAME_W; wx += 4) {
                const waveY = lavaScreenY + Math.sin(now + wx * 0.02) * 4 + Math.sin(now * 1.7 + wx * 0.035) * 3;
                ctx.lineTo(wx, waveY);
            }
            ctx.lineTo(GAME_W, lavaScreenY + GAME_H);
            ctx.closePath();
            ctx.fillStyle = lavaGrad;
            ctx.fill();
            // Bright edge highlight
            ctx.beginPath();
            for (let wx = 0; wx <= GAME_W; wx += 4) {
                const waveY = lavaScreenY + Math.sin(now + wx * 0.02) * 4 + Math.sin(now * 1.7 + wx * 0.035) * 3;
                if (wx === 0) ctx.moveTo(wx, waveY); else ctx.lineTo(wx, waveY);
            }
            ctx.strokeStyle = 'rgba(255, 255, 100, 0.7)'; ctx.lineWidth = 3; ctx.stroke();
            // Lava bubbles
            for (let lb of lavaBubbles) {
                const alpha = lb.life / 50;
                ctx.beginPath(); ctx.arc(lb.x, lb.y - cameraY, lb.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 200, 50, ' + alpha + ')'; ctx.fill();
            }

            // End screen shake
            ctx.restore();

            // Damage flash
            if (damageFlashTimer > 0) {
                ctx.fillStyle = 'rgba(200, 0, 0, ' + (0.3 * (damageFlashTimer / 6)) + ')';
                ctx.fillRect(0, 0, GAME_W, GAME_H);
            }

            // Text popups
            for (let tp of textPopups) {
                const alpha = tp.life / 30;
                ctx.fillStyle = 'rgba(255, 255, 0, ' + alpha + ')';
                ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
                ctx.fillText(tp.text, tp.x + 10, tp.y - cameraY);
            }

            // HUD
            for (let p of popups) {
                ctx.fillStyle = 'rgba(255, 255, 255, ' + (p.life / 30) + ')';
                ctx.font = 'bold 16px monospace'; ctx.textAlign = 'left';
                ctx.fillText(p.text, p.x + 10, p.y - cameraY);
            }

            ctx.fillStyle = 'white';
            if (gameState === 'PLAYING') {
                ctx.textAlign = 'left'; ctx.font = 'bold 20px monospace';
                ctx.fillText('SCORE: ' + score, 20, 40);
                ctx.fillText('LIVES: ' + lives, 20, 65);
                ctx.textAlign = 'right';
                ctx.fillText(levels[currentLevel].name, GAME_W - 20, 40);
            }

            // Screen Overlays
            ctx.textAlign = 'center';
            if (gameState === 'START') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
                // Title embers
                if (Math.random() < 0.4 && titleEmbers.length < (LOW_END ? 30 : 80)) {
                    titleEmbers.push({ x: Math.random() * GAME_W, y: GAME_H + 5, vy: -(1 + Math.random() * 2), vx: (Math.random() - 0.5) * 0.5, life: 60 + Math.random() * 60, size: 2 + Math.random() * 3 });
                }
                for (let i = titleEmbers.length - 1; i >= 0; i--) {
                    let e = titleEmbers[i]; e.x += e.vx; e.y += e.vy; e.life--;
                    const alpha = Math.min(1, e.life / 40);
                    const colors = ['rgba(255,160,0,', 'rgba(255,200,50,', 'rgba(255,100,0,'];
                    ctx.fillStyle = colors[i % 3] + alpha + ')';
                    ctx.fillRect(e.x, e.y, e.size, e.size);
                    if (e.life <= 0) titleEmbers.splice(i, 1);
                }
                // Title
                ctx.save();
                ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20;
                ctx.fillStyle = 'white'; ctx.font = 'bold 42px monospace';
                ctx.fillText("NANO WIZARDS", GAME_W / 2, GAME_H / 2 - 50);
                ctx.restore();
                ctx.save();
                ctx.shadowColor = '#6644aa'; ctx.shadowBlur = 12;
                ctx.fillStyle = 'rgba(255,200,100,0.9)'; ctx.font = 'bold 22px monospace';
                ctx.fillText("The Obsidian Spire", GAME_W / 2, GAME_H / 2 - 15);
                ctx.restore();
                ctx.fillStyle = 'rgba(200, 180, 255, 0.7)'; ctx.font = '16px monospace';
                ctx.fillText("The last Nano Wizard ascends", GAME_W / 2, GAME_H / 2 + 15);
                // Blinking prompt
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ffaa00'; ctx.font = '20px monospace';
                    ctx.fillText("Press B/Z/Space to Begin", GAME_W / 2, GAME_H / 2 + 55);
                }
            }
            else if (gameState === 'LEVEL_STORY') {
                ctx.fillStyle = 'rgba(0,0,0,0.92)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
                const storyLines = storyFullText.split('\n');
                const lineHeight = 28;
                const totalHeight = storyLines.length * lineHeight;
                const startYStory = (GAME_H - totalHeight) / 2 - 40;
                ctx.font = '18px monospace';
                for (let si = 0; si < storyLines.length; si++) {
                    ctx.fillStyle = 'rgba(200, 180, 255, 1.0)';
                    ctx.fillText(storyLines[si], GAME_W / 2, startYStory + si * lineHeight);
                }
                if (storyLineIndex < storyQueue.length) {
                    const cursorY = startYStory + (storyLines.length - 1) * lineHeight;
                    if (Math.floor(Date.now() / 300) % 2 === 0) {
                        ctx.fillStyle = '#ffaa00';
                        ctx.fillText('_', GAME_W / 2 + ctx.measureText(storyLines[storyLines.length - 1]).width / 2 + 4, cursorY);
                    }
                } else {
                    if (Math.floor(Date.now() / 500) % 2 === 0) {
                        ctx.fillStyle = '#ffaa00'; ctx.font = '16px monospace';
                        ctx.fillText("Press B/Z/Space to continue...", GAME_W / 2, GAME_H - 60);
                    }
                }
            }
            else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(200, 0, 0, 0.5)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
                ctx.fillStyle = 'white'; ctx.font = 'bold 48px monospace'; ctx.fillText("THE SPIRE CLAIMS YOU", GAME_W / 2, GAME_H / 2 - 20);
                ctx.font = '20px monospace';
                ctx.fillStyle = 'rgba(200, 180, 255, 0.8)';
                ctx.fillText("The corruption swallows another soul...", GAME_W / 2, GAME_H / 2 + 20);
                ctx.fillStyle = 'white'; ctx.font = '24px monospace';
                ctx.fillText('SCORE: ' + score, GAME_W / 2, GAME_H / 2 + 60);
                ctx.fillText("Press B/Z to Retry", GAME_W / 2, GAME_H / 2 + 100);
            }
            else if (gameState === 'WIN') {
                ctx.fillStyle = 'rgba(20, 0, 40, 0.85)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
                ctx.save();
                ctx.shadowColor = '#aa66ff'; ctx.shadowBlur = 20;
                ctx.fillStyle = 'white'; ctx.font = 'bold 36px monospace';
                ctx.fillText("FREE AT LAST", GAME_W / 2, GAME_H / 2 - 40);
                ctx.restore();
                ctx.fillStyle = 'rgba(200, 180, 255, 0.8)'; ctx.font = '18px monospace';
                ctx.fillText("The Obsidian Spire crumbles into dust.", GAME_W / 2, GAME_H / 2 + 10);
                ctx.fillText("Vael walks into the dawn -- no longer a heart,", GAME_W / 2, GAME_H / 2 + 38);
                ctx.fillText("no longer a weapon. Just free.", GAME_W / 2, GAME_H / 2 + 66);
                ctx.fillStyle = 'white'; ctx.font = '24px monospace';
                ctx.fillText('FINAL SCORE: ' + score, GAME_W / 2, GAME_H / 2 + 110);
                ctx.fillStyle = '#ffaa00';
                ctx.fillText("Press B/Z to Play Again", GAME_W / 2, GAME_H / 2 + 150);
            }

            // Scanline overlay (CRT aesthetic)
            ctx.fillStyle = 'rgba(0,0,0,0.04)';
            for (let sy = 0; sy < GAME_H; sy += 3) {
                ctx.fillRect(0, sy, GAME_W, 1);
            }

            // End game coordinate transform
            ctx.restore();

            // Draw control hints overlay (in screen space, not game space)
            if (showControlHints) {
                const hintAlpha = Math.min(1, controlHintsTimer / 30);
                ctx.save();
                ctx.globalAlpha = hintAlpha * 0.7;
                // Left side - joystick hint
                const joyHintX = 100;
                const joyHintY = GAME_H - 140;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(joyHintX, joyHintY, 45, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
                ctx.fillText('MOVE', joyHintX, joyHintY + 70);
                // Arrows
                ctx.beginPath(); ctx.moveTo(joyHintX, joyHintY - 20); ctx.lineTo(joyHintX - 6, joyHintY - 10); ctx.lineTo(joyHintX + 6, joyHintY - 10); ctx.fill();
                ctx.beginPath(); ctx.moveTo(joyHintX, joyHintY + 20); ctx.lineTo(joyHintX - 6, joyHintY + 10); ctx.lineTo(joyHintX + 6, joyHintY + 10); ctx.fill();
                ctx.beginPath(); ctx.moveTo(joyHintX - 20, joyHintY); ctx.lineTo(joyHintX - 10, joyHintY - 6); ctx.lineTo(joyHintX - 10, joyHintY + 6); ctx.fill();
                ctx.beginPath(); ctx.moveTo(joyHintX + 20, joyHintY); ctx.lineTo(joyHintX + 10, joyHintY - 6); ctx.lineTo(joyHintX + 10, joyHintY + 6); ctx.fill();
                // Right side - buttons hint
                const btnHintX = GAME_W - 100;
                const btnHintY = GAME_H - 160;
                ctx.beginPath(); ctx.arc(btnHintX + 35, btnHintY, 25, 0, Math.PI * 2); ctx.stroke();
                ctx.fillText('A', btnHintX + 35, btnHintY + 5);
                ctx.fillText('SHOOT', btnHintX + 35, btnHintY + 40);
                ctx.beginPath(); ctx.arc(btnHintX - 20, btnHintY + 25, 25, 0, Math.PI * 2); ctx.stroke();
                ctx.fillText('B', btnHintX - 20, btnHintY + 30);
                ctx.fillText('JUMP', btnHintX - 20, btnHintY + 65);
                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        // Initialize state, wait for user input to start
        resetGame(true);
        gameState = 'START';
        lastTime = performance.now();
        rafId = requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
