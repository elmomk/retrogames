        canvas { background-color: #0f0f19; box-shadow: 0 0 20px rgba(0,0,0,0.8); image-rendering: pixelated; max-width: 100%; max-height: 100vh; }

        #joystickZone { position: absolute; top: 0; left: 0; width: 50vw; height: 100vh; z-index: 10; }
        #joystickBase { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); display: none; pointer-events: none; transform: translate(-50%, -50%); }
        #joystickStick { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.5); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .action-btns { display: flex; gap: 15px; pointer-events: auto; z-index: 11; margin-bottom: 10px; }
        .btn { background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.5); color: white; font-size: 24px; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; user-select: none; font-weight: bold; }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        #btnB { background: rgba(100, 255, 100, 0.4); margin-top: 20px; } 
        #btnA { background: rgba(255, 100, 100, 0.4); }
        @media (hover: hover) and (pointer: fine) { .controls { display: none; } #joystickZone { display: none; } }
    </style>

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            if (type === 'jump') {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'square'; o.frequency.setValueAtTime(250, t); o.frequency.linearRampToValueAtTime(500, t + 0.08);

                o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t); o.frequency.linearRampToValueAtTime(200, t + 0.08);

        function resetGame(fullReset = false) {

                    if (char === '#') platforms.push({ x: px, y: py, w: TILE_SIZE, h: TILE_SIZE, type: 'brick' });

        joyZone.addEventListener('touchmove', (e) => { if (!joyActive) return; e.preventDefault(); const touch = e.changedTouches[0]; const dx = touch.clientX - joyStart.x; const dy = touch.clientY - joyStart.y; const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 40); const angle = Math.atan2(dy, dx); joyStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*distance}px), calc(-50% + ${Math.sin(angle)*distance}px))`; const deadzone = 15; keys.right = dx > deadzone; keys.left = dx < -deadzone; keys.down = dy > deadzone; keys.up = dy < -deadzone; });
        const resetJoy = () => { joyActive = false; joyBase.style.display = 'none'; keys.right = keys.left = keys.up = keys.down = false; }; joyZone.addEventListener('touchend', resetJoy); joyZone.addEventListener('touchcancel', resetJoy);

        function getTrajectory(speed) {
            let vx = 0; let vy = 0;
            if (keys.up && keys.right) { vx = speed; vy = -speed; } else if (keys.up && keys.left) { vx = -speed; vy = -speed; } else if (keys.down && keys.right) { vx = speed; vy = speed; } else if (keys.down && keys.left) { vx = -speed; vy = speed; } else if (keys.up) { vx = 0; vy = -speed; } else if (keys.down) { vx = 0; vy = speed; } else if (keys.right) { vx = speed; vy = 0; } else if (keys.left) { vx = -speed; vy = 0; } else { vx = player.facingRight ? speed : -speed; vy = 0; } return {vx, vy};

        function gameLoop(timestamp) {
            let dt = timestamp - lastTime; lastTime = timestamp; if (dt > 250) dt = 250; accumulator += dt;
            while (accumulator >= TIME_STEP) {
                if (gameState === 'PLAYING') updatePhysics();
                else if (gameState === 'LEVEL_STORY') {
                    // Typewriter effect
                    storyFrameCounter++;
                    if (storyLineIndex < storyQueue.length) {
                        if (storyFrameCounter % 2 === 0) { // reveal one char every 2 frames
                            const line = storyQueue[storyLineIndex];
                            if (storyCharIndex < line.length) {
                                storyFullText += line[storyCharIndex];
                                storyCharIndex++;
                            } else {
                                storyFullText += '\n';
                                storyLineIndex++;
                                storyCharIndex = 0;
                            }
                        }
                    }
                    if (jumpBufferFrames > 0 || keys.shootPressed) {
                        if (storyLineIndex < storyQueue.length) {
                            // Skip to end: reveal all remaining text
                            for (let si = storyLineIndex; si < storyQueue.length; si++) {
                                storyFullText += storyQueue[si].substring(si === storyLineIndex ? storyCharIndex : 0) + '\n';
                            }
                            storyLineIndex = storyQueue.length;
                            storyCharIndex = 0;
                        } else {
                            // Text fully shown, advance
                            if (gameState === 'LEVEL_STORY' && storyQueue === storyScreens.victory) {
                                gameState = 'WIN';
                            } else {
                                resetGame(storyQueue === storyScreens.intro);
                            }
                        }
                        jumpBufferFrames = 0; keys.shootPressed = false;
                    }
                }
                else if (jumpBufferFrames > 0 || keys.shootPressed) {
                    if (gameState === 'START') initStoryScreen(storyScreens.intro);
                    else if (gameState === 'STORY') initStoryScreen(storyScreens.intro);
                    else if (gameState === 'WIN') { currentLevel = 0; score = 0; gameState = 'START'; }
                    else resetGame(gameState === 'GAMEOVER');
                    jumpBufferFrames = 0; keys.shootPressed = false;
                }
                accumulator -= TIME_STEP;
            }
            draw(); requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            if (player.onGround) coyoteFrames = 6; else coyoteFrames--;
            if (jumpBufferFrames > 0) jumpBufferFrames--;

            // --- ANCHOR LOGIC ---
            if (keys.b_down && !anchor.active && !keys.anchor_fired && (Date.now() - keys.b_time > 150)) {
                let traj = getTrajectory(ANCHOR_SPEED); anchor.active = true; anchor.isAttached = false; keys.anchor_fired = true; playSound('anchor');
                anchor.x = player.x + player.w / 2 - anchor.w / 2; anchor.y = player.y + player.h / 2 - anchor.h / 2;
                anchor.vx = traj.vx; anchor.vy = traj.vy;
            }
            if (!keys.b_down) {
                keys.anchor_fired = false;
                if (anchor.active) { anchor.active = false; if (anchor.isAttached) { player.vy = JUMP_FORCE * 0.8; player.jumps = 1; anchor.isAttached = false; coyoteFrames = 0; } }
            }

            if (anchor.active && !anchor.isAttached) {
                anchor.x += anchor.vx; anchor.y += anchor.vy;
                let hitSolid = false;
                for (let i = platforms.length - 1; i >= 0; i--) {
                    let p = platforms[i];
                    if (overlaps(anchor, p)) {
                        if (p.type === 'stone' || p.type === 'chest') { 
                            if (p.type === 'chest') {
                                gems.push({ x: p.x + 2, y: p.y, w: 16, h: 16, vx: (Math.random()-0.5)*4, vy: -5 });
                            }
                            platforms.splice(i, 1); 
                            for(let k=0; k<6; k++) particles.push({ x: p.x+10, y: p.y+10, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 15+Math.random()*15, color: p.type === 'chest' ? '#8B4513' : '#777777' });
                            anchor.active = false;
                        } 
                        else {
                            hitSolid = true; anchor.isAttached = true; triggerShake(4);
                            anchor.length = Math.sqrt(Math.pow((player.x + player.w/2) - anchor.x, 2) + Math.pow((player.y + player.h/2) - anchor.y, 2));
                            break;
                        }
                    }
                }
                if (!hitSolid && Math.sqrt(Math.pow((player.x + player.w/2) - anchor.x, 2) + Math.pow((player.y + player.h/2) - anchor.y, 2)) > 300) anchor.active = false; 
            }

            // --- ITEMS / PARTICLES ---
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += GRAVITY; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            }
            
            for(let i=popups.length-1; i>=0; i--) {
                let p = popups[i]; p.y -= 1; p.life--;
                if (p.life <= 0) popups.splice(i, 1);
            }

            for(let i=gems.length-1; i>=0; i--) {
                let g = gems[i]; g.vy += GRAVITY; g.x += g.vx; g.y += g.vy;
                for(let p of platforms) {
                    if (overlaps(g, p) && p.type !== 'stone' && p.type !== 'chest') {
                        if (g.vy > 0 && g.y < p.y) { g.y = p.y - g.h; g.vy = -g.vy * 0.5; g.vx *= 0.8; }
                    }
                }
                if (overlaps(player, g)) {
                    addScore(50, g.x, g.y);
                    textPopups.push({ text: '+100', x: g.x, y: g.y, life: 30 });
                    playSound('pickup');
                    gems.splice(i, 1);
                }
            }

            // --- PLAYER MOVEMENT ---
            let targetVx = 0;
            if (keys.right) { targetVx = MOVE_SPEED; player.facingRight = true; }
            if (keys.left) { targetVx = -MOVE_SPEED; player.facingRight = false; }
            if (anchor.isAttached) {
                player.vx += targetVx * 0.05; 
                if (keys.up && anchor.length > 20) anchor.length -= CLIMB_SPEED;
                if (keys.down && anchor.length < 300) anchor.length += CLIMB_SPEED;
            } else { player.vx = player.onGround ? targetVx : player.vx * 0.8 + targetVx * 0.2; }

            player.x += player.vx; player.wallDir = 0;
            for (let p of platforms) {
                if (overlaps(player, p)) {
                    if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; player.wallDir = 1; } 
                    else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; player.wallDir = -1; }
                }
            }
            if (player.x > canvas.width) player.x = -player.w; if (player.x < -player.w) player.x = canvas.width;

            player.vy += GRAVITY;
            if (player.wallDir !== 0 && player.vy > 0 && !anchor.isAttached) {
                if (player.vy > WALL_SLIDE_SPEED) player.vy = WALL_SLIDE_SPEED;
            } else { if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED; }

            player.y += player.vy; player.onGround = false;
            for (let p of platforms) {
                if (overlaps(player, p)) {
                    if (player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; player.jumps = 0; } 
                    else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
                }
            }

            if (anchor.isAttached) {
                let dx = (player.x + player.w/2) - anchor.x; let dy = (player.y + player.h/2) - anchor.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > anchor.length) {
                    let diff = dist - anchor.length; let nx = dx / dist; let ny = dy / dist;
                    player.x -= nx * diff; player.y -= ny * diff;
                    let dot = player.vx * nx + player.vy * ny; player.vx -= dot * nx; player.vy -= dot * ny;
                    player.vx *= 0.99; player.vy *= 0.99; 
                }
            }

            if (jumpBufferFrames > 0) {
                if (anchor.isAttached) { }
                else if (coyoteFrames > 0) { player.vy = JUMP_FORCE; player.jumps = 1; coyoteFrames = 0; jumpBufferFrames = 0; playSound('jump'); }
                else if (player.wallDir !== 0) { player.vy = WALL_JUMP_Y; player.vx = -player.wallDir * WALL_JUMP_X; player.facingRight = player.wallDir === -1; player.jumps = 1; jumpBufferFrames = 0; playSound('walljump'); }
                else if (player.jumps < player.maxJumps) { player.vy = JUMP_FORCE; player.jumps++; jumpBufferFrames = 0; playSound('jump'); }
            }

            // --- SHOOTING ---
            if (keys.shootPressed) {
                let traj = getTrajectory(BULLET_SPEED); bullets.push({ x: player.x + player.w/2 - 4, y: player.y + player.h/2 - 4, vx: traj.vx, vy: traj.vy, w: 8, h: 8 }); keys.shootPressed = false; playSound('shoot');
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.x += b.vx; b.y += b.vy; let hit = false;
                for (let p of platforms) { if (overlaps(b, p) && p.type !== 'stone' && p.type !== 'chest') { hit = true; break; } }
                
                let hitEnemy = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (overlaps(b, enemies[j])) {
                        let e = enemies[j];
                        enemies.splice(j, 1); hitEnemy = true;
                        addScore(100, e.x, e.y); // POINTS!
                        playSound('enemydeath'); triggerShake(2);
                        for(let k=0; k<5; k++) particles.push({ x: b.x, y: b.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 15, color: '#ff00ff' });
                        break; 
                    }
                }
                if (hit || hitEnemy || b.x > canvas.width || b.x < -b.w || b.y < cameraY - 100 || b.y > cameraY + canvas.height + 100) bullets.splice(i, 1);
            }

            // --- ENEMY LOGIC ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.type === 'patrol') {
                    e.x += e.vx; if (e.x > e.startX + e.range || e.x < e.startX - e.range) e.vx *= -1; 
                } 
                else if (e.type === 'bat') {
                    let dx = player.x - e.x; let dy = player.y - e.y; let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 250) { e.x += (dx / dist) * 1.2; e.y += (dy / dist) * 1.2; }
                }
                else if (e.type === 'turret') {
                    e.shootTimer++;
                    if (e.shootTimer > 90) {
                        let dx = player.x - e.x; let dy = player.y - e.y; let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 300) enemyBullets.push({ x: e.x + e.w/2 - 4, y: e.y + e.h/2 - 4, vx: (dx / dist) * ENEMY_BULLET_SPEED, vy: (dy / dist) * ENEMY_BULLET_SPEED, w: 8, h: 8 });
                        e.shootTimer = 0;
                    }
                }

                if (overlaps(player, e)) {
                    if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 5 && e.type !== 'turret') {
                        player.vy = BOUNCE_FORCE; player.jumps = 1; enemies.splice(i, 1);
                        addScore(100, e.x, e.y); // POINTS!
                        playSound('enemydeath'); triggerShake(2);
                        for(let k=0; k<5; k++) particles.push({ x: e.x+10, y: e.y+10, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 15, color: '#ff00ff' });
                    } else {
                        gameState = 'GAMEOVER'; playSound('death'); triggerShake(6); damageFlashTimer = 6;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let b = enemyBullets[i]; b.x += b.vx; b.y += b.vy; let hitWall = false;
                for (let p of platforms) { if (overlaps(b, p) && p.type !== 'stone' && p.type !== 'chest') { hitWall = true; break; } }
                if (overlaps(b, player)) { gameState = 'GAMEOVER'; playSound('death'); triggerShake(6); damageFlashTimer = 6; }
                if (hitWall || b.x > canvas.width || b.x < -b.w || b.y < cameraY - 100 || b.y > cameraY + canvas.height + 100) enemyBullets.splice(i, 1);
            }

            lavaY -= levelLavaSpeed; // Use level-specific lava speed!
            if (player.y + player.h > lavaY) { gameState = 'GAMEOVER'; playSound('death'); triggerShake(6); damageFlashTimer = 6; }
            
            // GOAL COLLISION & LEVEL TRANSITION
            const mapHeight = levels[currentLevel].map.length;
            const startY = - (mapHeight * TILE_SIZE) + 480; 
            const goalRect = { x: 280, y: startY + (2 * TILE_SIZE), w: 30, h: 30 };
            
            if (overlaps(player, goalRect)) {
                const justFinished = currentLevel;
                currentLevel++;
                if (currentLevel >= levels.length) {
                    initStoryScreen(storyScreens.victory);
                } else if (justFinished === 0) {
                    initStoryScreen(storyScreens.afterLevel1);
                } else if (justFinished === 1) {
                    initStoryScreen(storyScreens.afterLevel2);
                } else {
                    resetGame(false);
                }
            }

            // Screen shake decay
            if (shakeMagnitude > 0.1) {
                screenShakeX = (Math.random() - 0.5) * 2 * shakeMagnitude;
                screenShakeY = (Math.random() - 0.5) * 2 * shakeMagnitude;
                shakeMagnitude *= 0.85;
            } else { screenShakeX = 0; screenShakeY = 0; shakeMagnitude = 0; }

            // Damage flash decay
            if (damageFlashTimer > 0) damageFlashTimer--;

            // Text popups update
            for (let i = textPopups.length - 1; i >= 0; i--) {
                textPopups[i].y -= 1.5; textPopups[i].life--;
                if (textPopups[i].life <= 0) textPopups.splice(i, 1);
            }

            // Lava bubbles
            if (Math.random() < 0.3) {
                lavaBubbles.push({ x: Math.random() * canvas.width, y: lavaY, r: 2 + Math.random() * 4, life: 20 + Math.random() * 30, speed: 0.5 + Math.random() * 1.5 });
            }
            for (let i = lavaBubbles.length - 1; i >= 0; i--) {
                lavaBubbles[i].y -= lavaBubbles[i].speed; lavaBubbles[i].life--;
                if (lavaBubbles[i].life <= 0) lavaBubbles.splice(i, 1);
            }

            const targetCameraY = player.y - canvas.height * 0.6; cameraY += (targetCameraY - cameraY) * 0.1;
            if (cameraY > lavaY - canvas.height + 100) cameraY = lavaY - canvas.height + 100;
        }

        function draw() {
            ctx.fillStyle = 'rgb(15, 15, 25)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const bgSize = 64; const startYBg = Math.floor((cameraY * 0.5) / bgSize) - 1;
            for (let y = startYBg; y < startYBg + 12; y++) { for (let x = 0; x < 12; x++) { ctx.drawImage(bgTex, x * bgSize, (y * bgSize) - (cameraY * 0.5), bgSize, bgSize); } }

            // Apply screen shake
            ctx.save();
            ctx.translate(screenShakeX, screenShakeY);

            // Draw Level Texts (Tutorial signs)
            if (gameState === 'PLAYING' && levels[currentLevel].texts) {
                const mapHeight = levels[currentLevel].map.length;
                const startY = - (mapHeight * TILE_SIZE) + 480;

                ctx.textAlign = 'left';
                for (let textObj of levels[currentLevel].texts) {
                    const textX = textObj.col * TILE_SIZE;
                    const textY = startY + (textObj.row * TILE_SIZE) - cameraY;

                    if (textObj.ghost) {
                        // Ghostly pulsing text for memory fragments
                        const pulse = 0.4 + Math.sin(Date.now() * 0.002 + textObj.row) * 0.3;
                        ctx.font = 'italic 15px monospace';
                        ctx.save();
                        ctx.shadowColor = 'rgba(160, 120, 255, 0.6)';
                        ctx.shadowBlur = 10;
                        ctx.fillStyle = `rgba(180, 160, 255, ${pulse})`;
                        ctx.fillText(textObj.text, textX, textY);
                        ctx.restore();
                    } else {
                        ctx.font = 'bold 16px monospace';
                        // Draw thick black outline for readability
                        ctx.strokeStyle = 'black'; ctx.lineWidth = 4;
                        ctx.strokeText(textObj.text, textX, textY);
                        // Draw white text
                        ctx.fillStyle = 'white';
                        ctx.fillText(textObj.text, textX, textY);
                    }
                }
            }

            for (let p of platforms) {
                if (p.y > cameraY - TILE_SIZE && p.y < cameraY + canvas.height + TILE_SIZE) {
                    let tex = brickTex;
                    if (p.type === 'stone') tex = stoneTex;
                    if (p.type === 'chest') tex = chestTex;
                    ctx.drawImage(tex, p.x, p.y - cameraY, TILE_SIZE, TILE_SIZE);
                }
            }
            
            for(let p of particles) { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y - cameraY, 4, 4); }
            for(let g of gems) { ctx.drawImage(gemTex, g.x, g.y - cameraY, g.w, g.h); }

            for (let b of bullets) { ctx.save(); ctx.translate(b.x + b.w/2, b.y - cameraY + b.h/2); ctx.rotate(Math.atan2(b.vy, b.vx)); ctx.drawImage(bulletTex, -b.w/2, -b.h/2, b.w, b.h); ctx.restore(); }
            for (let b of enemyBullets) { ctx.save(); ctx.translate(b.x + b.w/2, b.y - cameraY + b.h/2); ctx.rotate(Math.atan2(b.vy, b.vx)); ctx.drawImage(enemyBulletTex, -b.w/2, -b.h/2, b.w, b.h); ctx.restore(); }

            for (let e of enemies) {
                ctx.save(); ctx.translate(e.x + e.w/2, e.y - cameraY + e.h/2);
                let tex = patrolTex; if (e.type === 'bat') tex = batTex; if (e.type === 'turret') tex = turretTex;
                if (e.vx > 0 || (e.type==='bat' && player.x > e.x)) ctx.scale(-1, 1); 
                ctx.drawImage(tex, -e.w/2, -e.h/2, e.w, e.h); ctx.restore();
            }

            if (anchor.active || anchor.isAttached) { ctx.beginPath(); ctx.moveTo(player.x + player.w/2, player.y + player.h/2 - cameraY); ctx.lineTo(anchor.x + anchor.w/2, anchor.y + anchor.h/2 - cameraY); ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 2; ctx.stroke(); ctx.drawImage(anchorTex, anchor.x, anchor.y - cameraY, anchor.w, anchor.h); }
            if (gameState === 'PLAYING' || gameState === 'WIN') { ctx.save(); ctx.translate(player.x + player.w/2, player.y - cameraY + player.h/2); if (!player.facingRight) ctx.scale(-1, 1); ctx.drawImage(mageTex, -player.w/2, -player.h/2, player.w, player.h); ctx.restore(); }

            // Draw Goal Portal
            if (gameState === 'PLAYING') {
                const mapHeight = levels[currentLevel].map.length;
                const startY = - (mapHeight * TILE_SIZE) + 480; 
                ctx.drawImage(goalTex, 280, startY + (2 * TILE_SIZE) - cameraY, 30, 30);
            }

            // Animated lava
            const lavaScreenY = lavaY - cameraY;
            const lavaGrad = ctx.createLinearGradient(0, lavaScreenY, 0, lavaScreenY + canvas.height);
            lavaGrad.addColorStop(0, 'rgba(255, 160, 0, 0.95)');
            lavaGrad.addColorStop(0.15, 'rgba(255, 80, 0, 0.9)');
            lavaGrad.addColorStop(0.5, 'rgba(180, 20, 0, 0.85)');
            lavaGrad.addColorStop(1, 'rgba(80, 0, 0, 0.85)');
            // Wavy top edge
            const now = Date.now() * 0.003;
            ctx.beginPath();
            ctx.moveTo(0, lavaScreenY + canvas.height);
            for (let wx = 0; wx <= canvas.width; wx += 4) {
                const waveY = lavaScreenY + Math.sin(now + wx * 0.02) * 4 + Math.sin(now * 1.7 + wx * 0.035) * 3;
                ctx.lineTo(wx, waveY);
            }
            ctx.lineTo(canvas.width, lavaScreenY + canvas.height);
            ctx.closePath();
            ctx.fillStyle = lavaGrad;
            ctx.fill();
            // Bright edge highlight
            ctx.beginPath();
            for (let wx = 0; wx <= canvas.width; wx += 4) {
                const waveY = lavaScreenY + Math.sin(now + wx * 0.02) * 4 + Math.sin(now * 1.7 + wx * 0.035) * 3;
                if (wx === 0) ctx.moveTo(wx, waveY); else ctx.lineTo(wx, waveY);
            }
            ctx.strokeStyle = 'rgba(255, 255, 100, 0.7)'; ctx.lineWidth = 3; ctx.stroke();
            // Lava bubbles
            for (let lb of lavaBubbles) {
                const alpha = lb.life / 50;
                ctx.beginPath(); ctx.arc(lb.x, lb.y - cameraY, lb.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 50, ${alpha})`; ctx.fill();
            }

            // End screen shake before HUD
            ctx.restore();

            // Damage flash
            if (damageFlashTimer > 0) {
                ctx.fillStyle = `rgba(200, 0, 0, ${0.3 * (damageFlashTimer / 6)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Text popups (gem collection feedback)
            for (let tp of textPopups) {
                const alpha = tp.life / 30;
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
                ctx.fillText(tp.text, tp.x + 10, tp.y - cameraY);
            }

            // HUD
            for(let p of popups) {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life / 30})`;
                ctx.font = 'bold 16px monospace'; ctx.textAlign = 'left';
                ctx.fillText(p.text, p.x + 10, p.y - cameraY);
            }

            ctx.fillStyle = 'white'; 
            if (gameState === 'PLAYING') {
                ctx.textAlign = 'left'; ctx.font = 'bold 20px monospace';
                ctx.fillText(`SCORE: ${score}`, 20, 40);
                ctx.textAlign = 'right';
                ctx.fillText(levels[currentLevel].name, canvas.width - 20, 40);
            }

            // Screen Overlays
            ctx.textAlign = 'center';
            if (gameState === 'START') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Title embers
                if (Math.random() < 0.4) titleEmbers.push({ x: Math.random() * canvas.width, y: canvas.height + 5, vy: -(1 + Math.random() * 2), vx: (Math.random() - 0.5) * 0.5, life: 60 + Math.random() * 60, size: 2 + Math.random() * 3 });
                for (let i = titleEmbers.length - 1; i >= 0; i--) {
                    let e = titleEmbers[i]; e.x += e.vx; e.y += e.vy; e.life--;
                    const alpha = Math.min(1, e.life / 40);
                    const colors = ['rgba(255,160,0,', 'rgba(255,200,50,', 'rgba(255,100,0,'];
                    ctx.fillStyle = colors[i % 3] + alpha + ')';
                    ctx.fillRect(e.x, e.y, e.size, e.size);
                    if (e.life <= 0) titleEmbers.splice(i, 1);
                }
                // Title with glow
                ctx.save();
                ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20;
                ctx.fillStyle = 'white'; ctx.font = 'bold 42px monospace'; ctx.fillText("THE OBSIDIAN SPIRE", canvas.width/2, canvas.height/2 - 30);
                ctx.restore();
                ctx.fillStyle = 'rgba(200, 180, 255, 0.7)'; ctx.font = '16px monospace';
                ctx.fillText("The last Crystal Mage ascends", canvas.width/2, canvas.height/2 + 10);
                // Blinking prompt
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ffaa00'; ctx.font = '20px monospace'; ctx.fillText("Press B/Z/Space to Begin", canvas.width/2, canvas.height/2 + 50);
                }
            }
            else if (gameState === 'LEVEL_STORY') {
                ctx.fillStyle = 'rgba(0,0,0,0.92)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Draw the typewriter text
                const storyLines = storyFullText.split('\n');
                const lineHeight = 28;
                const totalHeight = storyLines.length * lineHeight;
                const startYStory = (canvas.height - totalHeight) / 2 - 40;
                ctx.font = '18px monospace';
                for (let si = 0; si < storyLines.length; si++) {
                    const alpha = 1.0;
                    ctx.fillStyle = `rgba(200, 180, 255, ${alpha})`;
                    ctx.fillText(storyLines[si], canvas.width / 2, startYStory + si * lineHeight);
                }
                // Blinking cursor
                if (storyLineIndex < storyQueue.length) {
                    const cursorY = startYStory + (storyLines.length - 1) * lineHeight;
                    if (Math.floor(Date.now() / 300) % 2 === 0) {
                        ctx.fillStyle = '#ffaa00';
                        ctx.fillText('_', canvas.width / 2 + ctx.measureText(storyLines[storyLines.length - 1]).width / 2 + 4, cursorY);
                    }
                } else {
                    // Prompt to continue
                    if (Math.floor(Date.now() / 500) % 2 === 0) {
                        ctx.fillStyle = '#ffaa00'; ctx.font = '16px monospace';
                        ctx.fillText("Press B/Z/Space to continue...", canvas.width / 2, canvas.height - 60);
                    }
                }
            }
            else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(200, 0, 0, 0.5)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 48px monospace'; ctx.fillText("THE SPIRE CLAIMS YOU", canvas.width/2, canvas.height/2 - 20);
                ctx.font = '20px monospace';
                ctx.fillStyle = 'rgba(200, 180, 255, 0.8)';
                ctx.fillText("The corruption swallows another soul...", canvas.width/2, canvas.height/2 + 20);
                ctx.fillStyle = 'white'; ctx.font = '24px monospace';
                ctx.fillText(`SCORE: ${score}`, canvas.width/2, canvas.height/2 + 60);
                ctx.fillText("Press B/Z to Retry", canvas.width/2, canvas.height/2 + 100);
            }
            else if (gameState === 'WIN') {
                ctx.fillStyle = 'rgba(20, 0, 40, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.shadowColor = '#aa66ff'; ctx.shadowBlur = 20;
                ctx.fillStyle = 'white'; ctx.font = 'bold 36px monospace';
                ctx.fillText("FREE AT LAST", canvas.width/2, canvas.height/2 - 40);
                ctx.restore();
                ctx.fillStyle = 'rgba(200, 180, 255, 0.8)'; ctx.font = '18px monospace';
                ctx.fillText("The Obsidian Spire crumbles into dust.", canvas.width/2, canvas.height/2 + 10);
                ctx.fillText("Vael walks into the dawn \u2014 no longer a heart,", canvas.width/2, canvas.height/2 + 38);
                ctx.fillText("no longer a weapon. Just free.", canvas.width/2, canvas.height/2 + 66);
                ctx.fillStyle = 'white'; ctx.font = '24px monospace';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width/2, canvas.height/2 + 110);
                ctx.fillStyle = '#ffaa00';
                ctx.fillText("Press B/Z to Play Again", canvas.width/2, canvas.height/2 + 150);
            }
        }

        // Initialize state, wait for user input to start Loop.
        resetGame(true);
        gameState = 'START';
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
