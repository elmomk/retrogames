<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arena Blitz — Protocol Omega</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        html, body {
            position: fixed; top: 0; left: 0;
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; display: block;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px; pointer-events: none; z-index: 10;
        }
        .touch-joy {
            display: none; position: fixed; z-index: 30;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .touch-joy.active { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.08); }
        #moveZone { bottom: 30px; left: 30px; border-color: rgba(0,255,255,0.25); }
        #aimZone { bottom: 30px; right: 30px; border-color: rgba(255,0,255,0.25); }
        .joy-knob {
            width: 50px; height: 50px; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            transition: none;
        }
        #moveKnob { background: rgba(0,255,255,0.5); box-shadow: 0 0 10px rgba(0,255,255,0.4); }
        #aimKnob { background: rgba(255,0,255,0.5); box-shadow: 0 0 10px rgba(255,0,255,0.4); }
        .joy-label {
            position: absolute; bottom: -20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 8px; font-family: 'Press Start 2P', monospace;
            pointer-events: none;
        }
        @media (pointer: coarse), (hover: none) {
            .touch-joy { display: block; }
        }
    </style>
</head>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const BASE_W = 640, BASE_H = 480;
let W = BASE_W, H = BASE_H;
let scaleX = 1, scaleY = 1;
let isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let lowEnd = isMobile; // reduce particles on mobile

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    scaleX = W / BASE_W;
    scaleY = H / BASE_H;
    // Recalculate arena bounds
    ARENA_L = Math.round(30 * scaleX);
    ARENA_T = Math.round(30 * scaleY);
    ARENA_R = W - Math.round(30 * scaleX);
    ARENA_B = H - Math.round(30 * scaleY);
    // On mobile, raise bottom arena to avoid joystick overlap
    if (isMobile) {
        ARENA_B = H - Math.round(160 * scaleY);
    }
    ARENA_W = ARENA_R - ARENA_L;
    ARENA_H = ARENA_B - ARENA_T;
}

let ARENA_L, ARENA_T, ARENA_R, ARENA_B, ARENA_W, ARENA_H;
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => { setTimeout(() => { resize(); window.scrollTo(0, 0); }, 200); });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ========== AUDIO ==========
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    if (type === 'pistol') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(200, now + 0.08);
        g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        o.connect(g); o.start(now); o.stop(now + 0.08);
    } else if (type === 'shotgun') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        s.connect(g); s.start(now);
    } else if (type === 'laser') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(150, now);
        g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        o.connect(g); o.start(now); o.stop(now + 0.05);
    } else if (type === 'rocket') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(100, now); o.frequency.exponentialRampToValueAtTime(600, now + 0.2);
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        o.connect(g); o.start(now); o.stop(now + 0.25);
    } else if (type === 'explode') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        s.connect(f); f.connect(g); s.start(now);
    } else if (type === 'hit') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(300, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.05);
        g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        o.connect(g); o.start(now); o.stop(now + 0.05);
    } else if (type === 'enemyDie') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(500, now); o.frequency.exponentialRampToValueAtTime(80, now + 0.15);
        g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.15);
    } else if (type === 'pickup') {
        for (let i = 0; i < 3; i++) {
            const o = audioCtx.createOscillator(); o.type = 'square';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(400 + i * 200, now + i * 0.06);
            gi.gain.setValueAtTime(0.1, now + i * 0.06);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.08);
            o.connect(gi); o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.08);
        }
    } else if (type === 'playerHit') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 200;
        g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        s.connect(f); f.connect(g); s.start(now);
    } else if (type === 'waveStart') {
        [400, 500, 700].forEach((fr, i) => {
            const o = audioCtx.createOscillator(); o.type = 'square';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(fr, now + i * 0.12);
            gi.gain.setValueAtTime(0.12, now + i * 0.12);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.15);
            o.connect(gi); o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.15);
        });
    } else if (type === 'gameOver') {
        [500, 400, 250].forEach((fr, i) => {
            const o = audioCtx.createOscillator(); o.type = 'triangle';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(fr, now + i * 0.2);
            gi.gain.setValueAtTime(0.15, now + i * 0.2);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 0.3);
            o.connect(gi); o.start(now + i * 0.2); o.stop(now + i * 0.2 + 0.3);
        });
    }
}

// Touch joysticks - floating style
function setupJoy(zoneId, knobId, joyObj) {
    const zone = document.getElementById(zoneId);
    const knob = document.getElementById(knobId);
    const maxR = 40;
    const deadzone = 20;

    function update(cx, cy) {
        const r = zone.getBoundingClientRect();
        const centerX = r.left + r.width / 2;
        const centerY = r.top + r.height / 2;
        let dx = cx - centerX;
        let dy = cy - centerY;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > maxR) { dx = dx / d * maxR; dy = dy / d * maxR; }
        knob.style.left = (r.width / 2 + dx) + 'px';
        knob.style.top = (r.height / 2 + dy) + 'px';
        knob.style.transform = 'translate(-50%, -50%)';
        // Apply deadzone
        if (d < deadzone) {
            joyObj.x = 0;
            joyObj.y = 0;
        } else {
            const effectiveD = (d - deadzone) / (maxR - deadzone);
            const clampedD = Math.min(effectiveD, 1);
            joyObj.x = (dx / d) * clampedD;
            joyObj.y = (dy / d) * clampedD;
        }
    }

    function reset() {
        joyObj.active = false;
        joyObj.x = 0;
        joyObj.y = 0;
        joyObj.touchId = null;
        knob.style.left = '50%';
        knob.style.top = '50%';
        knob.style.transform = 'translate(-50%, -50%)';
        zone.classList.remove('active');
    }

    // Initialize knob centered
    knob.style.left = '50%';
    knob.style.top = '50%';
    knob.style.transform = 'translate(-50%, -50%)';

    zone.addEventListener('touchstart', e => {
        e.preventDefault();
        initAudio();
        const t = e.changedTouches[0];
        joyObj.active = true;
        joyObj.touchId = t.identifier;
        zone.classList.add('active');
        update(t.clientX, t.clientY);
    }, { passive: false });

    zone.addEventListener('touchmove', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            if (t.identifier === joyObj.touchId) update(t.clientX, t.clientY);
        }
    }, { passive: false });

    zone.addEventListener('touchend', e => {
        for (const t of e.changedTouches) {
            if (t.identifier === joyObj.touchId) reset();
        }
    });
    zone.addEventListener('touchcancel', reset);
}
setupJoy('moveZone', 'moveKnob', moveJoy);
setupJoy('aimZone', 'aimKnob', aimJoy);

function createPlayer() {

// ========== SPRITE DRAWING ==========
function drawPlayer(p) {
    if (p.iFrames > 0 && Math.floor(p.iFrames / 4) % 2 === 0) return;
    const s = Math.min(scaleX, scaleY);
    ctx.save();
    ctx.translate(Math.round(p.x), Math.round(p.y));
    ctx.rotate(p.angle);
    const bc = p.doubleDmg > 0 ? '#f44' : '#0f0';
    ctx.fillStyle = bc;
    ctx.fillRect(-6*s, -6*s, 12*s, 12*s);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(-4*s, -4*s, 8*s, 8*s);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(4*s, -2*s, 8*s, 4*s);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-2*s, -3*s, 2*s, 2*s);
    ctx.fillRect(-2*s, 1*s, 2*s, 2*s);
    if (p.shield > 0) {
        ctx.strokeStyle = `rgba(100,200,255,${0.4 + Math.sin(frameCount * 0.15) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 14*s, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
    if (p.speedBoost > 0 && !lowEnd) {
        for (let i = 0; i < 2; i++) {
            particles.push({ x: p.x - Math.cos(p.angle) * 8*s + rnd(-3, 3), y: p.y - Math.sin(p.angle) * 8*s + rnd(-3, 3), vx: rnd(-0.5, 0.5), vy: rnd(-0.5, 0.5), life: 15, maxLife: 15, r: 2, color: '#44f' });
        }
    }
}

function drawSwarmer(e) {
    const s = Math.min(scaleX, scaleY);
    ctx.save(); ctx.translate(Math.round(e.x), Math.round(e.y));
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#0f0';
    ctx.fillRect(-5*s, -5*s, 10*s, 10*s);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(-3*s, -3*s, 6*s, 6*s);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-3*s, -2*s, 2*s, 2*s); ctx.fillRect(1*s, -2*s, 2*s, 2*s);
    ctx.restore();
}

function drawTank(e) {
    const s = Math.min(scaleX, scaleY);
    ctx.save(); ctx.translate(Math.round(e.x), Math.round(e.y));
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#f40';
    ctx.fillRect(-10*s, -10*s, 20*s, 20*s);
    ctx.fillStyle = '#a20';
    ctx.fillRect(-8*s, -8*s, 16*s, 16*s);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-6*s, -4*s, 3*s, 3*s); ctx.fillRect(3*s, -4*s, 3*s, 3*s);
    if (player) {
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.rotate(a);
    }
    ctx.fillStyle = '#f80';
    ctx.fillRect(6*s, -3*s, 10*s, 6*s);
    ctx.restore();
}

function drawTeleporter(e) {
    const s = Math.min(scaleX, scaleY);
    ctx.save(); ctx.translate(Math.round(e.x), Math.round(e.y));
    const alpha = e.teleTimer < 20 ? e.teleTimer / 20 : 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#f0f';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2 + frameCount * 0.05;
        const r = (i % 2 === 0 ? 7 : 3) * s;
        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawSplitter(e) {
    const s = Math.min(scaleX, scaleY);
    ctx.save(); ctx.translate(Math.round(e.x), Math.round(e.y));
    const sz = (e.big ? 9 : 5) * s;
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#0ff';
    ctx.beginPath();
    ctx.moveTo(0, -sz); ctx.lineTo(sz, sz); ctx.lineTo(-sz, sz);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#088';
    const sz2 = sz * 0.6;
    ctx.beginPath();
    ctx.moveTo(0, -sz2); ctx.lineTo(sz2, sz2); ctx.lineTo(-sz2, sz2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function drawBoss(e) {
    const s = Math.min(scaleX, scaleY);
    ctx.save(); ctx.translate(Math.round(e.x), Math.round(e.y));
    if (e.bossType === 'megaTank') {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f60';
        ctx.fillRect(-16*s, -16*s, 32*s, 32*s);
        ctx.fillStyle = '#a30';
        ctx.fillRect(-12*s, -12*s, 24*s, 24*s);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-8*s, -6*s, 4*s, 4*s); ctx.fillRect(4*s, -6*s, 4*s, 4*s);
        if (player) {
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            ctx.rotate(a);
        }
        ctx.fillStyle = '#fa0';
        ctx.fillRect(10*s, -4*s, 14*s, 8*s);
    } else {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f0f';
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2 + frameCount * 0.03;
            const r = (12 + Math.sin(frameCount * 0.1 + i) * 3) * s;
            ctx.fillRect(Math.cos(a) * r - 3*s, Math.sin(a) * r - 3*s, 6*s, 6*s);
        }
        ctx.fillStyle = '#a0a';
        ctx.beginPath(); ctx.arc(0, 0, 8*s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-3*s, -3*s, 3*s, 3*s); ctx.fillRect(1*s, -3*s, 3*s, 3*s);
    }
    ctx.restore();
    // HP bar
    const bw = 40 * s, bh = 4 * s;
    ctx.fillStyle = '#300';
    ctx.fillRect(Math.round(e.x - bw / 2), Math.round(e.y - 24 * s), bw, bh);
    ctx.fillStyle = '#f00';
    const hpRatio = Math.max(0, Math.min(1, safeNum(e.hp / e.maxHp, 0)));
    ctx.fillRect(Math.round(e.x - bw / 2), Math.round(e.y - 24 * s), bw * hpRatio, bh);
}

// ========== UTILITY ==========
function rnd(a, b) { return a + Math.random() * (b - a); }
function dist(a, b) {
    const dx = safeNum(a.x) - safeNum(b.x);
    const dy = safeNum(a.y) - safeNum(b.y);
    return Math.sqrt(dx * dx + dy * dy);
}
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function aabb(a, b) {
    const aw = a.w || a.r * 2 || 8, ah = a.h || a.r * 2 || 8;
    const bw = b.w || b.r * 2 || 8, bh = b.h || b.r * 2 || 8;
    return a.x - aw / 2 < b.x + bw / 2 && a.x + aw / 2 > b.x - bw / 2 &&
           a.y - ah / 2 < b.y + bh / 2 && a.y + ah / 2 > b.y - bh / 2;
}

function spawnParticles(x, y, count, color, speed, life) {
    const maxP = lowEnd ? MAX_PARTICLES_LOW : MAX_PARTICLES;
    const reduceCount = lowEnd ? Math.ceil(count / 2) : count;
    for (let i = 0; i < reduceCount; i++) {
        if (particles.length >= maxP) break;
        const a = rnd(0, Math.PI * 2);
        const s = rnd(speed * 0.3, speed);
        particles.push({ x: safeNum(x), y: safeNum(y), vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, maxLife: life, r: rnd(1, 3), color });
    }
}

function addShake(mag) { shakeMag = Math.min(shakeMag + mag, 12); }

// ========== WEAPONS ==========
const WEAPON_NAMES = ['PISTOL', 'SHOTGUN', 'LASER', 'ROCKET'];
const WEAPON_COLORS = ['#ff0', '#fa0', '#0ff', '#f44'];
const FIRE_RATES = [10, 30, 2, 60];

function fireWeapon() {
    const p = player;
    if (!p || p.fireTimer > 0) return;
    const w = p.weapon;
    if (p.ammo[w] <= 0 && w !== 0) { p.weapon = 0; return; }
    const dmgMult = p.doubleDmg > 0 ? 2 : 1;
    p.fireTimer = FIRE_RATES[w];
    const bulletSpeed = 8 * Math.min(scaleX, scaleY);

    if (w === 0) {
        const a = p.angle + rnd(-0.03, 0.03);
        bullets.push({ x: p.x + Math.cos(p.angle) * 10, y: p.y + Math.sin(p.angle) * 10, vx: Math.cos(a) * bulletSpeed, vy: Math.sin(a) * bulletSpeed, dmg: 10 * dmgMult, life: 60, r: 2 * Math.min(scaleX, scaleY), color: '#ff0', type: 'bullet' });
        playSound('pistol');
    } else if (w === 1) {
        for (let i = 0; i < 5; i++) {
            const a = p.angle + rnd(-0.26, 0.26);
            bullets.push({ x: p.x + Math.cos(p.angle) * 10, y: p.y + Math.sin(p.angle) * 10, vx: Math.cos(a) * bulletSpeed * 0.875, vy: Math.sin(a) * bulletSpeed * 0.875, dmg: 8 * dmgMult, life: 22, r: 2 * Math.min(scaleX, scaleY), color: '#fa0', type: 'bullet' });
        }
        p.ammo[1]--;
        playSound('shotgun');
    } else if (w === 2) {
        const dx = Math.cos(p.angle), dy = Math.sin(p.angle);
        const maxDist = Math.max(W, H);
        for (let ei = 0; ei < enemies.length; ei++) {
            const e = enemies[ei];
            if (e.dead) continue;
            const ex = e.x - p.x, ey = e.y - p.y;
            const proj = ex * dx + ey * dy;
            if (proj < 0 || proj > maxDist) continue;
            const perpDist = Math.abs(ex * dy - ey * dx);
            const hitR = (e.w || 10) / 2 + 4;
            if (perpDist < hitR) {
                e.hp -= 3 * dmgMult;
                e.flash = 3;
            }
        }
        bullets.push({ x: p.x + dx * 10, y: p.y + dy * 10, vx: dx, vy: dy, dmg: 0, life: 3, r: 0, color: '#0ff', type: 'laser', length: maxDist });
        p.ammo[2]--;
        if (frameCount % 3 === 0) playSound('laser');
    } else if (w === 3) {
        const a = p.angle;
        bullets.push({ x: p.x + Math.cos(a) * 10, y: p.y + Math.sin(a) * 10, vx: Math.cos(a) * bulletSpeed * 0.625, vy: Math.sin(a) * bulletSpeed * 0.625, dmg: 30 * dmgMult, splashDmg: 20 * dmgMult, life: 60, r: 4 * Math.min(scaleX, scaleY), color: '#f44', type: 'rocket' });
        p.ammo[3]--;
        playSound('rocket');
    }
    if (p.ammo[w] <= 0 && w !== 0) p.weapon = 0;
}

// ========== ENEMIES ==========
function spawnEnemy(type, x, y) {
    const s = Math.min(scaleX, scaleY);
    if (x === undefined) {
        const side = Math.floor(rnd(0, 4));
        if (side === 0) { x = ARENA_L + 10; y = rnd(ARENA_T + 10, ARENA_B - 10); }
        else if (side === 1) { x = ARENA_R - 10; y = rnd(ARENA_T + 10, ARENA_B - 10); }
        else if (side === 2) { x = rnd(ARENA_L + 10, ARENA_R - 10); y = ARENA_T + 10; }
        else { x = rnd(ARENA_L + 10, ARENA_R - 10); y = ARENA_B - 10; }
    }
    // Clamp spawn position inside arena
    x = clamp(safeNum(x, (ARENA_L + ARENA_R) / 2), ARENA_L + 10, ARENA_R - 10);
    y = clamp(safeNum(y, (ARENA_T + ARENA_B) / 2), ARENA_T + 10, ARENA_B - 10);
    const base = { x, y, flash: 0, dead: false, type };
    if (type === 'swarmer') return Object.assign(base, { hp: 15, maxHp: 15, speed: 2.5 * s, w: 10 * s, h: 10 * s, score: 10 });
    if (type === 'tank') return Object.assign(base, { hp: 80, maxHp: 80, speed: 1 * s, w: 20 * s, h: 20 * s, score: 50, shootTimer: 120 + Math.floor(rnd(0, 60)) });
    if (type === 'teleporter') return Object.assign(base, { hp: 30, maxHp: 30, speed: 2 * s, w: 14 * s, h: 14 * s, score: 30, teleTimer: 60, teleCooldown: 120 + Math.floor(rnd(0, 120)) });
    if (type === 'splitter') return Object.assign(base, { hp: 50, maxHp: 50, speed: 1.5 * s, w: 18 * s, h: 18 * s, score: 40, big: true });
    if (type === 'splitterSmall') return Object.assign(base, { hp: 20, maxHp: 20, speed: 3 * s, w: 10 * s, h: 10 * s, score: 15, big: false });
    if (type === 'megaTank') return Object.assign(base, { hp: 300, maxHp: 300, speed: 0.7 * s, w: 32 * s, h: 32 * s, score: 200, shootTimer: 80, bossType: 'megaTank', boss: true, spawnTimer: 300 });
    if (type === 'queen') return Object.assign(base, { hp: 500, maxHp: 500, speed: 1.2 * s, w: 24 * s, h: 24 * s, score: 500, shootTimer: 60, bossType: 'queen', boss: true, teleTimer: 60, teleCooldown: 180, spawnTimer: 240 });
    // Fallback
    return Object.assign(base, { hp: 15, maxHp: 15, speed: 2 * s, w: 10 * s, h: 10 * s, score: 10 });
}

function pickWeightedType(waveIdx) {
    const def = WAVES[waveIdx];
    const types = ['swarmer', 'tank', 'teleporter', 'splitter'];
    const weights = [def[1], def[2], def[3], def[4]];
    const total = weights.reduce((a, b) => a + b, 0);
    if (total <= 0) return 'swarmer';
    let r = rnd(0, total);
    for (let i = 0; i < 4; i++) { r -= weights[i]; if (r <= 0) return types[i]; }
    return 'swarmer';
}

// ========== PICKUPS ==========
function spawnPickup(x, y) {
    const roll = Math.random();
    if (roll < 0.10) {
        const types = ['shotgun', 'laser', 'rocket'];
        const t = types[Math.floor(rnd(0, 3))];
        pickups.push({ x: safeNum(x), y: safeNum(y), type: 'weapon', weaponType: t, life: 600, r: 8 * Math.min(scaleX, scaleY) });
    } else if (roll < 0.25) {
        const types = ['speed', 'shield', 'doubleDmg', 'freeze'];
        const t = types[Math.floor(rnd(0, 4))];
        pickups.push({ x: safeNum(x), y: safeNum(y), type: 'powerup', powerType: t, life: 600, r: 8 * Math.min(scaleX, scaleY) });
    }
}

const PICKUP_COLORS = { shotgun: '#fa0', laser: '#0ff', rocket: '#f44', speed: '#44f', shield: '#cdf', doubleDmg: '#f22', freeze: '#aef' };

function drawPickup(pk) {
    const s = Math.min(scaleX, scaleY);
    const c = pk.type === 'weapon' ? PICKUP_COLORS[pk.weaponType] : PICKUP_COLORS[pk.powerType];
    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.2;
    ctx.save(); ctx.translate(Math.round(pk.x), Math.round(pk.y));
    ctx.scale(pulse, pulse);
    if (pk.life < 120 && Math.floor(pk.life / 8) % 2 === 0) { ctx.restore(); return; }
    ctx.fillStyle = c;
    if (pk.type === 'weapon') {
        ctx.fillRect(-6*s, -3*s, 12*s, 6*s);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4*s, -1*s, 3*s, 2*s);
    } else {
        ctx.beginPath(); ctx.arc(0, 0, 6*s, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `${Math.round(7*s)}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const labels = { speed: 'S', shield: 'H', doubleDmg: 'D', freeze: 'F' };
        ctx.fillText(labels[pk.powerType], 0, 1);
    }
    ctx.restore();
}

// ========== HAZARDS ==========
function spawnLaserSweep() {
    if (wave < 6) return;
    if (Math.random() < 0.003) {
        const horiz = Math.random() < 0.5;
        const pos = horiz ? rnd(ARENA_T + 30, ARENA_B - 30) : rnd(ARENA_L + 30, ARENA_R - 30);
        hazards.push({ horiz, pos, timer: 120, active: false });
    }
}

// ========== GAME LOGIC ==========
function resetGameState() {
    enemies = [];
    bullets = [];
    particles = [];
    pickups = [];
    hazards = [];
    enemyBullets = [];
    textPopups = [];
    comboCount = 0;
    comboTimer = 0;
    shakeMag = 0;
    shakeX = 0;
    shakeY = 0;
    borderFlashTimer = 0;
    score = 0;
    wave = 1;
}

function startGame() {
    initAudio();
    resetGameState();
    state = 'WAVE_INTRO';
    player = createPlayer();
    startWave();
}

function startWave() {
    const def = WAVES[wave - 1];
    if (!def) return;
    totalEnemiesThisWave = def[0];
    enemiesToSpawn = def[0];
    enemiesKilledThisWave = 0;
    spawnTimer = 60;
    waveText = `WAVE ${wave} \u2014 "${WAVE_TITLES[wave - 1]}"`;
    waveTextTimer = 0;
    state = 'WAVE_INTRO';
    playSound('waveStart');

    storyLines = WAVE_STORIES[wave - 1] || [];
    storyLineIndex = 0;
    storyCharIndex = 0;
    storyTypeTimer = 0;
    storyDone = false;
    storySkipReady = false;
    storyHoldTimer = 0;

    if (def[6]) {
        const boss = spawnEnemy(def[6], W / 2, ARENA_T + 40 * scaleY);
        if (boss) enemies.push(boss);
    }
}

function update() {
    frameCount++;
    blinkTimer = (blinkTimer + 1) % 60;

    if (state === 'TITLE') return;
    if (state === 'GAME_OVER' || state === 'VICTORY') return;

    if (state === 'WAVE_INTRO') {
        if (!storyDone) {
            storyTypeTimer++;
            if (storyTypeTimer >= STORY_TYPE_SPEED) {
                storyTypeTimer = 0;
                storyCharIndex++;
                if (storyLineIndex < storyLines.length && storyCharIndex > storyLines[storyLineIndex].length) {
                    storyLineIndex++;
                    storyCharIndex = 0;
                }
                if (storyLineIndex >= storyLines.length) {
                    storyDone = true;
                    storyHoldTimer = 150;
                }
            }
        } else {
            storyHoldTimer--;
            if (storyHoldTimer <= 0) {
                storySkipReady = true;
            }
            if (storyHoldTimer <= -150) {
                state = 'PLAYING';
            }
        }
    }

    const p = player;
    if (!p) return;

    // === Player movement ===
    let mx = 0, my = 0;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (moveJoy.active) { mx += moveJoy.x; my += moveJoy.y; }
    const ml = Math.sqrt(mx * mx + my * my);
    const spd = p.speed * (p.speedBoost > 0 ? 1.5 : 1);
    if (ml > 0) { mx = mx / ml * spd; my = my / ml * spd; }
    p.x = clamp(safeNum(p.x + mx), ARENA_L + 10, ARENA_R - 10);
    p.y = clamp(safeNum(p.y + my), ARENA_T + 10, ARENA_B - 10);

    // === Aim ===
    if (aimJoy.active && (Math.abs(aimJoy.x) > 0.15 || Math.abs(aimJoy.y) > 0.15)) {
        p.angle = Math.atan2(aimJoy.y, aimJoy.x);
    } else {
        // mouseX/mouseY are already in canvas pixel coordinates
        p.angle = Math.atan2(mouseY - p.y, mouseX - p.x);
    }

    // === Fire ===
    if (p.fireTimer > 0) p.fireTimer--;
    const wantsToFire = mouseDown || (aimJoy.active && (Math.abs(aimJoy.x) > 0.2 || Math.abs(aimJoy.y) > 0.2));
    if (wantsToFire && state === 'PLAYING') fireWeapon();

    // Weapon switching
    for (let i = 1; i <= 4; i++) {
        if (keys[String(i)]) {
            if (p.ammo[i - 1] > 0 || i === 1) p.weapon = i - 1;
        }
    }

    // === Timers ===
    if (p.iFrames > 0) p.iFrames--;
    if (p.speedBoost > 0) p.speedBoost--;
    if (p.shield > 0) p.shield--;
    if (p.doubleDmg > 0) p.doubleDmg--;
    if (p.freeze > 0) p.freeze--;
    if (borderFlashTimer > 0) borderFlashTimer--;

    // === Spawn enemies ===
    if (state === 'PLAYING' && enemiesToSpawn > 0) {
        spawnTimer--;
        if (spawnTimer <= 0) {
            const def = WAVES[wave - 1];
            if (def) {
                spawnTimer = def[5] + Math.floor(rnd(-10, 10));
                const t = pickWeightedType(wave - 1);
                const e = spawnEnemy(t);
                if (e) enemies.push(e);
                enemiesToSpawn--;
            }
        }
    }

    // === Update enemies ===
    const freezeMult = p.freeze > 0 ? 0.3 : 1;
    for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (e.dead) continue;
        if (e.flash > 0) e.flash--;
        const dx = p.x - e.x, dy = p.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;

        if (e.type === 'swarmer' || e.type === 'splitter' || e.type === 'splitterSmall') {
            const weave = Math.sin(frameCount * 0.1 + e.x) * 0.5;
            e.x += (dx / d * e.speed + weave) * freezeMult;
            e.y += (dy / d * e.speed) * freezeMult;
        } else if (e.type === 'tank' || (e.boss && e.bossType === 'megaTank')) {
            e.x += dx / d * e.speed * freezeMult;
            e.y += dy / d * e.speed * freezeMult;
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                e.shootTimer = e.boss ? 80 : (120 + Math.floor(rnd(0, 60)));
                const a = Math.atan2(dy, dx);
                const bSpd = 3 * Math.min(scaleX, scaleY);
                if (e.boss) {
                    for (let i = -1; i <= 1; i++) {
                        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a + i * 0.3) * bSpd, vy: Math.sin(a + i * 0.3) * bSpd, dmg: 15, life: 120, r: 3 * Math.min(scaleX, scaleY), color: '#f80' });
                    }
                } else {
                    enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * bSpd, vy: Math.sin(a) * bSpd, dmg: 15, life: 120, r: 3 * Math.min(scaleX, scaleY), color: '#f80' });
                }
            }
            if (e.boss && e.spawnTimer !== undefined) {
                e.spawnTimer--;
                if (e.spawnTimer <= 0) {
                    e.spawnTimer = 300;
                    for (let i = 0; i < 2; i++) {
                        const se = spawnEnemy('swarmer', e.x + rnd(-20, 20), e.y + rnd(-20, 20));
                        if (se) enemies.push(se);
                    }
                }
            }
        } else if (e.type === 'teleporter') {
            e.teleCooldown--;
            if (e.teleCooldown <= 0) {
                e.x = rnd(ARENA_L + 20, ARENA_R - 20);
                e.y = rnd(ARENA_T + 20, ARENA_B - 20);
                e.teleTimer = 0;
                e.teleCooldown = 120 + Math.floor(rnd(0, 120));
            }
            if (e.teleTimer < 60) e.teleTimer++;
            if (e.teleTimer > 15) {
                e.x += dx / d * e.speed * freezeMult;
                e.y += dy / d * e.speed * freezeMult;
            }
        } else if (e.boss && e.bossType === 'queen') {
            e.x += dx / d * e.speed * freezeMult;
            e.y += dy / d * e.speed * freezeMult;
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                e.shootTimer = 60;
                const a = Math.atan2(dy, dx);
                const bSpd = 2.5 * Math.min(scaleX, scaleY);
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * bSpd, vy: Math.sin(a) * bSpd, dmg: 12, life: 180, r: 4 * Math.min(scaleX, scaleY), color: '#f0f', homing: true });
            }
            if (e.teleCooldown !== undefined) {
                e.teleCooldown--;
                if (e.teleCooldown <= 0) {
                    e.x = rnd(ARENA_L + 30, ARENA_R - 30);
                    e.y = rnd(ARENA_T + 30, ARENA_B - 30);
                    e.teleCooldown = 180 + Math.floor(rnd(0, 60));
                    spawnParticles(e.x, e.y, 8, '#f0f', 3, 20);
                }
            }
            if (e.spawnTimer !== undefined) {
                e.spawnTimer--;
                if (e.spawnTimer <= 0) {
                    e.spawnTimer = 240;
                    const types = ['swarmer', 'teleporter', 'splitter'];
                    const se = spawnEnemy(types[Math.floor(rnd(0, 3))], e.x + rnd(-20, 20), e.y + rnd(-20, 20));
                    if (se) enemies.push(se);
                }
            }
        }

        // Keep in arena
        e.x = clamp(safeNum(e.x), ARENA_L + 5, ARENA_R - 5);
        e.y = clamp(safeNum(e.y), ARENA_T + 5, ARENA_B - 5);

        // Collide with player
        if (p.iFrames <= 0 && aabb(p, e)) {
            hurtPlayer(15);
        }
    }

    // === Update bullets ===
    for (let bi = 0; bi < bullets.length; bi++) {
        const b = bullets[bi];
        if (b.type === 'laser') { b.life--; continue; }
        b.x = safeNum(b.x + b.vx);
        b.y = safeNum(b.y + b.vy);
        b.life--;
        if (b.type === 'rocket' && !lowEnd) {
            particles.push({ x: b.x + rnd(-2, 2), y: b.y + rnd(-2, 2), vx: rnd(-0.5, 0.5), vy: rnd(-0.5, 0.5), life: 12, maxLife: 12, r: 2, color: '#f80' });
        }
        if (b.x < ARENA_L || b.x > ARENA_R || b.y < ARENA_T || b.y > ARENA_B) { b.life = 0; continue; }
        for (let ei = 0; ei < enemies.length; ei++) {
            const e = enemies[ei];
            if (e.dead) continue;
            if (b.type === 'laser') continue;
            if (aabb(b, e)) {
                e.hp -= b.dmg;
                e.flash = 6;
                playSound('hit');
                if (b.type === 'rocket') {
                    explodeAt(b.x, b.y, b.splashDmg || 0);
                }
                b.life = 0;
                break;
            }
        }
    }
    bullets = bullets.filter(b => b.life > 0);

    // === Update enemy bullets ===
    for (let bi = 0; bi < enemyBullets.length; bi++) {
        const b = enemyBullets[bi];
        if (b.homing && player) {
            const hdx = player.x - b.x, hdy = player.y - b.y;
            const hd = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
            b.vx += hdx / hd * 0.05; b.vy += hdy / hd * 0.05;
            const bs = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            const maxBs = 3 * Math.min(scaleX, scaleY);
            if (bs > maxBs) { b.vx = b.vx / bs * maxBs; b.vy = b.vy / bs * maxBs; }
        }
        b.x = safeNum(b.x + b.vx);
        b.y = safeNum(b.y + b.vy);
        b.life--;
        if (b.x < ARENA_L || b.x > ARENA_R || b.y < ARENA_T || b.y > ARENA_B) { b.life = 0; continue; }
        if (p.iFrames <= 0 && dist(b, p) < 10 * Math.min(scaleX, scaleY)) {
            hurtPlayer(b.dmg);
            b.life = 0;
        }
    }
    enemyBullets = enemyBullets.filter(b => b.life > 0);

    // === Enemy deaths ===
    for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (e.dead) continue;
        if (e.hp <= 0) {
            e.dead = true;
            comboCount++;
            comboTimer = 120;
            const comboMultiplier = 1 + comboCount * 0.5;
            const earnedScore = Math.round(e.score * comboMultiplier);
            score += earnedScore;
            textPopups.push({ x: e.x, y: e.y, vx: 0, vy: -1.5, life: 45, maxLife: 45, text: `+${earnedScore}`, color: '#ff0', size: Math.round(10 * Math.min(scaleX, scaleY)) });
            if (comboCount >= 2) {
                textPopups.push({ x: e.x, y: e.y - 12, vx: 0, vy: -1.2, life: 45, maxLife: 45, text: `x${comboMultiplier.toFixed(1)}`, color: '#f80', size: Math.round(8 * Math.min(scaleX, scaleY)) });
            }
            enemiesKilledThisWave++;
            playSound('enemyDie');
            const col = e.type === 'swarmer' ? '#0f0' : e.type === 'tank' ? '#f40' : e.type === 'teleporter' ? '#f0f' : '#0ff';
            spawnParticles(e.x, e.y, 10, col, 3, 25);
            spawnPickup(e.x, e.y);
            if (e.type === 'splitter' && e.big) {
                for (let i = 0; i < 3; i++) {
                    const se = spawnEnemy('splitterSmall', e.x + rnd(-15, 15), e.y + rnd(-15, 15));
                    if (se) enemies.push(se);
                }
            }
            if (e.boss) {
                addShake(10);
                spawnParticles(e.x, e.y, 30, '#ff0', 5, 40);
                playSound('explode');
            }
        }
    }
    enemies = enemies.filter(e => !e.dead);

    // === Check wave complete ===
    if (state === 'PLAYING' && enemiesToSpawn <= 0 && enemies.length === 0) {
        const healAmount = Math.round(player.maxHp * 0.15);
        const oldHp = player.hp;
        player.hp = Math.min(player.hp + healAmount, player.maxHp);
        const actualHeal = player.hp - oldHp;
        if (actualHeal > 0) {
            textPopups.push({ x: player.x, y: player.y, vx: 0, vy: -1.5, life: 60, maxLife: 60, text: `+${actualHeal}`, color: '#0f0', size: Math.round(12 * Math.min(scaleX, scaleY)) });
        }
        if (wave >= 10) {
            state = 'VICTORY';
            victoryStarted = false;
            playSound('waveStart');
        } else {
            wave++;
            startWave();
        }
    }

    // === Pickups ===
    const pickupRange = 16 * Math.min(scaleX, scaleY);
    for (let pi = 0; pi < pickups.length; pi++) {
        const pk = pickups[pi];
        pk.life--;
        if (dist(pk, p) < pickupRange) {
            pk.life = 0;
            playSound('pickup');
            if (pk.type === 'weapon') {
                const idx = pk.weaponType === 'shotgun' ? 1 : pk.weaponType === 'laser' ? 2 : 3;
                const ammoAmounts = [0, 20, 50, 8];
                if (p.ammo[idx] > 0) {
                    p.ammo[idx] += ammoAmounts[idx];
                } else {
                    p.ammo[idx] = ammoAmounts[idx];
                    p.weapon = idx;
                }
            } else {
                if (pk.powerType === 'speed') p.speedBoost = 480;
                else if (pk.powerType === 'shield') { p.shield = 360; p.shieldHp = 50; }
                else if (pk.powerType === 'doubleDmg') p.doubleDmg = 480;
                else if (pk.powerType === 'freeze') p.freeze = 300;
            }
        }
    }
    pickups = pickups.filter(pk => pk.life > 0);

    // === Hazards ===
    spawnLaserSweep();
    for (let hi = 0; hi < hazards.length; hi++) {
        const hz = hazards[hi];
        hz.timer--;
        if (hz.timer <= 0 && !hz.active) { hz.active = true; hz.timer = 30; }
        if (hz.active) {
            hz.timer--;
            if (hz.horiz) {
                if (Math.abs(p.y - hz.pos) < 8 && p.iFrames <= 0) hurtPlayer(20);
            } else {
                if (Math.abs(p.x - hz.pos) < 8 && p.iFrames <= 0) hurtPlayer(20);
            }
        }
    }
    hazards = hazards.filter(hz => hz.active ? hz.timer > 0 : true);

    // === Combo timer ===
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboCount = 0;
    }

    // === Text popups ===
    for (let ti = 0; ti < textPopups.length; ti++) {
        const tp = textPopups[ti];
        tp.x += tp.vx; tp.y += tp.vy;
        tp.life--;
    }
    textPopups = textPopups.filter(tp => tp.life > 0);

    // === Particles ===
    for (let pi = 0; pi < particles.length; pi++) {
        const pt = particles[pi];
        pt.x += pt.vx; pt.y += pt.vy;
        pt.vx *= 0.96; pt.vy *= 0.96;
        pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);

    // === Screen shake ===
    if (shakeMag > 0) {
        shakeX = rnd(-shakeMag, shakeMag);
        shakeY = rnd(-shakeMag, shakeMag);
        shakeMag *= 0.85;
        if (shakeMag < 0.5) { shakeMag = 0; shakeX = 0; shakeY = 0; }
    }

    // === Fence damage ===
    const fenceDist = 12 * Math.min(scaleX, scaleY);
    if (p.x <= ARENA_L + fenceDist || p.x >= ARENA_R - fenceDist || p.y <= ARENA_T + fenceDist || p.y >= ARENA_B - fenceDist) {
        if (frameCount % 15 === 0 && p.iFrames <= 0) hurtPlayer(5);
    }
}

function hurtPlayer(dmg) {
    const p = player;
    if (!p) return;
    if (p.shield > 0 && p.shieldHp > 0) {
        p.shieldHp -= dmg;
        if (p.shieldHp <= 0) { p.shield = 0; p.shieldHp = 0; }
        addShake(2);
        return;
    }
    p.hp -= dmg;
    p.iFrames = 60;
    addShake(4);
    borderFlashTimer = 10;
    playSound('playerHit');
    spawnParticles(p.x, p.y, 6, '#f00', 2, 15);
    if (p.hp <= 0) {
        p.hp = 0;
        state = 'GAME_OVER';
        playSound('gameOver');
        spawnParticles(p.x, p.y, 30, '#ff0', 5, 40);
    }
}

function explodeAt(x, y, dmg) {
    addShake(6);
    playSound('explode');
    spawnParticles(x, y, 16, '#f80', 4, 30);
    spawnParticles(x, y, 8, '#ff0', 2, 20);
    const splashR = 50 * Math.min(scaleX, scaleY);
    for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (e.dead) continue;
        if (dist({ x, y }, e) < splashR) {
            e.hp -= dmg;
            e.flash = 6;
        }
    }
}

// ========== DRAW ==========
function draw() {
    const s = Math.min(scaleX, scaleY);
    ctx.save();
    ctx.translate(Math.round(shakeX), Math.round(shakeY));

    // Background
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, W, H);

    // Arena floor
    ctx.fillStyle = '#08081a';
    ctx.fillRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);

    // Grid on floor - batch into single path
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(40,40,80,0.25)';
    ctx.lineWidth = 1;
    const gridSize = Math.round(32 * s);
    for (let x = ARENA_L; x <= ARENA_R; x += gridSize) {
        ctx.moveTo(x, ARENA_T); ctx.lineTo(x, ARENA_B);
    }
    for (let y = ARENA_T; y <= ARENA_B; y += gridSize) {
        ctx.moveTo(ARENA_L, y); ctx.lineTo(ARENA_R, y);
    }
    ctx.stroke();

    // Electric fence border
    const fenceGlow = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
    ctx.strokeStyle = `rgba(0,255,255,${fenceGlow})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
    ctx.strokeRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);
    ctx.shadowBlur = 0;
    if (frameCount % 8 === 0 && !lowEnd) {
        const side = Math.floor(rnd(0, 4));
        let sx, sy;
        if (side === 0) { sx = ARENA_L; sy = rnd(ARENA_T, ARENA_B); }
        else if (side === 1) { sx = ARENA_R; sy = rnd(ARENA_T, ARENA_B); }
        else if (side === 2) { sx = rnd(ARENA_L, ARENA_R); sy = ARENA_T; }
        else { sx = rnd(ARENA_L, ARENA_R); sy = ARENA_B; }
        spawnParticles(sx, sy, 2, '#0ff', 2, 10);
    }

    // Hazards
    for (let hi = 0; hi < hazards.length; hi++) {
        const hz = hazards[hi];
        if (hz.active) {
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#f00'; ctx.shadowBlur = 15;
            ctx.beginPath();
            if (hz.horiz) {
                ctx.moveTo(ARENA_L, Math.round(hz.pos)); ctx.lineTo(ARENA_R, Math.round(hz.pos));
            } else {
                ctx.moveTo(Math.round(hz.pos), ARENA_T); ctx.lineTo(Math.round(hz.pos), ARENA_B);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else {
            ctx.strokeStyle = `rgba(255,0,0,${0.2 + Math.sin(frameCount * 0.3) * 0.2})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            if (hz.horiz) {
                ctx.moveTo(ARENA_L, Math.round(hz.pos)); ctx.lineTo(ARENA_R, Math.round(hz.pos));
            } else {
                ctx.moveTo(Math.round(hz.pos), ARENA_T); ctx.lineTo(Math.round(hz.pos), ARENA_B);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    // Pickups
    for (let pi = 0; pi < pickups.length; pi++) drawPickup(pickups[pi]);

    // Enemies
    for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (e.dead) continue;
        if (e.boss) drawBoss(e);
        else if (e.type === 'swarmer') drawSwarmer(e);
        else if (e.type === 'tank') drawTank(e);
        else if (e.type === 'teleporter') drawTeleporter(e);
        else if (e.type === 'splitter' || e.type === 'splitterSmall') drawSplitter(e);
    }

    // Player
    if (player && state !== 'GAME_OVER') drawPlayer(player);

    // Bullets - batch regular bullets
    ctx.shadowBlur = 0;
    for (let bi = 0; bi < bullets.length; bi++) {
        const b = bullets[bi];
        if (b.type === 'laser') {
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(Math.round(b.x), Math.round(b.y));
            ctx.lineTo(Math.round(b.x + b.vx * b.length), Math.round(b.y + b.vy * b.length));
            ctx.stroke();
            ctx.lineWidth = 1; ctx.strokeStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(Math.round(b.x), Math.round(b.y));
            ctx.lineTo(Math.round(b.x + b.vx * b.length), Math.round(b.y + b.vy * b.length));
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(Math.round(b.x), Math.round(b.y), b.r, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Enemy bullets
    for (let bi = 0; bi < enemyBullets.length; bi++) {
        const b = enemyBullets[bi];
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(Math.round(b.x), Math.round(b.y), b.r, 0, Math.PI * 2); ctx.fill();
    }

    // Particles - batch by color
    if (particles.length > 0) {
        for (let pi = 0; pi < particles.length; pi++) {
            const pt = particles[pi];
            const alpha = pt.life / pt.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = pt.color;
            ctx.fillRect(Math.round(pt.x - pt.r / 2), Math.round(pt.y - pt.r / 2), pt.r, pt.r);
        }
        ctx.globalAlpha = 1;
    }

    // Text popups
    for (let ti = 0; ti < textPopups.length; ti++) {
        const tp = textPopups[ti];
        const alpha = tp.life / tp.maxLife;
        ctx.globalAlpha = alpha;
        ctx.font = `${tp.size}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = tp.color;
        ctx.fillText(tp.text, Math.round(tp.x), Math.round(tp.y));
    }
    ctx.globalAlpha = 1;

    // Crosshair (desktop only)
    if (!isMobile && (state === 'PLAYING' || state === 'WAVE_INTRO')) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        const cx = Math.round(mouseX), cy = Math.round(mouseY);
        ctx.beginPath();
        ctx.moveTo(cx - 8, cy); ctx.lineTo(cx - 3, cy);
        ctx.moveTo(cx + 3, cy); ctx.lineTo(cx + 8, cy);
        ctx.moveTo(cx, cy - 8); ctx.lineTo(cx, cy - 3);
        ctx.moveTo(cx, cy + 3); ctx.lineTo(cx, cy + 8);
        ctx.stroke();
    }

    // Border flash on damage
    if (borderFlashTimer > 0) {
        ctx.fillStyle = `rgba(255,0,0,${borderFlashTimer / 20})`;
        ctx.fillRect(0, 0, W, H);
    }

    // === HUD ===
    if (player && (state === 'PLAYING' || state === 'WAVE_INTRO')) {
        const fs = Math.max(8, Math.round(10 * s));
        const fsSmall = Math.max(6, Math.round(7 * s));
        ctx.font = `${fs}px "Press Start 2P", monospace`;

        // Health bar
        const hbW = Math.round(104 * scaleX);
        const hbH = Math.round(12 * scaleY);
        const hbX = Math.round(8 * scaleX);
        const hbY = Math.round(8 * scaleY);
        ctx.fillStyle = '#300'; ctx.fillRect(hbX, hbY, hbW, hbH);
        const hpPct = Math.max(0, Math.min(1, safeNum(player.hp / player.maxHp, 0)));
        const hpColor = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
        ctx.fillStyle = hpColor; ctx.fillRect(hbX + 2, hbY + 2, (hbW - 4) * hpPct, hbH - 4);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(hbX, hbY, hbW, hbH);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
        ctx.fillText(`HP ${Math.max(0, player.hp)}`, hbX, hbY + hbH + fs + 4);

        // Wave
        ctx.textAlign = 'center';
        ctx.fillStyle = '#0ff';
        ctx.fillText(`WAVE ${wave}/10`, W / 2, hbY + fs);

        // Score
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`SCORE ${score}`, W - hbX, hbY + fs);

        // Weapon + Ammo
        ctx.textAlign = 'left';
        const wn = WEAPON_NAMES[player.weapon];
        const ammoText = player.weapon === 0 ? 'INF' : String(player.ammo[player.weapon]);
        ctx.fillStyle = WEAPON_COLORS[player.weapon];
        // Place weapon info above the joystick area on mobile
        const weaponY = isMobile ? ARENA_B + Math.round(15 * scaleY) : H - Math.round(10 * scaleY);
        ctx.fillText(`${wn} ${ammoText}`, hbX, weaponY);

        // Weapon slots
        const slotW = Math.round(36 * s);
        const slotH = Math.round(16 * s);
        const slotY = weaponY - slotH - Math.round(4 * scaleY);
        for (let i = 0; i < 4; i++) {
            const sx = Math.round(W / 2 - (slotW * 2 + 6) + i * (slotW + 4));
            ctx.strokeStyle = player.weapon === i ? '#fff' : '#444';
            ctx.lineWidth = player.weapon === i ? 2 : 1;
            ctx.strokeRect(sx, slotY, slotW, slotH);
            ctx.fillStyle = player.ammo[i] > 0 || i === 0 ? WEAPON_COLORS[i] : '#333';
            ctx.font = `${fsSmall}px "Press Start 2P", monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(`${i + 1}:${WEAPON_NAMES[i].substring(0, 3)}`, sx + slotW / 2, slotY + slotH - 3);
        }

        // Active powerups
        ctx.font = `${fsSmall}px "Press Start 2P", monospace`;
        ctx.textAlign = 'right';
        let py = hbY + fs * 2 + Math.round(20 * scaleY);
        if (player.speedBoost > 0) { ctx.fillStyle = '#44f'; ctx.fillText(`SPD ${Math.ceil(player.speedBoost / 60)}s`, W - hbX, py); py += fs + 4; }
        if (player.shield > 0) { ctx.fillStyle = '#cdf'; ctx.fillText(`SHD ${player.shieldHp}`, W - hbX, py); py += fs + 4; }
        if (player.doubleDmg > 0) { ctx.fillStyle = '#f22'; ctx.fillText(`DMGx2 ${Math.ceil(player.doubleDmg / 60)}s`, W - hbX, py); py += fs + 4; }
        if (player.freeze > 0) { ctx.fillStyle = '#aef'; ctx.fillText(`FRZ ${Math.ceil(player.freeze / 60)}s`, W - hbX, py); py += fs + 4; }

        // Combo multiplier display
        if (comboCount >= 2) {
            const comboMult = 1 + comboCount * 0.5;
            ctx.font = `${Math.round(16 * s)}px "Press Start 2P", monospace`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff0';
            ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
            ctx.fillText(`x${comboMult.toFixed(1)}`, W / 2, slotY - Math.round(16 * scaleY));
            ctx.font = `${fsSmall}px "Press Start 2P", monospace`;
            ctx.fillStyle = '#fa0';
            ctx.fillText(`${comboCount} COMBO`, W / 2, slotY - Math.round(4 * scaleY));
            ctx.shadowBlur = 0;
        }
    }

    // === Wave intro text with story ===
    if (state === 'WAVE_INTRO') {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W, H);

        const titleFs = Math.max(10, Math.round(16 * s));
        const storyFs = Math.max(6, Math.round(8 * s));

        ctx.save();
        ctx.font = `${titleFs}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#0ff';
        ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
        ctx.fillText(waveText, W / 2, Math.round(60 * scaleY));
        ctx.shadowBlur = 0;
        ctx.restore();

        ctx.save();
        ctx.font = `${storyFs}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        const startY = Math.round(95 * scaleY);
        const lineH = Math.round(14 * scaleY);

        for (let i = 0; i <= Math.min(storyLineIndex, storyLines.length - 1); i++) {
            const line = storyLines[i];
            if (!line && line !== '') continue;

            if (line.startsWith('[') || line.startsWith('  ')) {
                ctx.fillStyle = '#fa0';
            } else if (line.startsWith('!!')) {
                ctx.fillStyle = '#f44';
            } else if (line === '') {
                continue;
            } else if (line.startsWith('"')) {
                ctx.fillStyle = '#aaa';
            } else {
                ctx.fillStyle = '#0f0';
            }

            let displayText;
            if (i < storyLineIndex) {
                displayText = line;
            } else if (i === storyLineIndex) {
                displayText = line.substring(0, storyCharIndex);
                if (frameCount % 30 < 15) displayText += '_';
            } else {
                continue;
            }

            const yPos = startY + i * lineH;
            if (yPos < ARENA_B - 20) {
                ctx.fillText(displayText, W / 2, yPos);
            }
        }
        ctx.restore();

        const promptFs = Math.max(6, Math.round(8 * s));
        if (storySkipReady) {
            if (blinkTimer < 40) {
                ctx.font = `${promptFs}px "Press Start 2P", monospace`;
                ctx.textAlign = 'center';
                ctx.fillStyle = '#888';
                const promptText = isMobile ? 'TAP TO BEGIN' : 'PRESS ANY KEY OR CLICK TO BEGIN';
                ctx.fillText(promptText, W / 2, ARENA_B - 5);
            }
        } else if (!storyDone) {
            if (blinkTimer < 40) {
                ctx.font = `${promptFs}px "Press Start 2P", monospace`;
                ctx.textAlign = 'center';
                ctx.fillStyle = '#555';
                const skipText = isMobile ? 'TAP TO SKIP' : 'PRESS SPACE TO SKIP';
                ctx.fillText(skipText, W / 2, ARENA_B - 5);
            }
        }
    }

    // Freeze tint
    if (player && player.freeze > 0) {
        ctx.fillStyle = 'rgba(100,150,255,0.06)';
        ctx.fillRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);
    }

    ctx.restore(); // end shake

    // === TITLE SCREEN ===
    if (state === 'TITLE') {
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(0, 0, W, H);

        // Grid bg - batched
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0,255,255,0.08)';
        ctx.lineWidth = 1;
        const tGridSize = Math.round(32 * s);
        for (let x = 0; x < W; x += tGridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
        for (let y = 0; y < H; y += tGridSize) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
        ctx.stroke();

        // Floating enemy silhouettes
        for (const si of titleSilhouettes) {
            si.x += si.vx; si.y += si.vy;
            if (si.x < -20) si.x = W + 20;
            if (si.x > W + 20) si.x = -20;
            if (si.y < -20) si.y = H + 20;
            if (si.y > H + 20) si.y = -20;
            ctx.globalAlpha = si.alpha;
            ctx.fillStyle = si.color;
            ctx.fillRect(si.x - si.size / 2, si.y - si.size / 2, si.size, si.size);
        }
        ctx.globalAlpha = 1;

        const titleFs = Math.max(6, Math.round(7 * s));
        const bigFs = Math.max(18, Math.round(36 * s));
        const subFs = Math.max(8, Math.round(10 * s));
        const startFs = Math.max(10, Math.round(14 * s));
        const helpFs = Math.max(6, Math.round(8 * s));

        ctx.font = `${titleFs}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#555';
        ctx.fillText('AXIOM CORP WEAPONS RESEARCH DIVISION', W / 2, H / 2 - Math.round(110 * scaleY));
        ctx.fillStyle = '#333';
        ctx.fillText('TEST CHAMBER 7 \u2014 RESTRICTED ACCESS', W / 2, H / 2 - Math.round(96 * scaleY));

        ctx.font = `${bigFs}px "Press Start 2P", monospace`;
        ctx.fillStyle = '#f0f';
        ctx.shadowColor = '#f0f'; ctx.shadowBlur = 20;
        ctx.fillText('ARENA', W / 2, H / 2 - Math.round(60 * scaleY));
        ctx.fillStyle = '#0ff';
        ctx.shadowColor = '#0ff';
        ctx.fillText('BLITZ', W / 2, H / 2 - Math.round(15 * scaleY));
        ctx.shadowBlur = 0;

        ctx.font = `${subFs}px "Press Start 2P", monospace`;
        ctx.fillStyle = '#f44';
        ctx.shadowColor = '#f44'; ctx.shadowBlur = 8;
        ctx.fillText('PROTOCOL OMEGA', W / 2, H / 2 + Math.round(12 * scaleY));
        ctx.shadowBlur = 0;

        if (blinkTimer < 40) {
            ctx.font = `${startFs}px "Press Start 2P", monospace`;
            ctx.fillStyle = '#ff0';
            const startText = isMobile ? 'TAP TO START' : 'PRESS START';
            ctx.fillText(startText, W / 2, H / 2 + Math.round(44 * scaleY));
        }

        ctx.font = `${helpFs}px "Press Start 2P", monospace`;
        ctx.fillStyle = '#888';
        if (isMobile) {
            ctx.fillText('LEFT STICK: MOVE', W / 2, H / 2 + Math.round(84 * scaleY));
            ctx.fillText('RIGHT STICK: AIM+FIRE', W / 2, H / 2 + Math.round(100 * scaleY));
        } else {
            ctx.fillText('WASD MOVE / MOUSE AIM+SHOOT', W / 2, H / 2 + Math.round(84 * scaleY));
            ctx.fillText('1-4 SWITCH WEAPONS', W / 2, H / 2 + Math.round(100 * scaleY));
        }
        ctx.fillStyle = '#664';
        ctx.fillText('YOU ARE SUBJECT-7. SURVIVE.', W / 2, H / 2 + Math.round(124 * scaleY));
    }

    // === GAME OVER ===
    if (state === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        const goFs = Math.max(14, Math.round(28 * s));
        const goSmall = Math.max(6, Math.round(8 * s));
        const goMed = Math.max(8, Math.round(12 * s));
        const goBtn = Math.max(8, Math.round(10 * s));

        ctx.font = `${goFs}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f00';
        ctx.shadowColor = '#f00'; ctx.shadowBlur = 15;
        ctx.fillText('SUBJECT-7 DOWN', W / 2, H / 2 - Math.round(50 * scaleY));
        ctx.shadowBlur = 0;
        ctx.font = `${goSmall}px "Press Start 2P", monospace`;
        ctx.fillStyle = '#666';
        ctx.fillText('[AXIOM LOG]: "Test concluded. Prepare', W / 2, H / 2 - Math.round(25 * scaleY));
        ctx.fillText('next subject for Phase 1."', W / 2, H / 2 - Math.round(12 * scaleY));
        ctx.font = `${goMed}px "Press Start 2P", monospace`;
        ctx.fillStyle = '#ff0';
        ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + Math.round(12 * scaleY));
        ctx.fillStyle = '#0ff';
        ctx.fillText(`WAVE: ${wave}/10 \u2014 ${WAVE_TITLES[wave - 1]}`, W / 2, H / 2 + Math.round(32 * scaleY));
        if (blinkTimer < 40) {
            ctx.fillStyle = '#fff';
            ctx.font = `${goBtn}px "Press Start 2P", monospace`;
            const restartText = isMobile ? 'TAP TO RESTART' : 'PRESS R OR CLICK TO RESTART';
            ctx.fillText(restartText, W / 2, H / 2 + Math.round(65 * scaleY));
        }
    }

    // === VICTORY ===
    if (state === 'VICTORY') {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, W, H);

        if (!victoryStarted) {
            victoryStarted = true;
            victoryPage = 0;
            victoryPageDone = false;
            victoryScrollY = 0;
        }

        const vFs = Math.max(8, Math.round(10 * s));
        const vSmall = Math.max(6, Math.round(8 * s));
        const vBig = Math.max(8, Math.round(12 * s));

        const linesPerPage = VICTORY_LINES_PER_PAGE;
        const totalPages = Math.ceil(VICTORY_STORY.length / linesPerPage);
        const pageStart = victoryPage * linesPerPage;
        const pageEnd = Math.min(pageStart + linesPerPage, VICTORY_STORY.length);
        const pageLines = VICTORY_STORY.slice(pageStart, pageEnd);
        const isLastPage = victoryPage >= totalPages - 1;

        ctx.font = `${vFs}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`FINAL SCORE: ${score}`, W / 2, Math.round(30 * scaleY));

        ctx.font = `${vSmall}px "Press Start 2P", monospace`;
        const startY = Math.round(70 * scaleY);
        const lineH = Math.round(16 * scaleY);

        for (let i = 0; i < pageLines.length; i++) {
            const line = pageLines[i];
            const yPos = startY + i * lineH;

            if (line === '') continue;
            if (line.startsWith('\u2500')) {
                ctx.fillStyle = '#444';
            } else if (line.startsWith('PROTOCOL OMEGA')) {
                ctx.fillStyle = '#0ff';
                ctx.font = `${vBig}px "Press Start 2P", monospace`;
                ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
                ctx.fillText(line, W / 2, yPos);
                ctx.shadowBlur = 0;
                ctx.font = `${vSmall}px "Press Start 2P", monospace`;
                continue;
            } else if (line.startsWith('"')) {
                ctx.fillStyle = '#fa0';
            } else if (line.startsWith('AXIOM') || line.startsWith('Director') || line.startsWith('Dr.') || line.startsWith('Subject-7')) {
                ctx.fillStyle = '#aaa';
            } else {
                ctx.fillStyle = '#0f0';
            }

            const lineAlpha = Math.min(1, (frameCount % 1000) / 30);
            ctx.globalAlpha = lineAlpha;
            ctx.fillText(line, W / 2, yPos);
        }
        ctx.globalAlpha = 1;

        if (blinkTimer < 40) {
            ctx.font = `${vSmall}px "Press Start 2P", monospace`;
            ctx.fillStyle = '#888';
            if (!isLastPage) {
                const navText = isMobile ? `PAGE ${victoryPage + 1}/${totalPages} \u2014 TAP FOR NEXT` : `PAGE ${victoryPage + 1}/${totalPages} \u2014 PRESS SPACE/CLICK FOR NEXT`;
                ctx.fillText(navText, W / 2, H - Math.round(30 * scaleY));
            } else {
                const replayText = isMobile ? 'TAP TO PLAY AGAIN' : 'PRESS R OR CLICK TO PLAY AGAIN';
                ctx.fillText(replayText, W / 2, H - Math.round(30 * scaleY));
            }
        }
    }
}

// ========== INPUT: START / RESTART ==========
function handleStart() {
    initAudio();
    if (state === 'TITLE' || state === 'GAME_OVER') {
        startGame();
    }
}

function restartFromVictory() {
    initAudio();
    victoryStarted = false;
    startGame();
}

document.addEventListener('keydown', e => {
    if ((e.key === ' ' || e.key === 'Enter') && state === 'TITLE') handleStart();
    if (e.key === 'r' && state === 'GAME_OVER') handleStart();

    if (state === 'WAVE_INTRO') {
        if (storySkipReady) {
            state = 'PLAYING';
        } else if (!storyDone) {
            storyLineIndex = storyLines.length;
            storyCharIndex = 0;
            storyDone = true;
            storyHoldTimer = 90;
        }
    }

    if (state === 'VICTORY') {
        const totalPages = Math.ceil(VICTORY_STORY.length / VICTORY_LINES_PER_PAGE);
        if (victoryPage < totalPages - 1) {
            if (e.key === ' ' || e.key === 'Enter') {
                victoryPage++;
            }
        } else {
            if (e.key === 'r') restartFromVictory();
        }
    }
});
canvas.addEventListener('click', e => {
    if (state === 'TITLE' || state === 'GAME_OVER') handleStart();

    if (state === 'WAVE_INTRO') {
        if (storySkipReady) {
            state = 'PLAYING';
        } else if (!storyDone) {
            storyLineIndex = storyLines.length;
            storyCharIndex = 0;
            storyDone = true;
            storyHoldTimer = 90;
        }
    }

    if (state === 'VICTORY') {
        const totalPages = Math.ceil(VICTORY_STORY.length / VICTORY_LINES_PER_PAGE);
        if (victoryPage < totalPages - 1) {
            victoryPage++;
        } else {
            restartFromVictory();
        }
    }
});

// ========== MAIN LOOP ==========
let lastTime = 0;
const FRAME_TIME = 1000 / 60;
let accumulator = 0;

function loop(timestamp) {
    if (lastTime === 0) lastTime = timestamp;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100; // death spiral prevention
    accumulator += dt;

    let steps = 0;
    while (accumulator >= FRAME_TIME && steps < 4) {
        update();
        accumulator -= FRAME_TIME;
        steps++;
    }
    // Prevent spiral: discard leftover if too many steps
    if (steps >= 4) accumulator = 0;

    draw();
    requestAnimationFrame(loop);
}

// Hide cursor over canvas during gameplay (desktop only)
if (!isMobile) {
    canvas.style.cursor = 'none';
}

requestAnimationFrame(loop);
</script>
