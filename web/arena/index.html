        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #wrap {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }
        #game-container {
            flex: 1; position: relative; display: flex;
            justify-content: center; align-items: center;
            background: #050510; overflow: hidden;
        }
        canvas { background: #000; display: block; }
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));

        }
        #touch-controls {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;

            justify-content: space-between; align-items: center; padding: 0 30px;
            box-sizing: border-box; z-index: 30;
        }
        .joy-zone {
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(0,255,255,0.05); border: 2px solid rgba(0,255,255,0.3);
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .joy-knob {
            width: 50px; height: 50px; border-radius: 50%;
            position: absolute; pointer-events: none;
        }
        #moveKnob { background: rgba(0,255,255,0.7); box-shadow: 0 0 12px #0ff; }
        #aimKnob { background: rgba(255,0,255,0.7); box-shadow: 0 0 12px #f0f; }
        .joy-label {
            position: absolute; bottom: -18px; width: 100%; text-align: center;
            color: #888; font-size: 8px;
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex; }
        }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');
const W = 640, H = 480;
canvas.width = W; canvas.height = H;

function resize() {
    const cw = container.clientWidth, ch = container.clientHeight;
    const r = W / H, cr = cw / ch;
    if (cr < r) { canvas.style.width = cw + 'px'; canvas.style.height = (cw / r) + 'px'; }
    else { canvas.style.width = (ch * r) + 'px'; canvas.style.height = ch + 'px'; }
}
window.addEventListener('resize', resize); resize();

// ========== AUDIO ==========
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    if (type === 'pistol') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(200, now + 0.08);
        g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        o.connect(g); o.start(now); o.stop(now + 0.08);
    } else if (type === 'shotgun') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        s.connect(g); s.start(now);
    } else if (type === 'laser') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(150, now);
        g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        o.connect(g); o.start(now); o.stop(now + 0.05);
    } else if (type === 'rocket') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(100, now); o.frequency.exponentialRampToValueAtTime(600, now + 0.2);
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        o.connect(g); o.start(now); o.stop(now + 0.25);
    } else if (type === 'explode') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        s.connect(f); f.connect(g); s.start(now);
    } else if (type === 'hit') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(300, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.05);
        g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        o.connect(g); o.start(now); o.stop(now + 0.05);
    } else if (type === 'enemyDie') {
        const o = audioCtx.createOscillator(); o.type = 'square';
        o.frequency.setValueAtTime(500, now); o.frequency.exponentialRampToValueAtTime(80, now + 0.15);
        g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.15);
    } else if (type === 'pickup') {
        for (let i = 0; i < 3; i++) {
            const o = audioCtx.createOscillator(); o.type = 'square';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(400 + i * 200, now + i * 0.06);
            gi.gain.setValueAtTime(0.1, now + i * 0.06);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.08);
            o.connect(gi); o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.08);
        }
    } else if (type === 'playerHit') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 200;
        g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        s.connect(f); f.connect(g); s.start(now);
    } else if (type === 'waveStart') {
        [400, 500, 700].forEach((fr, i) => {
            const o = audioCtx.createOscillator(); o.type = 'square';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(fr, now + i * 0.12);
            gi.gain.setValueAtTime(0.12, now + i * 0.12);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.15);
            o.connect(gi); o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.15);
        });
    } else if (type === 'gameOver') {
        [500, 400, 250].forEach((fr, i) => {
            const o = audioCtx.createOscillator(); o.type = 'triangle';
            const gi = audioCtx.createGain(); gi.connect(audioCtx.destination);
            o.frequency.setValueAtTime(fr, now + i * 0.2);
            gi.gain.setValueAtTime(0.15, now + i * 0.2);
            gi.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 0.3);
            o.connect(gi); o.start(now + i * 0.2); o.stop(now + i * 0.2 + 0.3);
        });
    }
}

// Touch joysticks
function setupJoy(zoneId, knobId, joyObj) {
    const zone = document.getElementById(zoneId);
    const knob = document.getElementById(knobId);
    const maxR = 40;
    function update(cx, cy) {
        const r = zone.getBoundingClientRect();
        let dx = cx - (r.left + r.width / 2), dy = cy - (r.top + r.height / 2);
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > maxR) { dx = dx / d * maxR; dy = dy / d * maxR; }
        knob.style.transform = `translate(${dx}px, ${dy}px)`;
        joyObj.x = dx / maxR; joyObj.y = dy / maxR;
    }
    function reset() { joyObj.active = false; joyObj.x = 0; joyObj.y = 0; joyObj.touchId = null; knob.style.transform = 'translate(0,0)'; }
    zone.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); const t = e.changedTouches[0]; joyObj.active = true; joyObj.touchId = t.identifier; update(t.clientX, t.clientY); }, { passive: false });
    zone.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === joyObj.touchId) update(t.clientX, t.clientY); }, { passive: false });
    zone.addEventListener('touchend', e => { for (const t of e.changedTouches) if (t.identifier === joyObj.touchId) reset(); });
    zone.addEventListener('touchcancel', reset);
}
setupJoy('moveZone', 'moveKnob', moveJoy);
setupJoy('aimZone', 'aimKnob', aimJoy);

// ========== SPRITE DRAWING ==========
function drawPlayer(p) {
    if (p.iFrames > 0 && Math.floor(p.iFrames / 4) % 2 === 0) return;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    // Body
    const bc = p.doubleDmg > 0 ? '#f44' : '#0f0';
    ctx.fillStyle = bc;
    ctx.fillRect(-6, -6, 12, 12);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(-4, -4, 8, 8);
    // Gun barrel
    ctx.fillStyle = '#ff0';
    ctx.fillRect(4, -2, 8, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-2, -3, 2, 2);
    ctx.fillRect(-2, 1, 2, 2);
    if (p.shield > 0) {
        ctx.strokeStyle = `rgba(100,200,255,${0.4 + Math.sin(frameCount * 0.15) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
    // Speed trail
    if (p.speedBoost > 0) {
        for (let i = 0; i < 2; i++) {
            particles.push({ x: p.x - Math.cos(p.angle) * 8 + rnd(-3, 3), y: p.y - Math.sin(p.angle) * 8 + rnd(-3, 3), vx: rnd(-0.5, 0.5), vy: rnd(-0.5, 0.5), life: 15, maxLife: 15, r: 2, color: '#44f' });
        }
    }
}

function drawSwarmer(e) {
    ctx.save(); ctx.translate(e.x, e.y);
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#0f0';
    ctx.fillRect(-5, -5, 10, 10);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(-3, -3, 6, 6);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-3, -2, 2, 2); ctx.fillRect(1, -2, 2, 2);
    ctx.restore();
}

function drawTank(e) {
    ctx.save(); ctx.translate(e.x, e.y);
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#f40';
    ctx.fillRect(-10, -10, 20, 20);
    ctx.fillStyle = '#a20';
    ctx.fillRect(-8, -8, 16, 16);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-6, -4, 3, 3); ctx.fillRect(3, -4, 3, 3);
    // cannon toward player
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.rotate(a);
    ctx.fillStyle = '#f80';
    ctx.fillRect(6, -3, 10, 6);
    ctx.restore();
}

function drawTeleporter(e) {
    ctx.save(); ctx.translate(e.x, e.y);
    const alpha = e.teleTimer < 20 ? e.teleTimer / 20 : 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#f0f';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2 + frameCount * 0.05;
        const r = i % 2 === 0 ? 7 : 3;
        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawSplitter(e) {
    ctx.save(); ctx.translate(e.x, e.y);
    const sz = e.big ? 9 : 5;
    ctx.fillStyle = e.flash > 0 ? '#fff' : '#0ff';
    ctx.beginPath();
    ctx.moveTo(0, -sz); ctx.lineTo(sz, sz); ctx.lineTo(-sz, sz);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#088';
    const sz2 = sz * 0.6;
    ctx.beginPath();
    ctx.moveTo(0, -sz2); ctx.lineTo(sz2, sz2); ctx.lineTo(-sz2, sz2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function drawBoss(e) {
    ctx.save(); ctx.translate(e.x, e.y);
    if (e.bossType === 'megaTank') {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f60';
        ctx.fillRect(-16, -16, 32, 32);
        ctx.fillStyle = '#a30';
        ctx.fillRect(-12, -12, 24, 24);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-8, -6, 4, 4); ctx.fillRect(4, -6, 4, 4);
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.rotate(a);
        ctx.fillStyle = '#fa0';
        ctx.fillRect(10, -4, 14, 8);
    } else {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f0f';
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2 + frameCount * 0.03;
            const r = 12 + Math.sin(frameCount * 0.1 + i) * 3;
            ctx.fillRect(Math.cos(a) * r - 3, Math.sin(a) * r - 3, 6, 6);
        }
        ctx.fillStyle = '#a0a';
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-3, -3, 3, 3); ctx.fillRect(1, -3, 3, 3);
    }
    // HP bar
    ctx.restore();
    const bw = 40, bh = 4;
    ctx.fillStyle = '#300';
    ctx.fillRect(e.x - bw / 2, e.y - 24, bw, bh);
    ctx.fillStyle = '#f00';
    ctx.fillRect(e.x - bw / 2, e.y - 24, bw * (e.hp / e.maxHp), bh);
}

// ========== UTILITY ==========
function rnd(a, b) { return a + Math.random() * (b - a); }
function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function aabb(a, b) {
    const aw = a.w || a.r * 2 || 8, ah = a.h || a.r * 2 || 8;
    const bw = b.w || b.r * 2 || 8, bh = b.h || b.r * 2 || 8;
    return a.x - aw / 2 < b.x + bw / 2 && a.x + aw / 2 > b.x - bw / 2 &&
           a.y - ah / 2 < b.y + bh / 2 && a.y + ah / 2 > b.y - bh / 2;
}

function spawnParticles(x, y, count, color, speed, life) {
    for (let i = 0; i < count; i++) {
        const a = rnd(0, Math.PI * 2);
        const s = rnd(speed * 0.3, speed);
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, maxLife: life, r: rnd(1, 3), color });
    }
}

function addShake(mag) { shakeMag = Math.min(shakeMag + mag, 12); }

// ========== WEAPONS ==========
const WEAPON_NAMES = ['PISTOL', 'SHOTGUN', 'LASER', 'ROCKET'];
const WEAPON_COLORS = ['#ff0', '#fa0', '#0ff', '#f44'];
const FIRE_RATES = [10, 30, 2, 60]; // frames between shots

function fireWeapon() {
    const p = player;
    if (p.fireTimer > 0) return;
    const w = p.weapon;
    if (p.ammo[w] <= 0 && w !== 0) { p.weapon = 0; return; }
    const dmgMult = p.doubleDmg > 0 ? 2 : 1;
    p.fireTimer = FIRE_RATES[w];

    if (w === 0) { // Pistol
        const a = p.angle + rnd(-0.03, 0.03);
        bullets.push({ x: p.x + Math.cos(p.angle) * 10, y: p.y + Math.sin(p.angle) * 10, vx: Math.cos(a) * 8, vy: Math.sin(a) * 8, dmg: 10 * dmgMult, life: 60, r: 2, color: '#ff0', type: 'bullet' });
        playSound('pistol');
    } else if (w === 1) { // Shotgun
        for (let i = 0; i < 5; i++) {
            const a = p.angle + rnd(-0.26, 0.26);
            bullets.push({ x: p.x + Math.cos(p.angle) * 10, y: p.y + Math.sin(p.angle) * 10, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7, dmg: 8 * dmgMult, life: 22, r: 2, color: '#fa0', type: 'bullet' });
        }
        p.ammo[1]--;
        playSound('shotgun');
    } else if (w === 2) { // Laser
        // Laser is a raycast
        const dx = Math.cos(p.angle), dy = Math.sin(p.angle);
        const maxDist = 700;
        for (const e of enemies) {
            if (e.dead) continue;
            // Point-to-line distance
            const ex = e.x - p.x, ey = e.y - p.y;
            const proj = ex * dx + ey * dy;
            if (proj < 0 || proj > maxDist) continue;
            const perpDist = Math.abs(ex * dy - ey * dx);
            const hitR = (e.w || 10) / 2 + 4;
            if (perpDist < hitR) {
                e.hp -= 3 * dmgMult;
                e.flash = 3;
            }
        }
        bullets.push({ x: p.x + dx * 10, y: p.y + dy * 10, vx: dx, vy: dy, dmg: 0, life: 3, r: 0, color: '#0ff', type: 'laser', length: maxDist });
        p.ammo[2]--;
        if (frameCount % 3 === 0) playSound('laser');
    } else if (w === 3) { // Rocket
        const a = p.angle;
        bullets.push({ x: p.x + Math.cos(a) * 10, y: p.y + Math.sin(a) * 10, vx: Math.cos(a) * 5, vy: Math.sin(a) * 5, dmg: 30 * dmgMult, splashDmg: 20 * dmgMult, life: 60, r: 4, color: '#f44', type: 'rocket' });
        p.ammo[3]--;
        playSound('rocket');
    }
    if (p.ammo[w] <= 0 && w !== 0) p.weapon = 0;
}

// ========== ENEMIES ==========
function spawnEnemy(type, x, y) {
    if (x === undefined) {
        // spawn from edge
        const side = Math.floor(rnd(0, 4));
        if (side === 0) { x = ARENA_L + 10; y = rnd(ARENA_T + 10, ARENA_B - 10); }
        else if (side === 1) { x = ARENA_R - 10; y = rnd(ARENA_T + 10, ARENA_B - 10); }
        else if (side === 2) { x = rnd(ARENA_L + 10, ARENA_R - 10); y = ARENA_T + 10; }
        else { x = rnd(ARENA_L + 10, ARENA_R - 10); y = ARENA_B - 10; }
    }
    const base = { x, y, flash: 0, dead: false, type };
    if (type === 'swarmer') return Object.assign(base, { hp: 15, maxHp: 15, speed: 2.5, w: 10, h: 10, score: 10 });
    if (type === 'tank') return Object.assign(base, { hp: 80, maxHp: 80, speed: 1, w: 20, h: 20, score: 50, shootTimer: 120 + Math.floor(rnd(0, 60)) });
    if (type === 'teleporter') return Object.assign(base, { hp: 30, maxHp: 30, speed: 2, w: 14, h: 14, score: 30, teleTimer: 60, teleCooldown: 120 + Math.floor(rnd(0, 120)) });
    if (type === 'splitter') return Object.assign(base, { hp: 50, maxHp: 50, speed: 1.5, w: 18, h: 18, score: 40, big: true });
    if (type === 'splitterSmall') return Object.assign(base, { hp: 20, maxHp: 20, speed: 3, w: 10, h: 10, score: 15, big: false });
    if (type === 'megaTank') return Object.assign(base, { hp: 300, maxHp: 300, speed: 0.7, w: 32, h: 32, score: 200, shootTimer: 80, bossType: 'megaTank', boss: true, spawnTimer: 300 });
    if (type === 'queen') return Object.assign(base, { hp: 500, maxHp: 500, speed: 1.2, w: 24, h: 24, score: 500, shootTimer: 60, bossType: 'queen', boss: true, teleTimer: 60, teleCooldown: 180, spawnTimer: 240 });
}

function pickWeightedType(waveIdx) {
    const def = WAVES[waveIdx];
    const types = ['swarmer', 'tank', 'teleporter', 'splitter'];
    const weights = [def[1], def[2], def[3], def[4]];
    const total = weights.reduce((a, b) => a + b, 0);
    let r = rnd(0, total);
    for (let i = 0; i < 4; i++) { r -= weights[i]; if (r <= 0) return types[i]; }
    return 'swarmer';
}

// ========== PICKUPS ==========
function spawnPickup(x, y) {
    const roll = Math.random();
    if (roll < 0.10) {
        // Weapon pickup
        const types = ['shotgun', 'laser', 'rocket'];
        const t = types[Math.floor(rnd(0, 3))];
        pickups.push({ x, y, type: 'weapon', weaponType: t, life: 600, r: 8 });
    } else if (roll < 0.25) {
        // Power-up
        const types = ['speed', 'shield', 'doubleDmg', 'freeze'];
        const t = types[Math.floor(rnd(0, 4))];
        pickups.push({ x, y, type: 'powerup', powerType: t, life: 600, r: 8 });
    }
}

const PICKUP_COLORS = { shotgun: '#fa0', laser: '#0ff', rocket: '#f44', speed: '#44f', shield: '#cdf', doubleDmg: '#f22', freeze: '#aef' };

function drawPickup(pk) {
    const c = pk.type === 'weapon' ? PICKUP_COLORS[pk.weaponType] : PICKUP_COLORS[pk.powerType];
    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.2;
    ctx.save(); ctx.translate(pk.x, pk.y);
    ctx.scale(pulse, pulse);
    // Flashing when about to expire
    if (pk.life < 120 && Math.floor(pk.life / 8) % 2 === 0) { ctx.restore(); return; }
    ctx.fillStyle = c;
    if (pk.type === 'weapon') {
        ctx.fillRect(-6, -3, 12, 6);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4, -1, 3, 2);
    } else {
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '7px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const labels = { speed: 'S', shield: 'H', doubleDmg: 'D', freeze: 'F' };
        ctx.fillText(labels[pk.powerType], 0, 1);
    }
    ctx.restore();
}

// ========== HAZARDS ==========
function spawnLaserSweep() {
    if (wave < 6) return;
    if (Math.random() < 0.003) {
        const horiz = Math.random() < 0.5;
        const pos = horiz ? rnd(ARENA_T + 30, ARENA_B - 30) : rnd(ARENA_L + 30, ARENA_R - 30);
        hazards.push({ horiz, pos, timer: 120, active: false }); // 2s warning, then active for a bit
    }
}

// ========== GAME LOGIC ==========
function startGame() {
    initAudio();
    state = 'WAVE_INTRO';
    wave = 1; score = 0;
    enemies = []; bullets = []; particles = []; pickups = []; hazards = []; enemyBullets = []; textPopups = [];
    comboCount = 0; comboTimer = 0;
    player = createPlayer();
    startWave();
}

function startWave() {
    const def = WAVES[wave - 1];
    totalEnemiesThisWave = def[0];
    enemiesToSpawn = def[0];
    enemiesKilledThisWave = 0;
    spawnTimer = 60;
    waveText = `WAVE ${wave} \u2014 "${WAVE_TITLES[wave - 1]}"`;
    waveTextTimer = 0; // managed by story system now
    state = 'WAVE_INTRO';
    playSound('waveStart');

    // Initialize story typewriter
    storyLines = WAVE_STORIES[wave - 1] || [];
    storyLineIndex = 0;
    storyCharIndex = 0;
    storyTypeTimer = 0;
    storyDone = false;
    storySkipReady = false;
    storyHoldTimer = 0;

    // Spawn boss immediately
    if (def[6]) {
        const boss = spawnEnemy(def[6], W / 2, ARENA_T + 40);
        enemies.push(boss);
    }
}

function update() {
    frameCount++;
    blinkTimer = (blinkTimer + 1) % 60;

    if (state === 'TITLE') return;
    if (state === 'GAME_OVER' || state === 'VICTORY') return;

    if (state === 'WAVE_INTRO') {
        if (!storyDone) {
            // Typewriter effect
            storyTypeTimer++;
            if (storyTypeTimer >= STORY_TYPE_SPEED) {
                storyTypeTimer = 0;
                storyCharIndex++;
                if (storyLineIndex < storyLines.length && storyCharIndex > storyLines[storyLineIndex].length) {
                    storyLineIndex++;
                    storyCharIndex = 0;
                }
                if (storyLineIndex >= storyLines.length) {
                    storyDone = true;
                    storyHoldTimer = 150; // ~2.5s hold
                }
            }
        } else {
            storyHoldTimer--;
            if (storyHoldTimer <= 0) {
                storySkipReady = true;
            }
            // Auto-advance after additional 2.5 seconds
            if (storyHoldTimer <= -150) {
                state = 'PLAYING';
            }
        }
    }

    const p = player;
    if (!p) return;

    // === Player movement ===
    let mx = 0, my = 0;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (moveJoy.active) { mx += moveJoy.x; my += moveJoy.y; }
    const ml = Math.sqrt(mx * mx + my * my);
    const spd = p.speed * (p.speedBoost > 0 ? 1.5 : 1);
    if (ml > 0) { mx = mx / ml * spd; my = my / ml * spd; }
    p.x = clamp(p.x + mx, ARENA_L + 10, ARENA_R - 10);
    p.y = clamp(p.y + my, ARENA_T + 10, ARENA_B - 10);

    // === Aim ===
    if (aimJoy.active && (Math.abs(aimJoy.x) > 0.15 || Math.abs(aimJoy.y) > 0.15)) {
        p.angle = Math.atan2(aimJoy.y, aimJoy.x);
    } else {
        p.angle = Math.atan2(mouseY - p.y, mouseX - p.x);
    }

    // === Fire ===
    if (p.fireTimer > 0) p.fireTimer--;
    const wantsToFire = mouseDown || (aimJoy.active && (Math.abs(aimJoy.x) > 0.2 || Math.abs(aimJoy.y) > 0.2));
    if (wantsToFire && state === 'PLAYING') fireWeapon();

    // Weapon switching
    for (let i = 1; i <= 4; i++) {
        if (keys[String(i)]) {
            if (p.ammo[i - 1] > 0 || i === 1) p.weapon = i - 1;
        }
    }

    // === Timers ===
    if (p.iFrames > 0) p.iFrames--;
    if (p.speedBoost > 0) p.speedBoost--;
    if (p.shield > 0) p.shield--;
    if (p.doubleDmg > 0) p.doubleDmg--;
    if (p.freeze > 0) p.freeze--;
    if (borderFlashTimer > 0) borderFlashTimer--;

    // === Spawn enemies ===
    if (state === 'PLAYING' && enemiesToSpawn > 0) {
        spawnTimer--;
        if (spawnTimer <= 0) {
            const def = WAVES[wave - 1];
            spawnTimer = def[5] + Math.floor(rnd(-10, 10));
            const t = pickWeightedType(wave - 1);
            enemies.push(spawnEnemy(t));
            enemiesToSpawn--;
        }
    }

    // === Update enemies ===
    const freezeMult = p.freeze > 0 ? 0.3 : 1;
    for (const e of enemies) {
        if (e.dead) continue;
        if (e.flash > 0) e.flash--;
        const dx = p.x - e.x, dy = p.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;

        if (e.type === 'swarmer' || e.type === 'splitter' || e.type === 'splitterSmall') {
            const weave = Math.sin(frameCount * 0.1 + e.x) * 0.5;
            e.x += (dx / d * e.speed + weave) * freezeMult;
            e.y += (dy / d * e.speed) * freezeMult;
        } else if (e.type === 'tank' || (e.boss && e.bossType === 'megaTank')) {
            e.x += dx / d * e.speed * freezeMult;
            e.y += dy / d * e.speed * freezeMult;
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                e.shootTimer = e.boss ? 80 : (120 + Math.floor(rnd(0, 60)));
                const a = Math.atan2(dy, dx);
                if (e.boss) {
                    for (let i = -1; i <= 1; i++) {
                        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a + i * 0.3) * 3, vy: Math.sin(a + i * 0.3) * 3, dmg: 15, life: 120, r: 3, color: '#f80' });
                    }
                } else {
                    enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, dmg: 15, life: 120, r: 3, color: '#f80' });
                }
            }
            // Boss spawn helpers
            if (e.boss && e.spawnTimer !== undefined) {
                e.spawnTimer--;
                if (e.spawnTimer <= 0) {
                    e.spawnTimer = 300;
                    for (let i = 0; i < 2; i++) enemies.push(spawnEnemy('swarmer', e.x + rnd(-20, 20), e.y + rnd(-20, 20)));
                }
            }
        } else if (e.type === 'teleporter') {
            e.teleCooldown--;
            if (e.teleCooldown <= 0) {
                e.x = rnd(ARENA_L + 20, ARENA_R - 20);
                e.y = rnd(ARENA_T + 20, ARENA_B - 20);
                e.teleTimer = 0;
                e.teleCooldown = 120 + Math.floor(rnd(0, 120));
            }
            if (e.teleTimer < 60) e.teleTimer++;
            if (e.teleTimer > 15) {
                e.x += dx / d * e.speed * freezeMult;
                e.y += dy / d * e.speed * freezeMult;
            }
        } else if (e.boss && e.bossType === 'queen') {
            e.x += dx / d * e.speed * freezeMult;
            e.y += dy / d * e.speed * freezeMult;
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                e.shootTimer = 60;
                const a = Math.atan2(dy, dx);
                // Homing-ish bullet
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5, dmg: 12, life: 180, r: 4, color: '#f0f', homing: true });
            }
            // Teleport
            if (e.teleCooldown !== undefined) {
                e.teleCooldown--;
                if (e.teleCooldown <= 0) {
                    e.x = rnd(ARENA_L + 30, ARENA_R - 30);
                    e.y = rnd(ARENA_T + 30, ARENA_B - 30);
                    e.teleCooldown = 180 + Math.floor(rnd(0, 60));
                    spawnParticles(e.x, e.y, 8, '#f0f', 3, 20);
                }
            }
            // Spawn helpers
            if (e.spawnTimer !== undefined) {
                e.spawnTimer--;
                if (e.spawnTimer <= 0) {
                    e.spawnTimer = 240;
                    const types = ['swarmer', 'teleporter', 'splitter'];
                    enemies.push(spawnEnemy(types[Math.floor(rnd(0, 3))], e.x + rnd(-20, 20), e.y + rnd(-20, 20)));
                }
            }
        }

        // Keep in arena
        e.x = clamp(e.x, ARENA_L + 5, ARENA_R - 5);
        e.y = clamp(e.y, ARENA_T + 5, ARENA_B - 5);

        // Collide with player
        if (p.iFrames <= 0 && aabb(p, e)) {
            hurtPlayer(15);
        }
    }

    // === Update bullets ===
    for (const b of bullets) {
        if (b.type === 'laser') { b.life--; continue; }
        b.x += b.vx; b.y += b.vy;
        b.life--;
        // Trail particles
        if (b.type === 'rocket') {
            particles.push({ x: b.x + rnd(-2, 2), y: b.y + rnd(-2, 2), vx: rnd(-0.5, 0.5), vy: rnd(-0.5, 0.5), life: 12, maxLife: 12, r: 2, color: '#f80' });
        }
        // Out of arena
        if (b.x < ARENA_L || b.x > ARENA_R || b.y < ARENA_T || b.y > ARENA_B) b.life = 0;
        // Hit enemies
        for (const e of enemies) {
            if (e.dead) continue;
            if (b.type === 'laser') continue; // handled above
            if (aabb(b, e)) {
                e.hp -= b.dmg;
                e.flash = 6;
                playSound('hit');
                if (b.type === 'rocket') {
                    // AoE
                    explodeAt(b.x, b.y, b.splashDmg);
                }
                b.life = 0;
                break;
            }
        }
    }
    bullets = bullets.filter(b => b.life > 0);

    // === Update enemy bullets ===
    for (const b of enemyBullets) {
        if (b.homing && player) {
            const dx = player.x - b.x, dy = player.y - b.y;
            const d = Math.sqrt(dx * dx + dy * dy) || 1;
            b.vx += dx / d * 0.05; b.vy += dy / d * 0.05;
            const s = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            if (s > 3) { b.vx = b.vx / s * 3; b.vy = b.vy / s * 3; }
        }
        b.x += b.vx; b.y += b.vy;
        b.life--;
        if (b.x < ARENA_L || b.x > ARENA_R || b.y < ARENA_T || b.y > ARENA_B) b.life = 0;
        if (p.iFrames <= 0 && dist(b, p) < 10) {
            hurtPlayer(b.dmg);
            b.life = 0;
        }
    }
    enemyBullets = enemyBullets.filter(b => b.life > 0);

    // === Enemy deaths ===
    for (const e of enemies) {
        if (e.dead) continue;
        if (e.hp <= 0) {
            e.dead = true;
            comboCount++;
            comboTimer = 120;
            const comboMultiplier = 1 + comboCount * 0.5;
            const earnedScore = Math.round(e.score * comboMultiplier);
            score += earnedScore;
            textPopups.push({ x: e.x, y: e.y, vx: 0, vy: -1.5, life: 45, maxLife: 45, text: `+${earnedScore}`, color: '#ff0', size: 10 });
            if (comboCount >= 2) {
                textPopups.push({ x: e.x, y: e.y - 12, vx: 0, vy: -1.2, life: 45, maxLife: 45, text: `x${comboMultiplier.toFixed(1)}`, color: '#f80', size: 8 });
            }
            enemiesKilledThisWave++;
            playSound('enemyDie');
            const col = e.type === 'swarmer' ? '#0f0' : e.type === 'tank' ? '#f40' : e.type === 'teleporter' ? '#f0f' : '#0ff';
            spawnParticles(e.x, e.y, 10, col, 3, 25);
            spawnPickup(e.x, e.y);
            // Splitters split
            if (e.type === 'splitter' && e.big) {
                for (let i = 0; i < 3; i++) {
                    enemies.push(spawnEnemy('splitterSmall', e.x + rnd(-15, 15), e.y + rnd(-15, 15)));
                    enemiesToSpawn = Math.max(0, enemiesToSpawn); // don't affect count
                }
            }
            if (e.boss) {
                addShake(10);
                spawnParticles(e.x, e.y, 30, '#ff0', 5, 40);
                playSound('explode');
            }
        }
    }
    enemies = enemies.filter(e => !e.dead);

    // === Check wave complete ===
    if (state === 'PLAYING' && enemiesToSpawn <= 0 && enemies.length === 0) {
        // Health regen between waves
        const healAmount = Math.round(player.maxHp * 0.15);
        const oldHp = player.hp;
        player.hp = Math.min(player.hp + healAmount, player.maxHp);
        const actualHeal = player.hp - oldHp;
        if (actualHeal > 0) {
            textPopups.push({ x: player.x, y: player.y, vx: 0, vy: -1.5, life: 60, maxLife: 60, text: `+${actualHeal}`, color: '#0f0', size: 12 });
        }
        if (wave >= 10) {
            state = 'VICTORY';
            victoryStarted = false;
            playSound('waveStart');
        } else {
            wave++;
            startWave();
        }
    }

    // === Pickups ===
    for (const pk of pickups) {
        pk.life--;
        if (dist(pk, p) < 16) {
            pk.life = 0;
            playSound('pickup');
            if (pk.type === 'weapon') {
                const idx = pk.weaponType === 'shotgun' ? 1 : pk.weaponType === 'laser' ? 2 : 3;
                const ammoAmounts = [0, 20, 50, 8];
                if (p.ammo[idx] > 0) {
                    p.ammo[idx] += ammoAmounts[idx];
                } else {
                    p.ammo[idx] = ammoAmounts[idx];
                    p.weapon = idx;
                }
            } else {
                if (pk.powerType === 'speed') p.speedBoost = 480;
                else if (pk.powerType === 'shield') { p.shield = 360; p.shieldHp = 50; }
                else if (pk.powerType === 'doubleDmg') p.doubleDmg = 480;
                else if (pk.powerType === 'freeze') p.freeze = 300;
            }
        }
    }
    pickups = pickups.filter(pk => pk.life > 0);

    // === Hazards ===
    spawnLaserSweep();
    for (const hz of hazards) {
        hz.timer--;
        if (hz.timer <= 0 && !hz.active) { hz.active = true; hz.timer = 30; }
        if (hz.active) {
            hz.timer--;
            // Damage player
            if (hz.horiz) {
                if (Math.abs(p.y - hz.pos) < 8 && p.iFrames <= 0) hurtPlayer(20);
            } else {
                if (Math.abs(p.x - hz.pos) < 8 && p.iFrames <= 0) hurtPlayer(20);
            }
        }
    }
    hazards = hazards.filter(hz => hz.active ? hz.timer > 0 : true);

    // === Combo timer ===
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboCount = 0;
    }

    // === Text popups ===
    for (const tp of textPopups) {
        tp.x += tp.vx; tp.y += tp.vy;
        tp.life--;
    }
    textPopups = textPopups.filter(tp => tp.life > 0);

    // === Particles ===
    for (const pt of particles) {
        pt.x += pt.vx; pt.y += pt.vy;
        pt.vx *= 0.96; pt.vy *= 0.96;
        pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);

    // === Screen shake ===
    if (shakeMag > 0) {
        shakeX = rnd(-shakeMag, shakeMag);
        shakeY = rnd(-shakeMag, shakeMag);
        shakeMag *= 0.85;
        if (shakeMag < 0.5) { shakeMag = 0; shakeX = 0; shakeY = 0; }
    }

    // === Fence damage ===
    if (p.x <= ARENA_L + 12 || p.x >= ARENA_R - 12 || p.y <= ARENA_T + 12 || p.y >= ARENA_B - 12) {
        if (frameCount % 15 === 0 && p.iFrames <= 0) hurtPlayer(5);
    }
}

function hurtPlayer(dmg) {
    const p = player;
    if (p.shield > 0 && p.shieldHp > 0) {
        p.shieldHp -= dmg;
        if (p.shieldHp <= 0) { p.shield = 0; p.shieldHp = 0; }
        addShake(2);
        return;
    }
    p.hp -= dmg;
    p.iFrames = 60;
    addShake(4);
    borderFlashTimer = 10;
    playSound('playerHit');
    spawnParticles(p.x, p.y, 6, '#f00', 2, 15);
    if (p.hp <= 0) {
        p.hp = 0;
        state = 'GAME_OVER';
        playSound('gameOver');
        spawnParticles(p.x, p.y, 30, '#ff0', 5, 40);
    }
}

function explodeAt(x, y, dmg) {
    addShake(6);
    playSound('explode');
    spawnParticles(x, y, 16, '#f80', 4, 30);
    spawnParticles(x, y, 8, '#ff0', 2, 20);
    for (const e of enemies) {
        if (e.dead) continue;
        if (dist({ x, y }, e) < 50) {
            e.hp -= dmg;
            e.flash = 6;
        }
    }
}

// ========== DRAW ==========
function draw() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, W, H);

    // Arena floor
    ctx.fillStyle = '#08081a';
    ctx.fillRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);

    // Grid on floor
    ctx.strokeStyle = 'rgba(40,40,80,0.25)';
    for (let x = ARENA_L; x <= ARENA_R; x += 32) {
        ctx.beginPath(); ctx.moveTo(x, ARENA_T); ctx.lineTo(x, ARENA_B); ctx.stroke();
    }
    for (let y = ARENA_T; y <= ARENA_B; y += 32) {
        ctx.beginPath(); ctx.moveTo(ARENA_L, y); ctx.lineTo(ARENA_R, y); ctx.stroke();
    }

    // Electric fence border
    const fenceGlow = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
    ctx.strokeStyle = `rgba(0,255,255,${fenceGlow})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
    ctx.strokeRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);
    ctx.shadowBlur = 0;
    // Fence sparks
    if (frameCount % 8 === 0) {
        const side = Math.floor(rnd(0, 4));
        let sx, sy;
        if (side === 0) { sx = ARENA_L; sy = rnd(ARENA_T, ARENA_B); }
        else if (side === 1) { sx = ARENA_R; sy = rnd(ARENA_T, ARENA_B); }
        else if (side === 2) { sx = rnd(ARENA_L, ARENA_R); sy = ARENA_T; }
        else { sx = rnd(ARENA_L, ARENA_R); sy = ARENA_B; }
        spawnParticles(sx, sy, 2, '#0ff', 2, 10);
    }

    // Hazards
    for (const hz of hazards) {
        if (hz.active) {
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#f00'; ctx.shadowBlur = 15;
            if (hz.horiz) {
                ctx.beginPath(); ctx.moveTo(ARENA_L, hz.pos); ctx.lineTo(ARENA_R, hz.pos); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.moveTo(hz.pos, ARENA_T); ctx.lineTo(hz.pos, ARENA_B); ctx.stroke();
            }
            ctx.shadowBlur = 0;
        } else {
            // Warning
            ctx.strokeStyle = `rgba(255,0,0,${0.2 + Math.sin(frameCount * 0.3) * 0.2})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            if (hz.horiz) {
                ctx.beginPath(); ctx.moveTo(ARENA_L, hz.pos); ctx.lineTo(ARENA_R, hz.pos); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.moveTo(hz.pos, ARENA_T); ctx.lineTo(hz.pos, ARENA_B); ctx.stroke();
            }
            ctx.setLineDash([]);
        }
    }

    // Pickups
    for (const pk of pickups) drawPickup(pk);

    // Enemies
    for (const e of enemies) {
        if (e.dead) continue;
        if (e.boss) drawBoss(e);
        else if (e.type === 'swarmer') drawSwarmer(e);
        else if (e.type === 'tank') drawTank(e);
        else if (e.type === 'teleporter') drawTeleporter(e);
        else if (e.type === 'splitter' || e.type === 'splitterSmall') drawSplitter(e);
    }

    // Player
    if (player && state !== 'GAME_OVER') drawPlayer(player);

    // Bullets
    for (const b of bullets) {
        if (b.type === 'laser') {
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x + b.vx * b.length, b.y + b.vy * b.length);
            ctx.stroke();
            ctx.lineWidth = 1; ctx.strokeStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x + b.vx * b.length, b.y + b.vy * b.length);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = b.color;
            ctx.shadowColor = b.color; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // Enemy bullets
    for (const b of enemyBullets) {
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Particles
    for (const pt of particles) {
        const alpha = pt.life / pt.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = pt.color;
        ctx.fillRect(pt.x - pt.r / 2, pt.y - pt.r / 2, pt.r, pt.r);
    }
    ctx.globalAlpha = 1;

    // Text popups
    for (const tp of textPopups) {
        const alpha = tp.life / tp.maxLife;
        ctx.globalAlpha = alpha;
        ctx.font = `${tp.size}px "Press Start 2P", monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = tp.color;
        ctx.fillText(tp.text, tp.x, tp.y);
    }
    ctx.globalAlpha = 1;

    // Crosshair
    if (state === 'PLAYING' || state === 'WAVE_INTRO') {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        const cx = mouseX, cy = mouseY;
        ctx.beginPath(); ctx.moveTo(cx - 8, cy); ctx.lineTo(cx - 3, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 3, cy); ctx.lineTo(cx + 8, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - 8); ctx.lineTo(cx, cy - 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy + 3); ctx.lineTo(cx, cy + 8); ctx.stroke();
    }

    // Border flash on damage
    if (borderFlashTimer > 0) {
        ctx.fillStyle = `rgba(255,0,0,${borderFlashTimer / 20})`;
        ctx.fillRect(0, 0, W, H);
    }

    // === HUD ===
    if (player && (state === 'PLAYING' || state === 'WAVE_INTRO')) {
        ctx.font = '10px "Press Start 2P", monospace';

        // Health bar
        ctx.fillStyle = '#300'; ctx.fillRect(8, 8, 104, 12);
        const hpPct = player.hp / player.maxHp;
        const hpColor = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
        ctx.fillStyle = hpColor; ctx.fillRect(10, 10, 100 * hpPct, 8);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(8, 8, 104, 12);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
        ctx.fillText(`HP ${player.hp}`, 8, 34);

        // Wave
        ctx.textAlign = 'center';
        ctx.fillStyle = '#0ff';
        ctx.fillText(`WAVE ${wave}/10`, W / 2, 18);

        // Score
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`SCORE ${score}`, W - 8, 18);

        // Weapon + Ammo
        ctx.textAlign = 'left';
        const wn = WEAPON_NAMES[player.weapon];
        const ammoText = player.weapon === 0 ? 'INF' : String(player.ammo[player.weapon]);
        ctx.fillStyle = WEAPON_COLORS[player.weapon];
        ctx.fillText(`${wn} ${ammoText}`, 8, H - 10);

        // Weapon slots
        for (let i = 0; i < 4; i++) {
            const sx = W / 2 - 80 + i * 45, sy = H - 22;
            ctx.strokeStyle = player.weapon === i ? '#fff' : '#444';
            ctx.lineWidth = player.weapon === i ? 2 : 1;
            ctx.strokeRect(sx, sy, 36, 16);
            ctx.fillStyle = player.ammo[i] > 0 || i === 0 ? WEAPON_COLORS[i] : '#333';
            ctx.font = '7px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${i + 1}:${WEAPON_NAMES[i].substring(0, 3)}`, sx + 18, sy + 12);
        }

        // Active powerups
        ctx.font = '7px "Press Start 2P", monospace';
        ctx.textAlign = 'right';
        let py = 48;
        if (player.speedBoost > 0) { ctx.fillStyle = '#44f'; ctx.fillText(`SPD ${Math.ceil(player.speedBoost / 60)}s`, W - 8, py); py += 12; }
        if (player.shield > 0) { ctx.fillStyle = '#cdf'; ctx.fillText(`SHD ${player.shieldHp}`, W - 8, py); py += 12; }
        if (player.doubleDmg > 0) { ctx.fillStyle = '#f22'; ctx.fillText(`DMGx2 ${Math.ceil(player.doubleDmg / 60)}s`, W - 8, py); py += 12; }
        if (player.freeze > 0) { ctx.fillStyle = '#aef'; ctx.fillText(`FRZ ${Math.ceil(player.freeze / 60)}s`, W - 8, py); py += 12; }

        // Combo multiplier display
        if (comboCount >= 2) {
            const comboMult = 1 + comboCount * 0.5;
            ctx.font = '16px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff0';
            ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
            ctx.fillText(`x${comboMult.toFixed(1)}`, W / 2, H - 50);
            ctx.font = '7px "Press Start 2P", monospace';
            ctx.fillStyle = '#fa0';
            ctx.fillText(`${comboCount} COMBO`, W / 2, H - 36);
            ctx.shadowBlur = 0;
        }
    }

    // === Wave intro text with story ===
    if (state === 'WAVE_INTRO') {
        // Darken background
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W, H);

        // Wave title
        ctx.save();
        ctx.font = '16px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#0ff';
        ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
        ctx.fillText(waveText, W / 2, 60);
        ctx.shadowBlur = 0;
        ctx.restore();

        // Story text — typewriter
        ctx.save();
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        const startY = 95;
        const lineH = 14;

        for (let i = 0; i <= Math.min(storyLineIndex, storyLines.length - 1); i++) {
            const line = storyLines[i];
            if (!line && line !== '') continue;

            // Color coding for different line types
            if (line.startsWith('[') || line.startsWith('  ')) {
                ctx.fillStyle = '#fa0'; // memos/logs in amber
            } else if (line.startsWith('!!')) {
                ctx.fillStyle = '#f44'; // boss warnings in red
            } else if (line === '') {
                continue; // blank spacer
            } else if (line.startsWith('"')) {
                ctx.fillStyle = '#aaa'; // quotes in grey
            } else {
                ctx.fillStyle = '#0f0'; // narrative in green
            }

            let displayText;
            if (i < storyLineIndex) {
                displayText = line;
            } else if (i === storyLineIndex) {
                displayText = line.substring(0, storyCharIndex);
                // Blinking cursor
                if (frameCount % 30 < 15) displayText += '_';
            } else {
                continue;
            }

            const yPos = startY + i * lineH;
            if (yPos < H - 40) {
                ctx.fillText(displayText, W / 2, yPos);
            }
        }
        ctx.restore();

        // Skip prompt
        if (storySkipReady) {
            if (blinkTimer < 40) {
                ctx.font = '8px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#888';
                ctx.fillText('PRESS ANY KEY OR CLICK TO BEGIN', W / 2, H - 20);
            }
        } else if (!storyDone) {
            if (blinkTimer < 40) {
                ctx.font = '8px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#555';
                ctx.fillText('PRESS SPACE TO SKIP', W / 2, H - 20);
            }
        }
    }

    // Freeze tint
    if (player && player.freeze > 0) {
        ctx.fillStyle = 'rgba(100,150,255,0.06)';
        ctx.fillRect(ARENA_L, ARENA_T, ARENA_W, ARENA_H);
    }

    ctx.restore(); // end shake

    // === TITLE SCREEN ===
    if (state === 'TITLE') {
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(0, 0, W, H);

        // Grid bg
        ctx.strokeStyle = 'rgba(0,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // Floating enemy silhouettes
        for (const s of titleSilhouettes) {
            s.x += s.vx; s.y += s.vy;
            if (s.x < -20) s.x = W + 20;
            if (s.x > W + 20) s.x = -20;
            if (s.y < -20) s.y = H + 20;
            if (s.y > H + 20) s.y = -20;
            ctx.globalAlpha = s.alpha;
            ctx.fillStyle = s.color;
            ctx.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
        }
        ctx.globalAlpha = 1;

        // AXIOM CORP header
        ctx.font = '7px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#555';
        ctx.fillText('AXIOM CORP WEAPONS RESEARCH DIVISION', W / 2, H / 2 - 110);
        ctx.fillStyle = '#333';
        ctx.fillText('TEST CHAMBER 7 \u2014 RESTRICTED ACCESS', W / 2, H / 2 - 96);

        ctx.font = '36px "Press Start 2P", monospace';
        ctx.fillStyle = '#f0f';
        ctx.shadowColor = '#f0f'; ctx.shadowBlur = 20;
        ctx.fillText('ARENA', W / 2, H / 2 - 60);
        ctx.fillStyle = '#0ff';
        ctx.shadowColor = '#0ff';
        ctx.fillText('BLITZ', W / 2, H / 2 - 15);
        ctx.shadowBlur = 0;

        // Protocol Omega subtitle
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.fillStyle = '#f44';
        ctx.shadowColor = '#f44'; ctx.shadowBlur = 8;
        ctx.fillText('PROTOCOL OMEGA', W / 2, H / 2 + 12);
        ctx.shadowBlur = 0;

        if (blinkTimer < 40) {
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.fillStyle = '#ff0';
            ctx.fillText('PRESS START', W / 2, H / 2 + 44);
        }

        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillStyle = '#888';
        ctx.fillText('WASD MOVE / MOUSE AIM+SHOOT', W / 2, H / 2 + 84);
        ctx.fillText('1-4 SWITCH WEAPONS', W / 2, H / 2 + 100);
        ctx.fillStyle = '#664';
        ctx.fillText('YOU ARE SUBJECT-7. SURVIVE.', W / 2, H / 2 + 124);
    }

    // === GAME OVER ===
    if (state === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = '28px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f00';
        ctx.shadowColor = '#f00'; ctx.shadowBlur = 15;
        ctx.fillText('SUBJECT-7 DOWN', W / 2, H / 2 - 50);
        ctx.shadowBlur = 0;
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillStyle = '#666';
        ctx.fillText('[AXIOM LOG]: "Test concluded. Prepare', W / 2, H / 2 - 25);
        ctx.fillText('next subject for Phase 1."', W / 2, H / 2 - 12);
        ctx.font = '12px "Press Start 2P", monospace';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 12);
        ctx.fillStyle = '#0ff';
        ctx.fillText(`WAVE: ${wave}/10 \u2014 ${WAVE_TITLES[wave - 1]}`, W / 2, H / 2 + 32);
        if (blinkTimer < 40) {
            ctx.fillStyle = '#fff';
            ctx.font = '10px "Press Start 2P", monospace';
            ctx.fillText('PRESS R OR CLICK TO RESTART', W / 2, H / 2 + 65);
        }
    }

    // === VICTORY ===
    if (state === 'VICTORY') {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, W, H);

        if (!victoryStarted) {
            victoryStarted = true;
            victoryPage = 0;
            victoryPageDone = false;
            victoryScrollY = 0;
        }

        const linesPerPage = VICTORY_LINES_PER_PAGE;
        const totalPages = Math.ceil(VICTORY_STORY.length / linesPerPage);
        const pageStart = victoryPage * linesPerPage;
        const pageEnd = Math.min(pageStart + linesPerPage, VICTORY_STORY.length);
        const pageLines = VICTORY_STORY.slice(pageStart, pageEnd);
        const isLastPage = victoryPage >= totalPages - 1;

        // Score at top
        ctx.font = '10px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`FINAL SCORE: ${score}`, W / 2, 30);

        // Story lines
        ctx.font = '8px "Press Start 2P", monospace';
        const startY = 70;
        const lineH = 16;

        for (let i = 0; i < pageLines.length; i++) {
            const line = pageLines[i];
            const yPos = startY + i * lineH;

            if (line === '') continue;
            if (line.startsWith('\u2500')) {
                ctx.fillStyle = '#444';
            } else if (line.startsWith('PROTOCOL OMEGA')) {
                ctx.fillStyle = '#0ff';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
                ctx.fillText(line, W / 2, yPos);
                ctx.shadowBlur = 0;
                ctx.font = '8px "Press Start 2P", monospace';
                continue;
            } else if (line.startsWith('"')) {
                ctx.fillStyle = '#fa0';
            } else if (line.startsWith('AXIOM') || line.startsWith('Director') || line.startsWith('Dr.') || line.startsWith('Subject-7')) {
                ctx.fillStyle = '#aaa';
            } else {
                ctx.fillStyle = '#0f0';
            }

            // Fade in each line
            const lineAlpha = Math.min(1, (frameCount % 1000) / 30);
            ctx.globalAlpha = lineAlpha;
            ctx.fillText(line, W / 2, yPos);
        }
        ctx.globalAlpha = 1;

        // Navigation
        if (blinkTimer < 40) {
            ctx.font = '8px "Press Start 2P", monospace';
            ctx.fillStyle = '#888';
            if (!isLastPage) {
                ctx.fillText(`PAGE ${victoryPage + 1}/${totalPages} \u2014 PRESS SPACE/CLICK FOR NEXT`, W / 2, H - 30);
            } else {
                ctx.fillText('PRESS R OR CLICK TO PLAY AGAIN', W / 2, H - 30);
            }
        }
    }
}

// ========== INPUT: START / RESTART ==========
function handleStart() {
    initAudio();
    if (state === 'TITLE' || state === 'GAME_OVER') {
        startGame();
    }
    // Victory restart is handled separately via page system
}

function restartFromVictory() {
    initAudio();
    victoryStarted = false;
    startGame();
}

document.addEventListener('keydown', e => {
    if ((e.key === ' ' || e.key === 'Enter') && state === 'TITLE') handleStart();
    if (e.key === 'r' && state === 'GAME_OVER') handleStart();

    // Wave intro: skip typewriter or advance to gameplay
    if (state === 'WAVE_INTRO') {
        if (storySkipReady) {
            state = 'PLAYING';
        } else if (!storyDone) {
            // Skip to end of all lines
            storyLineIndex = storyLines.length;
            storyCharIndex = 0;
            storyDone = true;
            storyHoldTimer = 90;
        }
    }

    // Victory: page through or restart
    if (state === 'VICTORY') {
        const totalPages = Math.ceil(VICTORY_STORY.length / VICTORY_LINES_PER_PAGE);
        if (victoryPage < totalPages - 1) {
            if (e.key === ' ' || e.key === 'Enter') {
                victoryPage++;
            }
        } else {
            if (e.key === 'r') restartFromVictory();
        }
    }
});
canvas.addEventListener('click', e => {
    if (state === 'TITLE' || state === 'GAME_OVER') handleStart();

    // Wave intro click to skip/advance
    if (state === 'WAVE_INTRO') {
        if (storySkipReady) {
            state = 'PLAYING';
        } else if (!storyDone) {
            storyLineIndex = storyLines.length;
            storyCharIndex = 0;
            storyDone = true;
            storyHoldTimer = 90;
        }
    }

    // Victory click to page/restart
    if (state === 'VICTORY') {
        const totalPages = Math.ceil(VICTORY_STORY.length / VICTORY_LINES_PER_PAGE);
        if (victoryPage < totalPages - 1) {
            victoryPage++;
        } else {
            restartFromVictory();
        }
    }
});

// ========== MAIN LOOP ==========
let lastTime = 0;
const FRAME_TIME = 1000 / 60;
let accumulator = 0;

function loop(timestamp) {
    if (lastTime === 0) lastTime = timestamp;
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    if (dt > 100) dt = 100; // cap
    accumulator += dt;

    while (accumulator >= FRAME_TIME) {
        update();
        accumulator -= FRAME_TIME;
    }

    draw();
    requestAnimationFrame(loop);
}

// Hide cursor over canvas during gameplay
canvas.style.cursor = 'none';

requestAnimationFrame(loop);
</script>
