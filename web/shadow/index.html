<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shadow Blade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background-color: #000;
            z-index: 1;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%,
                rgba(0, 0, 0, 0.15)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Touch overlay - covers full screen */
        #touch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 50;
            pointer-events: none;
            display: none;
        }

        #touch-overlay.active {
            display: block;
        }

        /* Joystick */
        #joy-zone {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 140px;
            height: 140px;
            pointer-events: auto;
            touch-action: none;
        }

        #joy-container {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.08);
            border: 2px solid rgba(255, 50, 50, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            margin: 10px;
        }

        #joy-stick {
            width: 55px;
            height: 55px;
            background: rgba(255, 50, 50, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(204, 0, 0, 0.6), inset 0 0 8px rgba(255,255,255,0.3);
            position: absolute;
            pointer-events: none;
            transition: background 0.1s;
        }

        /* Button group - bottom right */
        #btn-zone {
            position: fixed;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            touch-action: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 150px;
            height: 140px;
        }

        .action-btn {
            width: 66px;
            height: 60px;
            border-radius: 14px;
            border: 2.5px solid;
            font-family: inherit;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        #btn-jump { border-color: #0cf; color: #0cf; text-shadow: 0 0 4px #0cf; }
        #btn-attack { border-color: #f44; color: #f44; text-shadow: 0 0 4px #f44; }
        #btn-dash { border-color: #ff0; color: #ff0; text-shadow: 0 0 4px #ff0; }
        #btn-shuriken { border-color: #0f0; color: #0f0; text-shadow: 0 0 4px #0f0; }

        .action-btn.active {
            transform: scale(0.90);
        }
        #btn-jump.active { box-shadow: 0 0 18px #0cf, inset 0 0 10px rgba(0,204,255,0.3); background: rgba(0,100,150,0.3); }
        #btn-attack.active { box-shadow: 0 0 18px #f44, inset 0 0 10px rgba(255,68,68,0.3); background: rgba(150,30,30,0.3); }
        #btn-dash.active { box-shadow: 0 0 18px #ff0, inset 0 0 10px rgba(255,255,0,0.3); background: rgba(150,150,0,0.3); }
        #btn-shuriken.active { box-shadow: 0 0 18px #0f0, inset 0 0 10px rgba(0,255,0,0.3); background: rgba(0,150,0,0.3); }

        @media (pointer: coarse), (max-width: 900px) {
            #touch-overlay { display: block; }
            #touch-overlay.active { display: block; }
        }
    </style>
</head>

const GRAVITY = 0.55;

// Scale factor for proportional rendering
let scaleFactor = 1;
let offsetX = 0, offsetY = 0;

function resizeCanvas() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = GW;
    canvas.height = GH;
    // Let CSS handle display sizing (100vw x 100vh) - do not override with px values
    // Compute scale for touch coordinate mapping
    scaleFactor = Math.min(w / GW, h / GH);
    offsetX = (w - GW * scaleFactor) / 2;
    offsetY = (h - GH * scaleFactor) / 2;
    window.scrollTo(0, 0);
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', function() {
    setTimeout(function() {
        resizeCanvas();
        window.scrollTo(0, 0);
    }, 150);
});
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
resizeCanvas();

// Low-end detection for particle cap
let isLowEnd = false;
(function detectLowEnd() {
    try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl');
        if (gl) {
            const dbg = gl.getExtension('WEBGL_debug_renderer_info');
            if (dbg) {
                const renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || '';
                isLowEnd = /mali|adreno\s?[1-4]|powervr|sgx|apple gpu/i.test(renderer);
            }
        }
    } catch(e) {}
    // Also flag as low-end on small screens (likely mobile)
    if (window.innerWidth < 500) isLowEnd = true;
})();
const MAX_PARTICLES = isLowEnd ? 80 : 200;

// ============================================================
// COLOR PALETTE & SPRITE SYSTEM
// ============================================================
const PAL = {
    '.': null, 'K': '#111', 'G': '#555', 'W': '#fff', 'R': '#e22',
    'B': '#06f', 'C': '#0ff', 'Y': '#fc0', 'P': '#93f', 'O': '#f60',
    'N': '#8B4513', 'D': '#333', 'S': '#bbb', 'M': '#f0f', 'r': '#800',
    'g': '#383', 'b': '#004', 'L': '#666', 'T': '#a52', 'H': '#fcc',
    'E': '#c00', 'F': '#fa0'
};

const spriteCache = {};
function drawSprite(spr, x, y, scale, flipX) {
    const key = spr.join('|') + scale + (flipX?'F':'');
    if (!spriteCache[key]) {
        const h = spr.length, w = spr[0].length;
        const oc = document.createElement('canvas');
        oc.width = w * scale; oc.height = h * scale;
        const ox = oc.getContext('2d');
        for (let r = 0; r < h; r++) {
            for (let c = 0; c < w; c++) {
                const col = PAL[spr[r][c]];
                if (col) {
                    ox.fillStyle = col;
                    const px = flipX ? (w - 1 - c) * scale : c * scale;
                    ox.fillRect(px, r * scale, scale, scale);
                }
            }
        }
        spriteCache[key] = oc;
    }
    ctx.drawImage(spriteCache[key], Math.round(x), Math.round(y));
}

// ============================================================
// WEB AUDIO API SOUND ENGINE
// ============================================================
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);

    if (type === 'slash') {
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t);
        o.frequency.exponentialRampToValueAtTime(200, t+0.08);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        o.connect(g); o.start(t); o.stop(t+0.1);
    } else if (type === 'slash2') {
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(600, t);
        o.frequency.exponentialRampToValueAtTime(300, t+0.1);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
        o.connect(g); o.start(t); o.stop(t+0.12);
    } else if (type === 'slash3') {
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(400, t);
        o.frequency.exponentialRampToValueAtTime(100, t+0.15);
        g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
        o.connect(g); o.start(t); o.stop(t+0.18);
    } else if (type === 'shuriken') {
        const o = audioCtx.createOscillator();
        o.type = 'sine'; o.frequency.setValueAtTime(1200, t);
        o.frequency.exponentialRampToValueAtTime(2400, t+0.06);
        o.frequency.exponentialRampToValueAtTime(800, t+0.12);
        g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
        o.connect(g); o.start(t); o.stop(t+0.15);
    } else if (type === 'jump') {
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(250, t);
        o.frequency.exponentialRampToValueAtTime(500, t+0.08);
        g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        o.connect(g); o.start(t); o.stop(t+0.1);
    } else if (type === 'walljump') {
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(350, t);
        o.frequency.exponentialRampToValueAtTime(700, t+0.06);
        g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        o.connect(g); o.start(t); o.stop(t+0.1);
        const o2 = audioCtx.createOscillator();
        o2.type = 'square'; o2.frequency.setValueAtTime(500, t+0.06);
        o2.frequency.exponentialRampToValueAtTime(900, t+0.12);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.06, t+0.06); g2.gain.exponentialRampToValueAtTime(0.001, t+0.15);
        o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t+0.06); o2.stop(t+0.15);
    } else if (type === 'dash') {
        const bufSz = audioCtx.sampleRate * 0.1;
        const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSz; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/bufSz);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        src.connect(g); src.start(t);
    } else if (type === 'hit') {
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(200, t);
        o.frequency.exponentialRampToValueAtTime(80, t+0.08);
        g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        o.connect(g); o.start(t); o.stop(t+0.1);
    } else if (type === 'enemydeath') {
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(500, t);
        o.frequency.exponentialRampToValueAtTime(50, t+0.3);
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.3);
        o.connect(g); o.start(t); o.stop(t+0.3);
    } else if (type === 'hurt') {
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(120, t);
        o.frequency.setValueAtTime(100, t+0.05);
        g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
        o.connect(g); o.start(t); o.stop(t+0.15);
    } else if (type === 'death') {
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t);
        o.frequency.exponentialRampToValueAtTime(30, t+0.8);
        g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.8);
        o.connect(g); o.start(t); o.stop(t+0.8);
    } else if (type === 'pickup') {
        for (let i = 0; i < 3; i++) {
            const o = audioCtx.createOscillator();
            o.type = 'square';
            o.frequency.setValueAtTime([523,659,784][i], t+i*0.06);
            const gi = audioCtx.createGain();
            gi.gain.setValueAtTime(0.06, t+i*0.06);
            gi.gain.exponentialRampToValueAtTime(0.001, t+i*0.06+0.08);
            o.connect(gi); gi.connect(audioCtx.destination);
            o.start(t+i*0.06); o.stop(t+i*0.06+0.08);
        }
    }
}

// ============================================================
// INPUT HANDLING
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    initAudio();
    if (gameState === 'TITLE' && (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'KeyX')) { startGame(); }
    if (gameState === 'GAMEOVER' && (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'KeyX')) { resetToTitle(); }
    if (gameState === 'VICTORY' && (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'KeyX')) { resetToTitle(); }
    if (gameState === 'STORY' && (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'KeyX')) { advanceStory(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Buffered input for precise actions
let jumpPressed = false, jumpHeld = false;
let attackPressed = false, dashPressed = false, shurikenPressed = false;

function pollInput() {
    const pJump = jumpHeld;
    jumpHeld = keys['KeyX'] || keys['Space'] || touchBtns.jump;
    jumpPressed = jumpHeld && !pJump;

    const pAtk = attackPressed;
    attackPressed = keys['KeyZ'] || touchBtns.attack;

    const pDash = dashPressed;
    dashPressed = keys['KeyC'] || touchBtns.dash;

    const pShur = shurikenPressed;
    shurikenPressed = keys['KeyV'] || touchBtns.shuriken;

    return {
        left: keys['ArrowLeft'] || keys['KeyA'] || (joystick.active && joystick.vx < -0.3),
        right: keys['ArrowRight'] || keys['KeyD'] || (joystick.active && joystick.vx > 0.3),
        up: keys['ArrowUp'] || keys['KeyW'] || (joystick.active && joystick.vy < -0.3),
        down: keys['ArrowDown'] || keys['KeyS'] || (joystick.active && joystick.vy > 0.3),
        jump: jumpPressed,
        jumpHeld: jumpHeld,
        attack: attackPressed && !pAtk,
        attackHeld: attackPressed,
        dash: dashPressed && !pDash,
        shuriken: shurikenPressed && !pShur,
    };
}

// Touch controls
const joystick = { active: false, vx: 0, vy: 0 };
const touchBtns = { jump: false, attack: false, dash: false, shuriken: false };

const joyContainer = document.getElementById('joy-container');
const joyStick = document.getElementById('joy-stick');
const joyZone = document.getElementById('joy-zone');
let joyDragging = false;
let joyTouchId = null;
const DEADZONE = 20;
const maxJoyR = 45;

function updateJoy(cx, cy) {
    const r = joyContainer.getBoundingClientRect();
    let dx = cx - (r.left + r.width/2), dy = cy - (r.top + r.height/2);
    let d = Math.sqrt(dx*dx+dy*dy);
    if (d > maxJoyR) { dx = dx/d*maxJoyR; dy = dy/d*maxJoyR; }
    joyStick.style.transform = 'translate('+dx+'px,'+dy+'px)';
    // Apply deadzone
    if (d < DEADZONE) {
        joystick.vx = 0;
        joystick.vy = 0;
    } else {
        joystick.vx = dx/maxJoyR;
        joystick.vy = dy/maxJoyR;
    }
}
function resetJoy() {
    joyDragging = false;
    joyTouchId = null;
    joystick.active = false;
    joystick.vx = 0;
    joystick.vy = 0;
    joyStick.style.transform = 'translate(0,0)';
}

joyZone.addEventListener('touchstart', function(e) {
    e.preventDefault();
    initAudio();
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (joyTouchId === null) {
            joyTouchId = e.changedTouches[i].identifier;
            joyDragging = true;
            joystick.active = true;
            updateJoy(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
        }
    }
}, {passive:false});

joyZone.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joyTouchId) {
            updateJoy(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
        }
    }
}, {passive:false});

joyZone.addEventListener('touchend', function(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joyTouchId) {
            resetJoy();
        }
    }
});
joyZone.addEventListener('touchcancel', function(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joyTouchId) {
            resetJoy();
        }
    }
});

// Mouse fallback for joystick
joyZone.addEventListener('mousedown', function(e) { joyDragging = true; joystick.active = true; updateJoy(e.clientX, e.clientY); });
window.addEventListener('mousemove', function(e) { if (joyDragging) updateJoy(e.clientX, e.clientY); });
window.addEventListener('mouseup', function() { if (joyDragging) resetJoy(); });

function buildLevel(lvl) {

    const H = 30;

    else if (lvl === 1) W = 100;
    else W = 95;

    const tiles = [];
    for (let y = 0; y < H; y++) {

    function addGround(gapList) {
        for (let x = 0; x < W; x++) {
            tiles[H-1][x] = 1;
            tiles[H-2][x] = 1;

function tileAt(tx, ty) {
    if (!level) return 0;
    if (tx < 0 || tx >= level.W || ty < 0 || ty >= level.H) return ty >= level.H ? 1 : 0;
    return level.tiles[ty][tx];
}
function isSolid(tx, ty) { const t = tileAt(tx,ty); return t === 1 || t === 2; }

// CAMERA
// ============================================================
class Camera {
    constructor() { this.x = 0; this.y = 0; }
    follow(target) {
        if (!level) return;
        const tx = target.x - GW/2 + target.w/2;
        const ty = target.y - GH/2 + target.h/2 - 40;
        this.x += (tx - this.x) * 0.1;
        this.y += (ty - this.y) * 0.06;
        this.x = Math.max(0, Math.min(level.pw - GW, this.x));
        this.y = Math.max(0, Math.min(level.ph - GH, this.y));
        this.x = safeNum(this.x, 0);
        this.y = safeNum(this.y, 0);
    }
}

// PARTICLES
// ============================================================
function spawnParticles(x, y, count, color, spread, life) {
    // Cap particle count on low-end
    if (isLowEnd) count = Math.min(count, 5);
    for (let i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) break;
        particles.push({
            x, y, vx: (Math.random()-0.5)*spread, vy: (Math.random()-0.5)*spread - 1,
            life: life || 20+Math.random()*15, maxLife: life || 30, color, size: 1+Math.random()*2
        });
    }
}

function spawnSlashParticle(x, y, dir, combo) {
    const colors = ['#fff','#cef','#0ff'];
    const count = isLowEnd ? 4 : 8;
    for (let i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) break;
        const angle = (dir > 0 ? -0.5 : 2.6) + Math.random() * 1.2;
        const speed = 2 + Math.random() * 3;
        particles.push({
            x, y: y - 4 + Math.random()*8, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1,
            life: 8+Math.random()*6, maxLife: 14, color: colors[combo%3], size: 1.5+Math.random()*1.5
        });
    }
}

function spawnDashTrail(x, y, w, h) {
    if (particles.length >= MAX_PARTICLES) return;
    particles.push({
        x, y, vx: 0, vy: 0, life: 10, maxLife: 10,
        color: '#a0f', size: 0, isGhost: true, gw: w, gh: h
    });
}

function updateParticles() {
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx||0; p.y += p.vy||0;
        if (!p.isGhost) p.vy += 0.1;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const a = p.life / p.maxLife;
        if (a <= 0) continue;
        ctx.globalAlpha = a;
        if (p.isGhost) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = a * 0.4;
            ctx.fillRect(Math.round(p.x - camera.x), Math.round(p.y - camera.y), p.gw, p.gh);
        } else {
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.round(p.x - camera.x), Math.round(p.y - camera.y), p.size, p.size);
        }
    }
    ctx.globalAlpha = 1;
}

// ============================================================
// PLAYER
// ============================================================
class Player {
    constructor(x, y) {
        this.x = safeNum(x, 48); this.y = safeNum(y, 384);
        this.w = 14; this.h = 28;
        this.vx = 0; this.vy = 0;
        this.facing = 1;
        this.onGround = false;
        this.hp = 5; this.maxHp = 5;
        this.shurikens = 15;
        this.invuln = 0;

        this.jumpHoldTime = 0;
        this.maxJumpHold = 10;
        this.coyoteTime = 0;
        this.jumpBuffered = 0;

        this.wallDir = 0;
        this.wallSliding = false;

        this.canDash = true;
        this.dashing = false;
        this.dashTimer = 0;
        this.dashDir = 0;

        this.sliding = false;
        this.slideTimer = 0;

        this.attacking = false;
        this.combo = 0;
        this.attackTimer = 0;
        this.comboWindow = 0;
        this.shurikenCooldown = 0;
        this.attackHitbox = null;

        this.animFrame = 0;
        this.animTimer = 0;
        this.state = 'idle';

        this.dead = false;
        this.deathTimer = 0;
    }

    update(input) {
        if (this.dead) { this.deathTimer++; return; }
        if (this.invuln > 0) this.invuln--;
        if (this.shurikenCooldown > 0) this.shurikenCooldown--;

        // Detect walls
        this.wallDir = 0;
        if (!this.onGround) {
            const midY = Math.floor((this.y + this.h/2) / TILE);
            const topY = Math.floor(this.y / TILE);
            if (isSolid(Math.floor((this.x - 2)/TILE), midY) || isSolid(Math.floor((this.x - 2)/TILE), topY)) this.wallDir = -1;
            if (isSolid(Math.floor((this.x + this.w + 1)/TILE), midY) || isSolid(Math.floor((this.x + this.w + 1)/TILE), topY)) this.wallDir = 1;
        }

        // Attack
        if (this.attacking) {
            this.attackTimer--;
            if (this.attackTimer <= 0) {
                this.attacking = false;
                this.attackHitbox = null;
                this.comboWindow = 18;
            }
        }

        if (this.comboWindow > 0) this.comboWindow--;
        if (this.comboWindow <= 0 && !this.attacking) this.combo = 0;

        if (input.attack && !this.attacking && !this.dashing) {
            this.attacking = true;
            if (this.comboWindow > 0 && this.combo < 3) {
                this.combo++;
            } else {
                this.combo = 1;
            }
            this.comboWindow = 0;
            const dur = this.combo === 3 ? 14 : 10;
            this.attackTimer = dur;
            this.animFrame = 0;

            const hbw = this.combo === 3 ? 30 : 24;
            const hbh = this.combo === 3 ? 24 : 18;
            const hbx = this.facing > 0 ? this.x + this.w : this.x - hbw;
            const hby = this.y + (this.combo === 3 ? -4 : 4);
            this.attackHitbox = { x: hbx, y: hby, w: hbw, h: hbh, damage: this.combo === 3 ? 2 : 1, hit: new Set() };

            spawnSlashParticle(this.x + this.w/2 + this.facing * 12, this.y + this.h/2, this.facing, this.combo);
            playSound(this.combo === 1 ? 'slash' : this.combo === 2 ? 'slash2' : 'slash3');
        }

        // Shuriken
        if (input.shuriken && this.shurikens > 0 && this.shurikenCooldown <= 0 && !this.attacking) {
            this.shurikens--;
            this.shurikenCooldown = 18;
            projectiles.push({
                x: this.x + (this.facing > 0 ? this.w : -6), y: this.y + 10,
                vx: this.facing * 7, vy: 0, w: 6, h: 6,
                damage: 1, fromPlayer: true, life: 120, type: 'shuriken', rot: 0
            });
            playSound('shuriken');
        }

        // Update attack hitbox position
        if (this.attackHitbox) {
            const hbw = this.combo === 3 ? 30 : 24;
            this.attackHitbox.x = this.facing > 0 ? this.x + this.w : this.x - hbw;
            this.attackHitbox.y = this.y + (this.combo === 3 ? -4 : 4);
        }

        // Dashing
        if (this.dashing) {
            this.dashTimer--;
            this.vx = this.dashDir * 14;
            this.vy = 0;
            if (frameCount % 2 === 0) spawnDashTrail(this.x, this.y, this.w, this.h);
            if (this.dashTimer <= 0) {
                this.dashing = false;
                this.vx = this.dashDir * 3;
            }
        }

        // Sliding
        if (this.sliding) {
            this.slideTimer--;
            this.vx = this.facing * 6;
            if (this.slideTimer <= 0) this.sliding = false;
        }

        if (!this.dashing && !this.sliding && !this.attacking) {
            const speed = 3.5;
            const accel = this.onGround ? 0.8 : 0.5;
            let targetVx = 0;
            if (input.left) { targetVx = -speed; this.facing = -1; }
            if (input.right) { targetVx = speed; this.facing = 1; }
            this.vx += (targetVx - this.vx) * accel;
            if (Math.abs(this.vx) < 0.2 && targetVx === 0) this.vx = 0;
        }

        // Dash trigger
        if (input.dash && !this.dashing && !this.sliding) {
            if (!this.onGround && this.canDash) {
                this.dashing = true;
                this.dashTimer = 7;
                this.dashDir = this.facing;
                this.canDash = false;
                this.invuln = Math.max(this.invuln, 7);
                playSound('dash');
            } else if (this.onGround && (input.left || input.right)) {
                this.sliding = true;
                this.slideTimer = 12;
                playSound('dash');
            }
        }

        // Wall slide
        this.wallSliding = false;
        if (!this.onGround && !this.dashing && this.wallDir !== 0 && this.vy > 0) {
            if ((this.wallDir === -1 && input.left) || (this.wallDir === 1 && input.right)) {
                this.wallSliding = true;
                this.vy = Math.min(this.vy, 1.5);
                this.canDash = true;
            }
        }

        // Wall-slide dust particles
        if (this.wallSliding && frameCount % 3 === 0) {
            const dustX = this.wallDir === -1 ? this.x - 1 : this.x + this.w + 1;
            const dustY = this.y + this.h * 0.3 + Math.random() * this.h * 0.4;
            const colors = ['#ccc', '#aaa', '#fff', '#999'];
            if (particles.length < MAX_PARTICLES) {
                particles.push({
                    x: dustX, y: dustY,
                    vx: -this.wallDir * (0.3 + Math.random() * 0.5),
                    vy: -0.5 - Math.random() * 0.5,
                    life: 10 + Math.random() * 8, maxLife: 18,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: 1 + Math.random() * 1.5
                });
            }
        }

        // Gravity
        if (!this.dashing) {
            this.vy += GRAVITY;
            if (this.jumpHoldTime > 0 && input.jumpHeld) {
                this.vy -= 0.35;
                this.jumpHoldTime--;
            }
            if (this.vy > MAX_FALL) this.vy = MAX_FALL;
        }

        // Jump
        if (this.onGround) {
            this.coyoteTime = 6;
            this.canDash = true;
        } else {
            if (this.coyoteTime > 0) this.coyoteTime--;
        }

        if (input.jump) this.jumpBuffered = 5;
        if (this.jumpBuffered > 0) this.jumpBuffered--;

        if (this.jumpBuffered > 0) {
            if (this.coyoteTime > 0 && !this.dashing) {
                this.vy = -9.5;
                this.jumpHoldTime = this.maxJumpHold;
                this.onGround = false;
                this.coyoteTime = 0;
                this.jumpBuffered = 0;
                playSound('jump');
            } else if (this.wallSliding && !this.dashing) {
                this.vy = -9;
                this.vx = -this.wallDir * 5;
                this.facing = -this.wallDir;
                this.jumpHoldTime = 6;
                this.wallSliding = false;
                this.canDash = true;
                this.jumpBuffered = 0;
                playSound('walljump');
            }
        }

        // Move & collide
        this.moveAndCollide();

        // NaN guard after physics
        this.x = safeNum(this.x, 48);
        this.y = safeNum(this.y, 384);
        this.vx = safeNum(this.vx, 0);
        this.vy = safeNum(this.vy, 0);

        // Spike death
        const feetTile = tileAt(Math.floor((this.x+this.w/2)/TILE), Math.floor((this.y+this.h+2)/TILE));
        if (feetTile === 4) this.takeDamage(5);

        // Fall death
        if (level && this.y > level.ph + 50) this.takeDamage(5);

        // Animation state
        if (this.attacking) {
            this.state = 'attack' + this.combo;
        } else if (this.dashing) {
            this.state = 'dash';
        } else if (this.sliding) {
            this.state = 'slide';
        } else if (this.wallSliding) {
            this.state = 'wallslide';
        } else if (!this.onGround) {
            this.state = this.vy < 0 ? 'jump' : 'fall';
        } else if (Math.abs(this.vx) > 0.5) {
            this.state = 'run';
        } else {
            this.state = 'idle';
        }

        this.animTimer++;
    }

    moveAndCollide() {
        if (!level) return;
        // Horizontal
        this.x += this.vx;
        const hSlide = this.sliding ? this.h * 0.5 : 0;
        const effY = this.y + hSlide;
        const effH = this.h - hSlide;

        if (this.vx < 0) {
            const tx = Math.floor(this.x / TILE);
            for (let ty = Math.floor(effY/TILE); ty <= Math.floor((effY+effH-1)/TILE); ty++) {
                if (isSolid(tx, ty)) { this.x = (tx+1)*TILE; this.vx = 0; break; }
            }
        }
        if (this.vx > 0) {
            const tx = Math.floor((this.x+this.w)/TILE);
            for (let ty = Math.floor(effY/TILE); ty <= Math.floor((effY+effH-1)/TILE); ty++) {
                if (isSolid(tx, ty)) { this.x = tx*TILE - this.w; this.vx = 0; break; }
            }
        }

        // Vertical
        this.y += this.vy;
        this.onGround = false;

        if (this.vy >= 0) {
            const by = Math.floor((this.y+this.h)/TILE);
            for (let tx = Math.floor(this.x/TILE); tx <= Math.floor((this.x+this.w-1)/TILE); tx++) {
                const t = tileAt(tx, by);
                if (t === 1 || t === 2 || t === 3) {
                    if (t === 3 && this.y + this.h - this.vy > by * TILE + 2) continue;
                    this.y = by * TILE - this.h;
                    this.vy = 0;
                    this.onGround = true;
                    break;
                }
            }
        }

        if (this.vy < 0) {
            const ty = Math.floor(this.y / TILE);
            for (let tx = Math.floor(this.x/TILE); tx <= Math.floor((this.x+this.w-1)/TILE); tx++) {
                if (isSolid(tx, ty)) { this.y = (ty+1)*TILE; this.vy = 0; break; }
            }
        }

        // Clamp to level
        if (level) {
            this.x = Math.max(0, Math.min(level.pw - this.w, this.x));
        }
    }

    takeDamage(dmg) {
        if (this.invuln > 0 || this.dead) return;
        this.hp -= dmg;
        this.invuln = 45;
        spawnParticles(this.x+this.w/2, this.y+this.h/2, 10, '#f00', 5, 15);
        if (this.hp <= 0) {
            this.hp = 0;
            this.dead = true;
            this.deathTimer = 0;
            playSound('death');
            spawnParticles(this.x+this.w/2, this.y+this.h/2, 30, '#f00', 8, 30);
        } else {
            playSound('hurt');
        }
    }

    draw() {
        if (this.dead && this.deathTimer > 30) return;
        if (this.invuln > 0 && Math.floor(frameCount/3)%2===0 && !this.dead) return;

        const sx = Math.round(this.x - camera.x);
        const sy = Math.round(this.y - camera.y);

        let spr;
        const flip = this.facing < 0;
        if (this.state.startsWith('attack')) {
            if (this.combo === 1) spr = SPR_NINJA_ATTACK;
            else if (this.combo === 2) spr = SPR_NINJA_ATTACK2;
            else spr = SPR_NINJA_ATTACK3;
        } else if (this.state === 'run') {
            spr = (Math.floor(this.animTimer/6) % 2 === 0) ? SPR_NINJA_RUN1 : SPR_NINJA_RUN2;
        } else if (this.state === 'jump' || this.state === 'fall' || this.state === 'wallslide' || this.state === 'dash') {
            spr = SPR_NINJA_JUMP;
        } else {
            spr = SPR_NINJA_IDLE;
        }

        if (this.dead) {
            ctx.globalAlpha = Math.max(0, 1 - this.deathTimer / 30);
        }

        const sprW = spr[0].length * 2;
        const sprH = spr.length * 2;
        drawSprite(spr, sx - (sprW - this.w)/2, sy - (sprH - this.h) + 2, 2, flip);

        ctx.globalAlpha = 1;

        // Draw slash effect
        if (this.attacking && this.attackTimer > 5) {
            ctx.globalAlpha = this.attackTimer / 14;
            ctx.strokeStyle = this.combo === 3 ? '#ff0' : '#fff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.combo === 3 ? '#ff0' : '#0ff';
            const cx = sx + this.w/2 + this.facing * 18;
            const cy = sy + this.h/2 + (this.combo === 3 ? -8 : 0);
            const r = this.combo === 3 ? 20 : 16;
            const aStart = this.facing > 0 ? -1.2 : 1.9;
            ctx.beginPath();
            ctx.arc(cx, cy, r, aStart, aStart + 1.5);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
    }
}

// ============================================================
// ENEMIES
// ============================================================
class Enemy {
    constructor(x, y, type) {
        this.x = safeNum(x, 0); this.y = safeNum(y, 0);
        this.type = type;
        this.w = 14; this.h = 26;
        this.vx = 0; this.vy = 0;
        this.facing = -1;
        this.onGround = false;
        this.dead = false;
        this.deathTimer = 0;
        this.stunTimer = 0;
        this.animTimer = 0;

        if (type === 'guard') {
            this.hp = 2; this.speed = 1.2; this.damage = 1; this.score = 100;
            this.patrolLeft = x - 60; this.patrolRight = x + 60;
            this.chasing = false; this.chargeSpeed = 2.8;
        } else {
            this.hp = 1; this.speed = 0; this.damage = 1; this.score = 150;
            this.shootTimer = 60 + Math.random() * 40;
            this.shootCooldown = 90;
        }
    }

    update() {
        if (this.dead) { this.deathTimer++; return; }
        if (this.stunTimer > 0) { this.stunTimer--; return; }

        this.animTimer++;
        if (!player || player.dead) {
            // Patrol if player dead
            if (this.type === 'guard') {
                this.vx = this.facing * this.speed;
                if (this.x <= this.patrolLeft) this.facing = 1;
                if (this.x >= this.patrolRight) this.facing = -1;
            }
        } else {
            const px = player.x, py = player.y;
            const dx = px - this.x, dy = py - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (this.type === 'guard') {
                if (dist < 200) {
                    this.facing = dx > 0 ? 1 : -1;
                    this.chasing = dist < 130;
                }

                if (this.chasing && !player.dead) {
                    this.vx = this.facing * this.chargeSpeed;
                } else {
                    this.vx = this.facing * this.speed;
                    if (this.x <= this.patrolLeft) this.facing = 1;
                    if (this.x >= this.patrolRight) this.facing = -1;

                    const aheadX = this.facing > 0 ? this.x + this.w + 2 : this.x - 2;
                    const belowTile = tileAt(Math.floor(aheadX/TILE), Math.floor((this.y+this.h+2)/TILE));
                    if (belowTile === 0 || belowTile === 4) this.facing *= -1;
                }
            } else if (this.type === 'archer') {
                this.facing = dx > 0 ? 1 : -1;
                this.shootTimer--;
                if (this.shootTimer <= 0 && dist < 250 && !player.dead) {
                    projectiles.push({
                        x: this.x + (this.facing > 0 ? this.w : -8), y: this.y + 10,
                        vx: this.facing * 4, vy: 0, w: 8, h: 3,
                        damage: 1, fromPlayer: false, life: 150, type: 'arrow'
                    });
                    this.shootTimer = this.shootCooldown;
                }
            }
        }

        // Gravity
        this.vy += GRAVITY;
        if (this.vy > MAX_FALL) this.vy = MAX_FALL;

        // Move
        this.x += this.vx;
        this.y += this.vy;

        // NaN guard
        this.x = safeNum(this.x, 0);
        this.y = safeNum(this.y, 0);
        this.vx = safeNum(this.vx, 0);
        this.vy = safeNum(this.vy, 0);

        // Simple collision
        this.onGround = false;
        const by = Math.floor((this.y+this.h)/TILE);
        for (let tx = Math.floor(this.x/TILE); tx <= Math.floor((this.x+this.w-1)/TILE); tx++) {
            const t = tileAt(tx, by);
            if (t === 1 || t === 2 || t === 3) {
                this.y = by * TILE - this.h;
                this.vy = 0;
                this.onGround = true;
                break;
            }
        }

        // Wall collision
        if (this.vx < 0) {
            const tx = Math.floor(this.x / TILE);
            if (isSolid(tx, Math.floor((this.y+this.h/2)/TILE))) {
                this.x = (tx+1)*TILE; this.facing = 1;
            }
        }
        if (this.vx > 0) {
            const tx = Math.floor((this.x+this.w) / TILE);
            if (isSolid(tx, Math.floor((this.y+this.h/2)/TILE))) {
                this.x = tx*TILE - this.w; this.facing = -1;
            }
        }

        // Contact damage to player
        if (player && !player.dead && this.overlaps(player) && player.invuln <= 0) {
            player.takeDamage(this.damage);
            player.vx = (player.x < this.x ? -1 : 1) * 4;
            player.vy = -3;
        }

        // Fall death
        if (level && this.y > level.ph + 100) this.dead = true;
    }

    overlaps(other) {
        return this.x < other.x+other.w && this.x+this.w > other.x &&
               this.y < other.y+other.h && this.y+this.h > other.y;
    }

    takeDamage(dmg) {
        this.hp -= dmg;
        this.stunTimer = 8;
        spawnParticles(this.x+this.w/2, this.y+this.h/2, 6, '#ff0', 4, 12);
        playSound('hit');
        screenShake = Math.max(screenShake, 3);
        hitFlashFrames = 2;
        if (this.hp <= 0) {
            this.dead = true;
            score += this.score;
            spawnParticles(this.x+this.w/2, this.y+this.h/2, 15, this.type==='guard'?'#fa0':'#f0f', 6, 20);
            playSound('enemydeath');
            screenShake = Math.max(screenShake, 6);

            if (Math.random() < 0.3) {
                const types = ['health','scroll','ammo'];
                const t = types[Math.floor(Math.random()*types.length)];
                pickups.push({ x: this.x, y: this.y, w: 12, h: 12, type: t, vy: -3, life: 600 });
            }
        }
    }

    draw() {
        if (this.dead && this.deathTimer > 15) return;
        const sx = Math.round(this.x - camera.x);
        const sy = Math.round(this.y - camera.y);
        if (sx < -40 || sx > GW+40 || sy < -40 || sy > GH+40) return;

        if (this.dead) ctx.globalAlpha = Math.max(0, 1 - this.deathTimer/15);
        if (this.stunTimer > 0 && Math.floor(frameCount/2)%2===0) ctx.globalAlpha = 0.5;

        const flip = this.facing < 0;
        const spr = this.type === 'guard' ?
            (Math.abs(this.vx) > 0.5 ? SPR_GUARD_RUN : SPR_GUARD) : SPR_ARCHER;
        const sprW = spr[0].length * 2;
        const sprH = spr.length * 2;
        drawSprite(spr, sx - (sprW-this.w)/2, sy - (sprH-this.h)+2, 2, flip);

        ctx.globalAlpha = 1;

        // HP bar
        if (!this.dead && this.hp < (this.type==='guard'?2:1)) {
            ctx.fillStyle = '#300'; ctx.fillRect(sx-2, sy-6, this.w+4, 3);
            ctx.fillStyle = '#f00'; ctx.fillRect(sx-2, sy-6, (this.w+4)*(this.hp/(this.type==='guard'?2:1)), 3);
        }
    }
}

// ============================================================
// PROJECTILES
// ============================================================
function updateProjectiles() {
    for (let i = projectiles.length-1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.type === 'shuriken') p.rot = (p.rot||0) + 0.3;
        p.life--;

        // Tile collision
        const tx = Math.floor((p.x+p.w/2)/TILE), ty = Math.floor((p.y+p.h/2)/TILE);
        if (isSolid(tx, ty)) { projectiles.splice(i,1); continue; }

        if (p.life <= 0) { projectiles.splice(i,1); continue; }

        if (p.fromPlayer) {
            let hit = false;
            for (let j = 0; j < entities.length; j++) {
                const e = entities[j];
                if (!e.dead && p.x < e.x+e.w && p.x+p.w > e.x && p.y < e.y+e.h && p.y+p.h > e.y) {
                    e.takeDamage(p.damage);
                    hit = true;
                    break;
                }
            }
            if (hit) { projectiles.splice(i,1); continue; }
        } else {
            if (player && !player.dead && player.invuln <= 0 &&
                p.x < player.x+player.w && p.x+p.w > player.x &&
                p.y < player.y+player.h && p.y+p.h > player.y) {
                player.takeDamage(p.damage);
                projectiles.splice(i,1);
            }
        }
    }
}

function drawProjectiles() {
    for (let i = 0; i < projectiles.length; i++) {
        const p = projectiles[i];
        const sx = Math.round(p.x - camera.x);
        const sy = Math.round(p.y - camera.y);
        if (sx < -20 || sx > GW+20) continue;
        if (p.type === 'shuriken') {
            ctx.save();
            ctx.translate(sx+3, sy+3);
            ctx.rotate(p.rot||0);
            drawSprite(SPR_SHURIKEN, -6, -6, 2, false);
            ctx.restore();
        } else {
            drawSprite(SPR_ARROW, sx, sy, 2, p.vx < 0);
        }
    }
}

// ============================================================
// PICKUPS
// ============================================================
function updatePickups() {
    for (let i = pickups.length-1; i >= 0; i--) {
        const p = pickups[i];
        if (p.vy !== 0) {
            p.vy += 0.3;
            p.y += p.vy;
        }
        if (p.life < 999999) p.life--;

        // Ground collision
        const by = Math.floor((p.y+p.h)/TILE);
        for (let tx = Math.floor(p.x/TILE); tx <= Math.floor((p.x+p.w-1)/TILE); tx++) {
            const t = tileAt(tx, by);
            if (t === 1 || t === 2 || t === 3) { p.y = by*TILE - p.h; p.vy = 0; break; }
        }

        // Player pickup
        if (player && !player.dead && p.x < player.x+player.w && p.x+p.w > player.x &&
            p.y < player.y+player.h && p.y+p.h > player.y) {
            if (p.type === 'health') { player.hp = Math.min(player.maxHp, player.hp+1); }
            else if (p.type === 'scroll') { score += 200; }
            else if (p.type === 'ammo') { player.shurikens = Math.min(30, player.shurikens+5); }
            playSound('pickup');
            spawnParticles(p.x+p.w/2, p.y+p.h/2, 8, '#ff0', 3, 15);
            pickups.splice(i, 1);
            continue;
        }

        if (p.life <= 0) pickups.splice(i, 1);
    }
}

function drawPickups() {
    for (let i = 0; i < pickups.length; i++) {
        const p = pickups[i];
        const sx = Math.round(p.x - camera.x);
        const sy = Math.round(p.y - camera.y);
        if (sx < -20 || sx > GW+20) continue;
        const bob = Math.sin(frameCount * 0.08) * 2;
        const spr = p.type === 'health' ? SPR_HEART : p.type === 'scroll' ? SPR_SCROLL : SPR_AMMO;
        drawSprite(spr, sx, sy + bob, 2, false);
    }
}

// ============================================================
// LEVEL RENDERING
// ============================================================
function drawLevel() {
    if (!level) return;
    const startTx = Math.max(0, Math.floor(camera.x / TILE));
    const endTx = Math.min(level.W-1, Math.floor((camera.x + GW) / TILE) + 1);
    const startTy = Math.max(0, Math.floor(camera.y / TILE));
    const endTy = Math.min(level.H-1, Math.floor((camera.y + GH) / TILE) + 1);

    // Batch by tile type/color for fewer state changes
    for (let ty = startTy; ty <= endTy; ty++) {
        for (let tx = startTx; tx <= endTx; tx++) {
            const t = level.tiles[ty][tx];
            if (t === 0) continue;
            const sx = Math.round(tx * TILE - camera.x);
            const sy = Math.round(ty * TILE - camera.y);

            if (t === 1) {
                const above = tileAt(tx, ty-1);
                if (above === 0 || above === 3 || above === 4) {
                    if (currentLevel === 1) {
                        ctx.fillStyle = '#556';
                        ctx.fillRect(sx, sy, TILE, 3);
                        ctx.fillStyle = '#334';
                    } else if (currentLevel === 2) {
                        ctx.fillStyle = '#633';
                        ctx.fillRect(sx, sy, TILE, 3);
                        ctx.fillStyle = '#422';
                    } else {
                        ctx.fillStyle = '#2a5';
                        ctx.fillRect(sx, sy, TILE, 3);
                        ctx.fillStyle = '#543';
                    }
                    ctx.fillRect(sx, sy+3, TILE, TILE-3);
                } else {
                    ctx.fillStyle = currentLevel === 1 ? '#334' : currentLevel === 2 ? '#322' : '#432';
                    ctx.fillRect(sx, sy, TILE, TILE);
                    ctx.fillStyle = currentLevel === 1 ? '#445' : currentLevel === 2 ? '#433' : '#3a2';
                    if ((tx+ty)%3===0) ctx.fillRect(sx+4, sy+4, 2, 2);
                }
            } else if (t === 2) {
                ctx.fillStyle = currentLevel === 1 ? '#445' : currentLevel === 2 ? '#534' : '#445';
                ctx.fillRect(sx, sy, TILE, TILE);
                ctx.fillStyle = currentLevel === 1 ? '#556' : currentLevel === 2 ? '#645' : '#556';
                ctx.fillRect(sx+2, sy+2, TILE-4, TILE-4);
                if ((tx+ty)%2===0) { ctx.fillStyle = currentLevel === 2 ? '#423' : '#334'; ctx.fillRect(sx+4,sy+6,4,2); }
            } else if (t === 3) {
                ctx.fillStyle = currentLevel === 1 ? '#556' : currentLevel === 2 ? '#644' : '#654';
                ctx.fillRect(sx, sy, TILE, 5);
                ctx.fillStyle = currentLevel === 1 ? '#778' : currentLevel === 2 ? '#866' : '#876';
                ctx.fillRect(sx, sy, TILE, 2);
            } else if (t === 4) {
                ctx.fillStyle = '#c33';
                for (let k = 0; k < 4; k++) {
                    const bx = sx + k*4;
                    ctx.beginPath();
                    ctx.moveTo(bx, sy+TILE);
                    ctx.lineTo(bx+2, sy+4);
                    ctx.lineTo(bx+4, sy+TILE);
                    ctx.fill();
                }
            }
        }
    }
}

function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    if (currentLevel === 1) {
        grad.addColorStop(0, '#060812');
        grad.addColorStop(0.4, '#0c1020');
        grad.addColorStop(0.7, '#151a30');
        grad.addColorStop(1, '#0a0d1a');
    } else if (currentLevel === 2) {
        grad.addColorStop(0, '#120205');
        grad.addColorStop(0.4, '#200810');
        grad.addColorStop(0.7, '#30101a');
        grad.addColorStop(1, '#1a060d');
    } else {
        grad.addColorStop(0, '#0a0618');
        grad.addColorStop(0.4, '#1a0830');
        grad.addColorStop(0.7, '#2d1045');
        grad.addColorStop(1, '#1a0625');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    // Stars
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 60; i++) {
        const sx = ((i * 137 + 50) % 800) - (camera.x * 0.02) % 800;
        const sy = ((i * 97 + 30) % 300);
        const blink = Math.sin(frameCount * 0.02 + i) > 0.3;
        if (blink) {
            ctx.globalAlpha = 0.3 + (Math.sin(frameCount*0.03+i*2)*0.3);
            ctx.fillRect(sx < 0 ? sx + 800 : sx, sy, 1 + (i%3===0?1:0), 1);
        }
    }
    ctx.globalAlpha = 1;

    // Moon
    ctx.fillStyle = '#ffe8b0';
    ctx.shadowBlur = 30; ctx.shadowColor = '#ffe8b0';
    ctx.beginPath();
    ctx.arc(500 - camera.x*0.01, 60, 25, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Far mountains
    ctx.fillStyle = '#150a20';
    for (let i = 0; i < 20; i++) {
        const mx = i * 120 - (camera.x * 0.05) % (120*20);
        const mh = 60 + Math.sin(i*1.5)*30;
        ctx.beginPath();
        ctx.moveTo(mx, GH - 100);
        ctx.lineTo(mx+60, GH - 100 - mh);
        ctx.lineTo(mx+120, GH - 100);
        ctx.fill();
    }

    // Mid bamboo silhouettes
    ctx.fillStyle = '#1a0d28';
    for (let i = 0; i < 40; i++) {
        const bx = i * 45 - (camera.x * 0.15) % (45*40);
        const bh = 80 + Math.sin(i*2.3)*40;
        ctx.fillRect(bx, GH - 80 - bh, 4, bh + 80);
        ctx.fillRect(bx-6, GH - 80 - bh + 10, 16, 3);
        ctx.fillRect(bx-4, GH - 80 - bh + 20, 12, 2);
    }

    // Near tree trunks
    ctx.fillStyle = '#0d0818';
    for (let i = 0; i < 15; i++) {
        const tx = i * 150 - (camera.x * 0.3) % (150*15);
        const th = 50 + Math.sin(i*3.1)*25;
        ctx.fillRect(tx, GH - 40 - th, 8, th + 40);
        ctx.fillRect(tx-10, GH - 40 - th, 28, 5);
    }
}

function spawnLevelEntities() {
    entities = [];

    projectiles = [];
    particles = [];

    function spawnGuard(gx) {
        const tileX = Math.floor(gx / TILE);
        let spawnY = 25 * TILE;
        for (let ty = 20; ty < level.H; ty++) {
            if (isSolid(tileX, ty)) { spawnY = ty * TILE - 26; break; }
        }
        entities.push(new Enemy(gx, spawnY, 'guard'));
    }

    function spawnArcher(ax, ay) {
        let spawnY = ay;
        const tx = Math.floor(ax / TILE);
        for (let ty = Math.floor(ay / TILE); ty < level.H; ty++) {
            const t = tileAt(tx, ty);
            if (t === 1 || t === 2 || t === 3) { spawnY = ty * TILE - 26; break; }
        }
        entities.push(new Enemy(ax, spawnY, 'archer'));

    if (currentLevel === 0) {

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
    initAudio();
    currentLevel = 0;
    score = 0;
    entities = [];
    projectiles = [];
    particles = [];
    pickups = [];
    screenShake = 0;
    screenShakeX = 0;
    screenShakeY = 0;
    hitFlashFrames = 0;
    showStory(STORY_PRE[0], function() {
        showStory(STORY_PRE[1], function() {
            beginLevel();
        });
    });
}

function beginLevel() {
    gameState = 'PLAYING';
    level = buildLevel(currentLevel);
    player = new Player(3 * TILE, 24 * TILE);
    camera = new Camera();
    camera.x = 0;
    camera.y = level.ph - GH;
    entities = [];
    projectiles = [];
    particles = [];
    pickups = [];
    screenShake = 0;
    hitFlashFrames = 0;
    spawnLevelEntities();
}

function advanceLevel() {
    const postIndex = currentLevel;
    showStory(STORY_POST[postIndex], function() {
        currentLevel++;
        if (currentLevel > 2) {
            gameState = 'VICTORY';
            if (score > hiScore) {
                hiScore = score;
                localStorage.setItem('shadowBlade_hi', hiScore);
            }
        } else {
            const preIndex = currentLevel + 1;
            showStory(STORY_PRE[preIndex], function() {
                beginLevel();
            });
        }
    });
}

function resetToTitle() {
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('shadowBlade_hi', hiScore);
    }
    gameState = 'TITLE';
    // Full state reset
    entities = [];
    projectiles = [];
    particles = [];
    pickups = [];
    player = null;
    camera = null;
    level = null;
    screenShake = 0;
    screenShakeX = 0;
    screenShakeY = 0;
    hitFlashFrames = 0;
    score = 0;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update() {
    frameCount++;

    // Update screen shake
    if (screenShake > 0) {
        screenShakeX = (Math.random() - 0.5) * screenShake * 2;
        screenShakeY = (Math.random() - 0.5) * screenShake * 2;
        screenShake *= 0.8;
        if (screenShake < 0.3) screenShake = 0;
    } else {
        screenShakeX = 0;
        screenShakeY = 0;
    }

    if (hitFlashFrames > 0) hitFlashFrames--;

    if (gameState === 'PLAYING') {
        const input = pollInput();

        if (player && !player.dead) {
            player.update(input);

            // Level end check
            if (level) {
                const endZone = (level.W - 12) * TILE;
                if (player.x > endZone) {
                    advanceLevel();
                }
            }
        } else if (player) {
            player.update(input);
            if (player.deathTimer > 90) {
                gameState = 'GAMEOVER';
            }
        }

        if (camera && player) camera.follow(player);

        // Update entities (only near camera)
        for (let i = 0; i < entities.length; i++) {
            const e = entities[i];
            if (camera && Math.abs(e.x - camera.x - GW/2) < GW) {
                e.update();
            }
        }

        // Player attack hitbox vs enemies
        if (player && player.attackHitbox) {
            const hb = player.attackHitbox;
            for (let i = 0; i < entities.length; i++) {
                const e = entities[i];
                if (!e.dead && !hb.hit.has(e) &&
                    hb.x < e.x+e.w && hb.x+hb.w > e.x &&
                    hb.y < e.y+e.h && hb.y+hb.h > e.y) {
                    e.takeDamage(hb.damage);
                    hb.hit.add(e);
                    e.vx = player.facing * 3;
                    e.vy = -2;
                }
            }
        }

        updateProjectiles();
        updatePickups();
        updateParticles();

        // Clean dead entities after a while
        for (let i = entities.length - 1; i >= 0; i--) {
            if (entities[i].dead && entities[i].deathTimer >= 60) {
                entities.splice(i, 1);
            }
        }
    } else if (gameState === 'VICTORY') {
        pollInput();
        if (player && camera) {
            camera.follow(player);
            updateParticles();
        }
    } else if (gameState === 'STORY') {
        updateStory();
    } else {
        pollInput();
    }
}

function drawGoArrow() {
    if (!player || player.dead) return;
    const nearbyAlive = entities.filter(function(e) { return !e.dead && Math.abs(e.x - player.x) < 300; });
    if (nearbyAlive.length > 0) return;

    if (Math.floor(frameCount / 20) % 3 === 0) return;

    ctx.save();
    ctx.fillStyle = '#ff0';
    ctx.font = '16px "Press Start 2P"';
    ctx.textAlign = 'right';
    ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff0';
    ctx.fillText('>>>', GW - 16, GH / 2);
    ctx.shadowBlur = 0;
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, GW, GH);

    if (gameState === 'TITLE') {
        drawTitleScreen();
    } else if (gameState === 'STORY') {
        drawStoryScreen();
    } else if (gameState === 'PLAYING' || gameState === 'GAMEOVER' || gameState === 'VICTORY') {
        if (!player || !camera || !level) return;

        // Apply screen shake
        ctx.save();
        ctx.translate(Math.round(screenShakeX), Math.round(screenShakeY));

        drawBackground();
        drawLevel();
        drawPickups();

        for (let i = 0; i < entities.length; i++) entities[i].draw();

        player.draw();

        drawProjectiles();
        drawParticles();

        ctx.restore();

        drawHUD();

        // Environmental text signs
        if (gameState === 'PLAYING' && player && ENV_SIGNS[currentLevel]) {
            ctx.save();
            ctx.font = '8px "Press Start 2P"';
            ctx.textAlign = 'center';
            for (let s = 0; s < ENV_SIGNS[currentLevel].length; s++) {
                const sign = ENV_SIGNS[currentLevel][s];
                const signWorldX = sign.tx * TILE;
                const dist = Math.abs(player.x - signWorldX);
                if (dist < 120) {
                    const alpha = Math.max(0, 1 - dist / 120) * 0.7;
                    ctx.globalAlpha = alpha * (0.7 + Math.sin(frameCount * 0.04) * 0.3);
                    ctx.fillStyle = currentLevel === 0 ? '#4a8' : currentLevel === 1 ? '#a66' : '#c44';
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = ctx.fillStyle;
                    const sx = signWorldX - camera.x;
                    const sy = 70 + Math.sin(frameCount * 0.03) * 4;
                    ctx.fillText(sign.text, sx, sy);
                    ctx.shadowBlur = 0;
                }
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        if (gameState === 'PLAYING') {
            drawGoArrow();
        }

        if (gameState === 'GAMEOVER') {
            drawGameOverScreen();
        }

        if (gameState === 'VICTORY') {
            drawVictoryScreen();
        }

        // Red flash on hit
        if (player && player.invuln > 35) {
            ctx.fillStyle = 'rgba(255,0,0,0.2)';
            ctx.fillRect(0, 0, GW, GH);
        }

        // White hit flash
        if (hitFlashFrames > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, 0, GW, GH);
        }
    }
}

// ============================================================
// GAME LOOP - Fixed timestep at 60fps
// ============================================================
const TIMESTEP = 1000 / 60;
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
    if (lastTime === 0) lastTime = timestamp;
    let delta = timestamp - lastTime;
    lastTime = timestamp;
    if (delta > 200) delta = 200; // cap for tab-away

    accumulator += delta;
    // Death spiral prevention: max 3 updates per frame
    let updates = 0;
    while (accumulator >= TIMESTEP && updates < 3) {
        update();
        accumulator -= TIMESTEP;
        updates++;
    }
    if (updates >= 3) accumulator = 0; // drop remaining time
    draw();
    requestAnimationFrame(gameLoop);
}

// Handle clicks on canvas for starting/advancing
canvas.addEventListener('click', function() {
    initAudio();
    if (gameState === 'TITLE') startGame();
    else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') resetToTitle();
    else if (gameState === 'STORY') advanceStory();
});

requestAnimationFrame(gameLoop);

</script>
