<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Defender - Power Up Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #game-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050510;
            overflow: hidden;
        }

        canvas {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            background-color: #000;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%,
                rgba(0, 0, 0, 0.25)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud {
            padding: 20px;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            transition: opacity 0.5s;
        }

        .center-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            pointer-events: auto;
            width: 80%;
        }

        h1 { font-size: 32px; margin-bottom: 10px; line-height: 1.5; }
        h2 { font-size: 24px; color: #0ff; text-shadow: 0 0 10px #0ff; line-height: 1.5; margin-bottom: 20px; }
        p { font-size: 12px; color: #fff; text-shadow: none; line-height: 1.8; margin-bottom: 20px;}
        
        .story-text {
            color: #0ff;
            font-size: 16px;
            line-height: 2;
            text-shadow: 0 0 8px #0ff;
            white-space: pre-wrap;
        }

        button.play-btn {
            background: rgba(0,0,0,0.8);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff inset, 0 0 10px #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
            margin-top: 20px;
        }

        button.play-btn:hover {
            background: #0ff;
            color: #000;
        }

        .hint { color: #aaa; margin-top: 20px; font-size: 10px; line-height: 1.6;}

        #control-panel {
            height: 160px;
            background: #020205;
            border-top: 2px solid #0ff;
            box-shadow: 0 -5px 20px rgba(0, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 30;
        }

        #joy-container {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #joy-stick {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 15px #0ff, inset 0 0 10px rgba(255,255,255,0.8);
            position: absolute;
            pointer-events: none; 
        }

        #shoot-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.1);
            border: 3px solid #f0f;
            color: #f0f;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 5px #f0f;
            box-shadow: 0 0 15px #f0f inset, 0 0 20px rgba(255, 0, 255, 0.4);
            cursor: pointer;
            outline: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s, background 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #shoot-btn.active {
            transform: scale(0.9);
            background: rgba(255, 0, 255, 0.6);
            color: #fff;
            box-shadow: 0 0 30px #f0f inset, 0 0 30px #f0f;
        }

        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            h2 { font-size: 16px; }
            .hud { font-size: 10px; padding: 10px; }
            .story-text { font-size: 12px; }
            #control-panel { padding: 0 20px; height: 140px; }
            #joy-container { width: 100px; height: 100px; }
            #joy-stick { width: 50px; height: 50px; }
            #shoot-btn { width: 80px; height: 80px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="scanlines"></div>
        
        <div id="ui-layer">
            <div class="hud" id="hud" style="opacity: 0;">
                <div id="scoreDisplay">SCORE: 0</div>
                <div id="waveDisplay">WAVE: 1</div>
                <div id="livesDisplay">LIVES: 3</div>
            </div>

            <div id="startScreen" class="center-msg">
                <h1>NEON DEFENDER</h1>
                <h2>SYSTEM REBOOT</h2>
                <div class="hint">Collect drops for Shields, Speed, & Weapon Upgrades.<br><br>Use Control Deck below to move and shoot.</div>
                <button class="play-btn" onclick="startStory()">INITIALIZE</button>
            </div>

            <div id="storyScreen" class="center-msg" style="display: none;">
                <div id="storyContent" class="story-text"></div>
            </div>

            <div id="gameOverScreen" class="center-msg" style="display: none;">
                <h1>FATAL ERROR</h1>
                <p id="finalScore">SCORE: 0</p>
                <button class="play-btn" onclick="startStory()">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="control-panel">
        <div id="joy-container">
            <div id="joy-stick"></div>
        </div>
        <button id="shoot-btn">FIRE</button>
    </div>
</div>

<script>
    // --- Setup & Config ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    
    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 600;
    
    function resizeCanvas() {
        const containerW = gameContainer.clientWidth;
        const containerH = gameContainer.clientHeight;
        
        const gameRatio = GAME_WIDTH / GAME_HEIGHT;
        const containerRatio = containerW / containerH;
        
        if (containerRatio < gameRatio) {
            canvas.style.width = containerW + 'px';
            canvas.style.height = (containerW / gameRatio) + 'px';
        } else {
            canvas.style.width = (containerH * gameRatio) + 'px';
            canvas.style.height = containerH + 'px';
        }
        
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Story & Waves Data ---
    const storyline = [
        { text: "SYSTEM BOOT: YEAR 2084.\n\nTHE NEON SYNDICATE HAS BREACHED\nTHE OUTER MAINFRAME.\n\nYOU ARE THE LAST DEFENDER PROGRAM.\n\nPURGE THE BASIC INFECTIONS.", targetKills: 15, spawnRate: 60, enemyTypes: [0] },
        { text: "WARNING: VIRUS MUTATION DETECTED.\n\nFAST-ATTACK VECTORS COMPROMISING\nPROXY SERVERS.\n\nADAPT AND DESTROY.", targetKills: 35, spawnRate: 45, enemyTypes: [0, 1] },
        { text: "CRITICAL ALERT: FIREWALL BREACHED.\n\nARMED LOGIC BOMBS DEPLOYED.\nEVASIVE MANEUVERS REQUIRED.\n\nDEFEND THE CORE.", targetKills: 60, spawnRate: 40, enemyTypes: [0, 1, 2] },
        { text: "SYSTEM OVERLOAD IMMINENT.\n\nTHE SYNDICATE IS POURING IN.\n\nSURVIVE AT ALL COSTS.", targetKills: Infinity, spawnRate: 25, enemyTypes: [0, 1, 2, 2] }
    ];

    // --- Game Variables ---
    let gameState = 'START';
    let currentWaveIndex = 0;
    let score = 0;
    let kills = 0;
    let lives = 3;
    let frameCount = 0;

    let player;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let stars = [];
    let powerUps = [];

    let storyChars = "";
    let storyCharIndex = 0;
    let storyTimer = 0;

    const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, w: false, a: false, s: false, d: false, Space: false };

    let joystick = { active: false, vectorX: 0, vectorY: 0 };

    // --- DOM Control Deck Input Handling ---
    const joyContainer = document.getElementById('joy-container');
    const joyStick = document.getElementById('joy-stick');
    const shootBtn = document.getElementById('shoot-btn');
    
    let isJoyDragging = false;
    const maxJoyRadius = 40; 

    function updateJoystick(clientX, clientY) {
        const rect = joyContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        let distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance > maxJoyRadius) { dx = (dx / distance) * maxJoyRadius; dy = (dy / distance) * maxJoyRadius; }
        joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
        joystick.vectorX = dx / maxJoyRadius;
        joystick.vectorY = dy / maxJoyRadius;
    }

    function resetJoystick() {
        isJoyDragging = false;
        joystick.active = false;
        joystick.vectorX = 0;
        joystick.vectorY = 0;
        joyStick.style.transform = `translate(0px, 0px)`;
    }

    joyContainer.addEventListener('touchstart', (e) => { e.preventDefault(); isJoyDragging = true; joystick.active = true; updateJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
    joyContainer.addEventListener('touchmove', (e) => { e.preventDefault(); if (isJoyDragging) updateJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
    joyContainer.addEventListener('touchend', resetJoystick);
    joyContainer.addEventListener('touchcancel', resetJoystick);

    joyContainer.addEventListener('mousedown', (e) => { isJoyDragging = true; joystick.active = true; updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mousemove', (e) => { if (isJoyDragging) updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mouseup', resetJoystick);

    const pressShoot = (e) => { if (e.type !== 'mousedown') e.preventDefault(); keys.Space = true; shootBtn.classList.add('active'); };
    const releaseShoot = (e) => { if (e.type !== 'mouseup' && e.type !== 'mouseleave') e.preventDefault(); keys.Space = false; shootBtn.classList.remove('active'); };

    shootBtn.addEventListener('touchstart', pressShoot, {passive: false});
    shootBtn.addEventListener('touchend', releaseShoot, {passive: false});
    shootBtn.addEventListener('touchcancel', releaseShoot, {passive: false});
    shootBtn.addEventListener('mousedown', pressShoot);
    shootBtn.addEventListener('mouseup', releaseShoot);
    shootBtn.addEventListener('mouseleave', releaseShoot);

    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; if (e.code === 'Space') { keys.Space = true; shootBtn.classList.add('active'); e.preventDefault(); } });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; if (e.code === 'Space') { keys.Space = false; shootBtn.classList.remove('active'); } });

    // --- Classes ---
    class Player {
        constructor() {
            this.width = 40;
            this.height = 30;
            this.x = GAME_WIDTH / 2;
            this.y = GAME_HEIGHT - 80;
            this.speed = 7;
            this.color = '#0ff';
            this.lastShot = 0;
            this.shotCooldown = 12;
            this.invulnerable = 0;
            
            // Power-up stats
            this.weaponLevel = 1;
            this.speedBoostTimer = 0;
            this.shieldActive = false;
        }

        update() {
            let currentSpeed = this.speed;
            
            // Apply speed boost effect
            if (this.speedBoostTimer > 0) {
                currentSpeed *= 1.6; // 60% faster
                this.speedBoostTimer--;
                if (frameCount % 4 === 0) createParticles(this.x, this.y + this.height/2, 1, '#00f', 1);
            }

            if (joystick.active) {
                this.x += joystick.vectorX * currentSpeed;
                this.y += joystick.vectorY * currentSpeed;
            } else {
                if (keys.ArrowLeft || keys.a || keys.A) this.x -= currentSpeed;
                if (keys.ArrowRight || keys.d || keys.D) this.x += currentSpeed;
                if (keys.ArrowUp || keys.w || keys.W) this.y -= currentSpeed;
                if (keys.ArrowDown || keys.s || keys.S) this.y += currentSpeed;
            }

            this.x = Math.max(this.width/2, Math.min(GAME_WIDTH - this.width/2, this.x));
            this.y = Math.max(this.height/2, Math.min(GAME_HEIGHT - this.height/2, this.y));

            // Weapon Fire Logic
            if (keys.Space && frameCount - this.lastShot > this.shotCooldown) {
                this.shoot();
            }

            if (this.invulnerable > 0) this.invulnerable--;
        }

        shoot() {
            let baseVy = -12;
            
            // Dynamic cooldown based on weapon level
            let cd = 12;
            if (this.weaponLevel >= 3) cd = 9;
            if (this.weaponLevel >= 4) cd = 6;
            this.shotCooldown = cd;

            if (this.weaponLevel === 1) {
                // Dual
                bullets.push(new Bullet(this.x - 10, this.y - this.height/2, baseVy, '#0ff', true));
                bullets.push(new Bullet(this.x + 10, this.y - this.height/2, baseVy, '#0ff', true));
            } else if (this.weaponLevel === 2) {
                // Tri
                bullets.push(new Bullet(this.x, this.y - this.height/2, baseVy, '#0ff', true));
                let b1 = new Bullet(this.x - 12, this.y - this.height/2, baseVy*0.95, '#0ff', true); b1.vx = -1.5; bullets.push(b1);
                let b2 = new Bullet(this.x + 12, this.y - this.height/2, baseVy*0.95, '#0ff', true); b2.vx = 1.5; bullets.push(b2);
            } else if (this.weaponLevel === 3) {
                // Quad
                bullets.push(new Bullet(this.x - 6, this.y - this.height/2, baseVy, '#0ff', true));
                bullets.push(new Bullet(this.x + 6, this.y - this.height/2, baseVy, '#0ff', true));
                let b1 = new Bullet(this.x - 18, this.y - this.height/2, baseVy*0.95, '#0ff', true); b1.vx = -2.5; bullets.push(b1);
                let b2 = new Bullet(this.x + 18, this.y - this.height/2, baseVy*0.95, '#0ff', true); b2.vx = 2.5; bullets.push(b2);
            } else {
                // Penta
                bullets.push(new Bullet(this.x, this.y - this.height/2, baseVy, '#0ff', true));
                let b1 = new Bullet(this.x - 10, this.y - this.height/2, baseVy*0.9, '#0ff', true); b1.vx = -2; bullets.push(b1);
                let b2 = new Bullet(this.x + 10, this.y - this.height/2, baseVy*0.9, '#0ff', true); b2.vx = 2; bullets.push(b2);
                let b3 = new Bullet(this.x - 20, this.y - this.height/2, baseVy*0.8, '#0ff', true); b3.vx = -4.5; bullets.push(b3);
                let b4 = new Bullet(this.x + 20, this.y - this.height/2, baseVy*0.8, '#0ff', true); b4.vx = 4.5; bullets.push(b4);
            }

            this.lastShot = frameCount;
            createParticles(this.x - 10, this.y - this.height/2, 2, '#0ff', 2);
            createParticles(this.x + 10, this.y - this.height/2, 2, '#0ff', 2);
        }

        draw(ctx) {
            if (this.invulnerable > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Draw Shield if active
            if (this.shieldActive) {
                ctx.beginPath();
                ctx.arc(0, 0, this.width, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.6)';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0f0';
                ctx.stroke();
                ctx.fillStyle = 'rgba(0, 255, 0, 0.15)';
                ctx.fill();
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(0, -this.height/2);
            ctx.lineTo(this.width/2, this.height/2);
            ctx.lineTo(this.width/4, this.height/4);
            ctx.lineTo(-this.width/4, this.height/4);
            ctx.lineTo(-this.width/2, this.height/2);
            ctx.closePath();
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, this.height/4, 4, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();
        }
    }

    class PowerUp {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 24;
            this.height = 24;
            this.vy = 1.5;
            this.markedForDeletion = false;
            
            // Randomly select type
            let rand = Math.random();
            if (rand < 0.4) {
                this.type = 0; // Weapon
                this.color = '#ff0';
                this.letter = 'W';
            } else if (rand < 0.7) {
                this.type = 1; // Speed
                this.color = '#00f';
                this.letter = 'S';
            } else {
                this.type = 2; // Shield
                this.color = '#0f0';
                this.letter = '+';
            }
        }

        update() {
            this.y += this.vy;
            if (this.y > GAME_HEIGHT + 30) this.markedForDeletion = true;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Pulsing effect
            let scale = 1 + Math.sin(frameCount * 0.1) * 0.1;
            ctx.scale(scale, scale);

            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.arc(0, 0, this.width/2, 0, Math.PI*2);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fill();

            ctx.fillStyle = this.color;
            ctx.font = '14px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.letter, 1, 2); // Slightly offset for font baseline
            
            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, vy, color, isPlayer = false) {
            this.x = x;
            this.y = y;
            this.vy = vy;
            this.vx = 0; 
            this.width = 4;
            this.height = 15;
            this.color = color;
            this.isPlayer = isPlayer;
            this.markedForDeletion = false;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.y < -50 || this.y > GAME_HEIGHT + 50 || this.x < -50 || this.x > GAME_WIDTH + 50) {
                this.markedForDeletion = true;
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
            ctx.restore();
        }
    }

    class Enemy {
        constructor(x, y, type, speedMult) {
            this.x = x;
            this.y = y;
            this.type = type; 
            this.width = type === 2 ? 40 : 30;
            this.height = type === 2 ? 40 : 30;
            this.markedForDeletion = false;
            
            if (type === 0) {
                this.color = '#f0f';
                this.vy = 2.5 * speedMult;
                this.vx = 0;
                this.hp = 2;
                this.score = 100;
            } else if (type === 1) {
                this.color = '#ff0';
                this.vy = 4 * speedMult;
                this.vx = (Math.random() > 0.5 ? 1 : -1) * 3;
                this.hp = 1;
                this.score = 250;
            } else {
                this.color = '#f00';
                this.vy = 1.5 * speedMult;
                this.vx = (Math.random() > 0.5 ? 1 : -1) * 1.5;
                this.hp = 4;
                this.score = 500;
                this.lastShot = frameCount + Math.random() * 60;
                this.shootCooldown = Math.max(60, 120 - (speedMult * 10));
            }
        }

        update() {
            this.y += this.vy;
            
            if (this.type === 1 || this.type === 2) {
                this.x += this.vx;
                if (this.x < this.width/2 || this.x > GAME_WIDTH - this.width/2) this.vx *= -1;
            }

            if (this.type === 2 && frameCount > this.lastShot + this.shootCooldown && player) {
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                let mag = Math.sqrt(dx*dx + dy*dy);
                let speed = 7;
                
                let b = new Bullet(this.x, this.y + this.height/2, dy/mag * speed, this.color, false);
                b.vx = dx/mag * speed;
                bullets.push(b);
                
                this.lastShot = frameCount;
            }

            if (this.y > GAME_HEIGHT + this.height) this.markedForDeletion = true;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';

            ctx.beginPath();
            if (this.type === 0) {
                ctx.moveTo(0, -this.height/2); ctx.lineTo(this.width/2, 0); ctx.lineTo(0, this.height/2); ctx.lineTo(-this.width/2, 0);
            } else if (this.type === 1) {
                ctx.moveTo(0, this.height/2); ctx.lineTo(this.width/2, -this.height/2); ctx.lineTo(0, -this.height/4); ctx.lineTo(-this.width/2, -this.height/2);
            } else {
                ctx.moveTo(0, -this.height/2); ctx.lineTo(this.width/2, -this.height/4); ctx.lineTo(this.width/2, this.height/4); ctx.lineTo(0, this.height/2); ctx.lineTo(-this.width/2, this.height/4); ctx.lineTo(-this.width/2, -this.height/4);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color, speedScale) {
            this.x = x;
            this.y = y;
            this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 * speedScale;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0;
            this.decay = Math.random() * 0.04 + 0.02;
            this.markedForDeletion = false;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            if (this.life <= 0) this.markedForDeletion = true;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.restore();
        }
    }

    class Star {
        constructor() { this.reset(true); }
        reset(randomY = false) {
            this.x = Math.random() * GAME_WIDTH;
            this.y = randomY ? Math.random() * GAME_HEIGHT : -10;
            this.size = Math.random() * 2 + 1;
            this.speed = this.size * 0.8;
            this.brightness = Math.random();
        }
        update() {
            let mult = gameState === 'PLAYING' ? 1.5 : 0.5;
            this.y += this.speed * mult;
            if (this.y > GAME_HEIGHT) this.reset();
        }
        draw(ctx) {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    // --- Helper Functions ---
    function createParticles(x, y, count, color, speedScale = 1) {
        for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, speedScale));
    }

    function checkCollision(rect1, rect2) {
        return (
            rect1.x - rect1.width/2 < rect2.x + rect2.width/2 &&
            rect1.x + rect1.width/2 > rect2.x - rect2.width/2 &&
            rect1.y - rect1.height/2 < rect2.y + rect2.height/2 &&
            rect1.y + rect1.height/2 > rect2.y - rect2.height/2
        );
    }

    function updateUI() {
        document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
        document.getElementById('livesDisplay').innerText = `LIVES: ${lives}`;
        document.getElementById('waveDisplay').innerText = `WAVE: ${currentWaveIndex + 1}`;
    }

    function hitPlayer() {
        if (player.shieldActive) {
            player.shieldActive = false;
            player.invulnerable = 60; // 1s i-frames
            createParticles(player.x, player.y, 30, '#0f0', 3);
        } else {
            lives--;
            // Downgrade weapon on damage
            player.weaponLevel = Math.max(1, player.weaponLevel - 1);
            updateUI();
            createParticles(player.x, player.y, 40, '#0ff', 3);
            
            if (lives <= 0) gameOver();
            else player.invulnerable = 120;
        }
    }

    // --- Core Game Logic ---
    function initBackground() {
        stars = [];
        for (let i = 0; i < 150; i++) stars.push(new Star());
    }

    window.startStory = function() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('hud').style.opacity = '0';
        
        if (gameState === 'START' || gameState === 'GAMEOVER') {
            score = 0;
            lives = 3;
            kills = 0;
            currentWaveIndex = 0;
            player = new Player();
        }
        
        gameState = 'STORY';
        bullets = [];
        enemies = [];
        powerUps = [];
        resetJoystick();
        keys.Space = false;
        shootBtn.classList.remove('active'); 
        
        const wave = storyline[Math.min(currentWaveIndex, storyline.length - 1)];
        storyChars = wave.text;
        storyCharIndex = 0;
        document.getElementById('storyContent').innerText = "";
        document.getElementById('storyScreen').style.display = 'block';
    };

    function startWave() {
        document.getElementById('storyScreen').style.display = 'none';
        document.getElementById('hud').style.opacity = '1';
        gameState = 'PLAYING';
        frameCount = 0;
        if (player) player.lastShot = 0; 
        updateUI();
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        document.getElementById('gameOverScreen').style.display = 'block';
        document.getElementById('hud').style.opacity = '0';
        document.getElementById('finalScore').innerText = `FINAL SCORE: ${score}\nWAVES CLEARED: ${currentWaveIndex}`;
        createParticles(player.x, player.y, 100, player.color, 4);
        player = null;
    }

    function spawnEnemies() {
        const wave = storyline[Math.min(currentWaveIndex, storyline.length - 1)];
        if (frameCount % wave.spawnRate === 0) {
            const x = Math.random() * (GAME_WIDTH - 60) + 30;
            const type = wave.enemyTypes[Math.floor(Math.random() * wave.enemyTypes.length)];
            const speedMult = 1 + (currentWaveIndex * 0.1) + (frameCount / 10000);
            enemies.push(new Enemy(x, -30, type, speedMult));
        }
    }

    function update() {
        stars.forEach(s => s.update());
        particles.forEach(p => p.update());
        
        if (gameState === 'STORY') {
            if (storyCharIndex < storyChars.length) {
                if (frameCount % 2 === 0) {
                    document.getElementById('storyContent').innerText += storyChars.charAt(storyCharIndex);
                    storyCharIndex++;
                }
            } else {
                if (storyTimer === 0) storyTimer = 180; // 3 secs
                storyTimer--;
                if (storyTimer <= 0) startWave();
            }
            frameCount++;
            return;
        }

        if (gameState !== 'PLAYING') return;

        frameCount++;
        player.update();
        spawnEnemies();

        const currentWaveData = storyline[Math.min(currentWaveIndex, storyline.length - 1)];
        if (kills >= currentWaveData.targetKills) {
            currentWaveIndex++;
            startStory();
            return;
        }

        bullets.forEach(b => b.update());
        enemies.forEach(e => e.update());
        powerUps.forEach(p => p.update());

        // Player vs PowerUp
        if (player && player.invulnerable <= 0 || player && player.invulnerable > 0) {
             for (let i = powerUps.length - 1; i >= 0; i--) {
                let p = powerUps[i];
                if (checkCollision(player, p)) {
                    p.markedForDeletion = true;
                    if (p.type === 0) { // Weapon Update
                        player.weaponLevel = Math.min(4, player.weaponLevel + 1);
                        createParticles(p.x, p.y, 15, '#ff0', 2);
                    } else if (p.type === 1) { // Speed Boost
                        player.speedBoostTimer = 600; // 10 seconds
                        createParticles(p.x, p.y, 15, '#00f', 2);
                    } else if (p.type === 2) { // Shield
                        player.shieldActive = true;
                        createParticles(p.x, p.y, 15, '#0f0', 2);
                    }
                }
            }
        }

        // Collisions
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];

            if (player.invulnerable <= 0 && checkCollision(player, e)) {
                e.hp = 0; 
                hitPlayer();
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (b.isPlayer && checkCollision(b, e)) {
                    b.markedForDeletion = true;
                    e.hp--;
                    createParticles(b.x, b.y, 8, e.color, 1.5);
                    
                    if (e.hp <= 0 && !e.markedForDeletion) {
                        e.markedForDeletion = true;
                        score += e.score;
                        kills++;
                        updateUI();
                        createParticles(e.x, e.y, 25, e.color, 2.5);

                        // 15% Chance to drop a power up on kill
                        if (Math.random() < 0.15) {
                            powerUps.push(new PowerUp(e.x, e.y));
                        }
                    }
                }
            }
        }

        if (player && player.invulnerable <= 0) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                if (!b.isPlayer && checkCollision(b, player)) {
                    b.markedForDeletion = true;
                    hitPlayer();
                }
            }
        }

        bullets = bullets.filter(b => !b.markedForDeletion);
        enemies = enemies.filter(e => !e.markedForDeletion);
        particles = particles.filter(p => !p.markedForDeletion);
        powerUps = powerUps.filter(p => !p.markedForDeletion);
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<GAME_WIDTH; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, GAME_HEIGHT); }
        for(let i=0; i<GAME_HEIGHT; i+=50) { ctx.moveTo(0, i); ctx.lineTo(GAME_WIDTH, i); }
        ctx.stroke();

        stars.forEach(s => s.draw(ctx));
        powerUps.forEach(p => p.draw(ctx));
        particles.forEach(p => p.draw(ctx));
        
        if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
            bullets.forEach(b => b.draw(ctx));
            enemies.forEach(e => e.draw(ctx));
        }
        
        if (gameState === 'PLAYING' && player) {
            player.draw(ctx);
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    initBackground();
    gameLoop();

</script>
</body>
</html>
